        const mttEntry = (src, seatIndex) => ({ uid: src.uid, name: src.name || '', photo: src.photo || '', avatarSeed: src.avatarSeed || '', seatIndex, stack: src.stack, bet: 0, status: 'active', cards: [], hasActed: false, actionText: '', isBot: !!src.isBot, buyTotal: src.buyTotal || 0 });
        const mttIdle = (tb) => !tb.gameState || ['waiting', 'showdown'].includes(tb.gameState.phase);
        const mttDelTable = async (docId) => { try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", docId)); } catch(e) {} };

        const mttOrchestrate = async (tor, myTables, rakePct) => {
            if (!myTables.length) return;
            // מקור אמת יחיד: שחקנים עם סטאק>0 בשולחנות בפועל (לא דגלי out שמתעדכנים לאט)
            let info = myTables.map(tb => ({ tb, act: Object.values(tb.players || {}).filter(p => (p.stack || 0) > 0), idle: mttIdle(tb) }));
            info.forEach(it => it.count = it.act.length);
            // מחיקת שולחנות ריקים לגמרי (כולם נפלו/הועברו)
            for (const it of info) if (it.count === 0) await mttDelTable(it.tb.docId);
            let live = info.filter(it => it.count > 0);
            const rankAlive = Object.values(tor.players || {}).filter(p => !p.out);
            if (!live.length) { await tourFinalize(tor, (rankAlive[0] || {}).uid || null, rakePct); return; }
            const totalActive = live.reduce((s, it) => s + it.count, 0);
            // סיום: נשאר אלוף אחד (לפי סטאקים אמיתיים)
            if (totalActive <= 1) {
                const champ = live[0].act[0];
                for (const it of live) await mttDelTable(it.tb.docId);
                await tourFinalize(tor, (champ || {}).uid || null, rakePct);
                return;
            }
            // ריפוי עצמי: שולחן שתפח מעל 9 פעילים -> מפזרים עודף לשולחן עם מקום (תקרה קשיחה)
            const over = live.find(it => it.count > MTT_SEATS && it.idle);
            if (over) {
                const dst = live.find(it => it !== over && it.count < MTT_SEATS && it.idle);
                if (dst) {
                    const mover = over.act[over.act.length - 1];
                    try {
                        await window.fb.runTransaction(window.fb.db, async (trx) => {
                            const sRef = window.fb.doc(window.fb.db, "tables", over.tb.docId), dRef = window.fb.doc(window.fb.db, "tables", dst.tb.docId);
                            const [sS, dS] = [await trx.get(sRef), await trx.get(dRef)];
                            if (!sS.exists() || !dS.exists()) return;
                            const sp = (sS.data().players || {})[mover.uid]; if (!sp || (sp.stack || 0) <= 0) return;
                            if (Object.values(dS.data().players || {}).filter(p => (p.stack || 0) > 0).length >= MTT_SEATS) return;
                            const sPl = { ...sS.data().players }; delete sPl[mover.uid];
                            trx.update(sRef, { players: sPl });
                            trx.update(dRef, { players: { ...dS.data().players, [mover.uid]: mttEntry(sp, mttFreeSeat(dS.data().players)) } });
                        });
                    } catch(e) {}
                    return;
                }
            }

            // שולחן גמר: כשנשארו <=9 פעילים - מאחדים לשולחן אחד
            if (totalActive <= MTT_SEATS) {
                if (live.length === 1 && (live[0].tb.tournament || {}).final) return; // כבר שולחן גמר יחיד
                if (!live.every(it => it.idle)) return; // מאחדים רק כשכל השולחנות בין ידיים
                const seatPlayers = {}; let si = 0;
                live.forEach(it => it.act.forEach(p => { seatPlayers[p.uid] = mttEntry(p, si++); }));
                const keep = live[0].tb;
                for (let i = 1; i < live.length; i++) await mttDelTable(live[i].tb.docId);
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "tables", keep.docId), {
                        players: seatPlayers,
                        tournament: { ...keep.tournament, final: true },
                        gameState: { ...(keep.gameState || {}), phase: 'waiting', board: [], pots: [], highestBet: 0, activeTurnUid: null, turnStartedAt: null, lastWinners: null, allInReveal: false }
                    });
                } catch(e) {}
                return;
            }

            // איזון: לא לתת פער של 2+ בין שולחנות, ולפרק שולחנות שהצטמצמו ל-1
            live.sort((a, b) => a.count - b.count);
            const smallest = live[0], largest = live[live.length - 1];
            // פירוק שולחן עם שחקן יחיד -> העברה לשולחן הכי קטן שיש בו מקום
            if (smallest.count === 1 && smallest.idle && live.length > 1) {
                const dst = live.find(it => it !== smallest && it.count < MTT_SEATS && it.idle);
                if (dst) {
                    const mover = smallest.act[0];
                    try {
                        await window.fb.runTransaction(window.fb.db, async (trx) => {
                            const sRef = window.fb.doc(window.fb.db, "tables", smallest.tb.docId), dRef = window.fb.doc(window.fb.db, "tables", dst.tb.docId);
                            const [sS, dS] = [await trx.get(sRef), await trx.get(dRef)];
                            if (!sS.exists() || !dS.exists()) return;
                            const sp = (sS.data().players || {})[mover.uid]; if (!sp || (sp.stack || 0) <= 0) return;
                            if (Object.values(dS.data().players || {}).filter(p => (p.stack || 0) > 0).length >= MTT_SEATS) return;
                            trx.update(dRef, { players: { ...dS.data().players, [mover.uid]: mttEntry(sp, mttFreeSeat(dS.data().players)) } });
                            trx.delete(sRef);
                        });
                    } catch(e) {}
                    return;
                }
            }
            // איזון עדין: מעבירים שחקן אחד מהגדול לקטן אם הפער >=2
            if (largest.count - smallest.count >= 2 && largest.idle && smallest.count < MTT_SEATS) {
                const mover = largest.act[largest.act.length - 1];
                try {
                    await window.fb.runTransaction(window.fb.db, async (trx) => {
                        const sRef = window.fb.doc(window.fb.db, "tables", largest.tb.docId), dRef = window.fb.doc(window.fb.db, "tables", smallest.tb.docId);
                        const [sS, dS] = [await trx.get(sRef), await trx.get(dRef)];
                        if (!sS.exists() || !dS.exists()) return;
                        const sp = (sS.data().players || {})[mover.uid]; if (!sp || (sp.stack || 0) <= 0) return;
                        if (Object.values(dS.data().players || {}).filter(p => (p.stack || 0) > 0).length >= MTT_SEATS) return;
                        const sPl = { ...sS.data().players }; delete sPl[mover.uid];
                        trx.update(sRef, { players: sPl });
                        trx.update(dRef, { players: { ...dS.data().players, [mover.uid]: mttEntry(sp, mttFreeSeat(dS.data().players)) } });
                    });
                } catch(e) {}
            }
        };

        // המתזמן: רץ אצל הסופר-אדמין - מזניק Tournaments בזמנם ומקדם סבבים
        const tourOrchestrate = async (tours, tables, rakePct) => {
            for (const tor of tours || []) {
                try {
                    if (tor.status === 'reg' && tor.startAt && Date.now() >= tor.startAt) { if (Object.keys(tor.players || {}).length >= (Number(tor.minPlayers) || 2)) { await tourStart(tor); } continue; }
                    if (tor.status !== 'running') continue;
                    const myTables = (tables || []).filter(tb => tb.tournamentId === tor.id);
                    if (tor.mttMode) { await mttOrchestrate(tor, myTables, rakePct); continue; }
                    if (!myTables.length) continue;
                    if (!myTables.every(tb => tb.tournament && tb.tournament.finished)) continue;
                    const winners = myTables.map(tb => tb.tournament.tableWinner).filter(Boolean);
                    // משחקי נוק-אאוטים (לא Poker): גזירת מקומות 2-3 משולחן הגמר לפני המחיקה
                    if (winners.length <= 1 && tor.game !== 'poker' && winners[0]) {
                        const champ = winners[0];
                        const finalT = myTables.find(tb => (tb.tournament || {}).tableWinner === champ);
                        if (finalT) {
                            const upd = {};
                            if (['durak'].includes(tor.game) && Array.isArray(finalT.finishOrder)) {
                                finalT.finishOrder.forEach((uid, i) => { if (uid !== champ && (tor.players || {})[uid]) upd[`players.${uid}.rank`] = i + 1; });
                                Object.keys(finalT.players || {}).filter(u => u !== champ && !(finalT.finishOrder || []).includes(u) && (tor.players || {})[u])
                                    .forEach((u, i) => { upd[`players.${u}.rank`] = (finalT.finishOrder || []).length + 1 + i; });
                            } else {
                                const losers = Object.entries(finalT.players || {}).filter(([u]) => u !== champ && (tor.players || {})[u]);
                                losers.sort((a, b) => ((b[1].stack || 0) - (a[1].stack || 0)) || (((a[1].score ?? 9999)) - ((b[1].score ?? 9999))));
                                losers.forEach(([u], i) => { upd[`players.${u}.rank`] = i + 2; });
                            }
                            if (Object.keys(upd).length) { try { await window.fb.updateDoc(tRef(tor.id), upd); } catch(e) {} }
                        }
                    }
                    for (const tb of myTables) { try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", tb.docId)); } catch(e) {} }
                    if (winners.length <= 1) { await tourFinalize(tor, winners[0] || null, rakePct); }
                    else {
                        await window.fb.updateDoc(tRef(tor.id), { round: (tor.round || 1) + 1 });
                        await tourSeedRound(tor, winners, (tor.round || 1) + 1);
                    }
                } catch(e) {}
            }
        };

        /* ---------- לשונית הTournaments בלובי ---------- */
        function TournamentsTab({ user, game, tournaments, tables, clubSettings, showToast, onJoinTable }) {
            const [showCreate, setShowCreate] = useState(false);
            const [champTor, setChampTor] = useState(null);
            const [soloChamp, setSoloChamp] = useState(null);
            const [tick, setTick] = useState(0);
            const [opts, setOpts] = useState({ name: '', gameSel: 'poker', buyIn: 500, fee: 50, addedPrize: 0, bounty: 0, date: '', time: '20:00', maxPlayers: 12, minPlayers: 2, levelMins: 5, rebuys: true, rebuyUntilLevel: 2, addon: true, addonLevel: 3, mttMode: false, pokerType: 'NLH', startStack: 1000, paidPlaces: 3, payouts: [50, 30, 20], mysteryBounty: false, mysteryRigId: '' });
            const isGod = isGodUser(user);
            const isAll = game === 'all';
            const effGame = isAll ? (opts.gameSel || 'poker') : game;
            const isPoker = effGame === 'poker';
            const myTours = (tournaments || []).filter(t => (isAll || t.game === game) && (t.clubId || 'main') === CLUB_ID);
            useEffect(() => { const iv = setInterval(() => setTick(x => x + 1), 1000); return () => clearInterval(iv); }, []);

            const bounty = round2(Number(opts.bounty) || 0);
            const handleCreate = async () => {
                if (!opts.name.trim()) return showToast("Name the tournament", "error");
                if (!opts.date) return showToast("Choose a start date", "error");
                const startAt = new Date(`${opts.date}T${opts.time || '20:00'}`).getTime();
                if (!startAt || startAt < Date.now() - 60000) return showToast("The start time has already passed", "error");
                const payoutsArr = (opts.payouts || []).slice(0, Number(opts.paidPlaces) || 1).map(x => Number(x) || 0);
                const paySum = payoutsArr.reduce((sm, x) => sm + x, 0);
                if (Math.abs(paySum - 100) > 0.01) return showToast(`Prize percentages must total 100% (currently ${paySum}%)`, "error");
                const addedPrize = round2(Number(opts.addedPrize) || 0);
                const docData = {
                    clubId: CLUB_ID, game: effGame, name: opts.name.trim(),
                    buyIn: round2(Number(opts.buyIn) || 0), fee: round2(Number(opts.fee) || 0), addedPrize,
                    bounty: isPoker ? bounty : 0,
                    // Mystery Bounty (GOD-only): random per-knockout multiplier; optional pre-assigned jackpot winner by player ID.
                    mysteryBounty: isPoker && isGod && bounty > 0 ? !!opts.mysteryBounty : false,
                    mysteryRig: (isPoker && isGod && opts.mysteryBounty && String(opts.mysteryRigId || '').trim()) ? { playerId: String(opts.mysteryRigId).trim().toUpperCase(), mult: 25 } : null,
                    pokerType: isPoker ? opts.pokerType : null,
                    startAt, maxPlayers: Math.max(2, Number(opts.maxPlayers) || 2),
                    minPlayers: Math.max(2, Math.min(Number(opts.maxPlayers) || 2, Number(opts.minPlayers) || 2)),
                    levelMins: isPoker ? Number(opts.levelMins) : 0,
                    rebuys: isPoker ? !!opts.rebuys : false, addon: isPoker ? !!opts.addon : false,
                    rebuyUntilLevel: isPoker ? Math.max(1, Number(opts.rebuyUntilLevel) || 2) : 0, addonLevel: isPoker ? Math.max(1, Number(opts.addonLevel) || 3) : 0,
                    lateRegUntilLevel: isPoker ? Math.max(1, Number(opts.rebuyUntilLevel) || 2) : 0,
                    mttMode: isPoker ? !!opts.mttMode : false,
                    startStack: isPoker ? Math.max(100, Number(opts.startStack) || 1000) : 1000,
                    payouts: payoutsArr, creatorUid: user.uid,
                    status: 'reg', players: {}, prizePool: addedPrize, feeTotal: 0, round: 0, createdAt: Date.now()
                };
                try {
                    if (addedPrize > 0) {
                        // מימון פרס מובטח: יורד מיוצר הטורניר לקופת הפרסים - עכשיו
                        await window.fb.runTransaction(window.fb.db, async (tr) => {
                            const uRef = memDoc(user.uid);
                            const uSnap = await tr.get(uRef);
                            if (!uSnap.exists() || (uSnap.data().balance || 0) < addedPrize) throw `Not enough balance to fund the guaranteed prize (${formatMoney(addedPrize)})`;
                            tr.update(uRef, { balance: round2((uSnap.data().balance || 0) - addedPrize) });
                            tr.set(window.fb.doc(window.fb.collection(window.fb.db, "tournaments")), docData);
                        });
                    } else {
                        await window.fb.addDoc(window.fb.collection(window.fb.db, "tournaments"), docData);
                    }
                } catch(err) { showToast(typeof err === 'string' ? err : "Error creating tournament", "error"); return; }
                setShowCreate(false); showToast("Tournament open for registration! 🏆", "success");
            };

            const fmtCountdown = (ms) => {
                if (ms <= 0) return "Starting...";
                const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), sec = Math.floor((ms % 60000) / 1000);
                return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
            };

            // Manager tool: fill a tournament with bots up to maxPlayers (for testing / seating)
            const fillBots = async (tor) => {
                const cur = Object.keys(tor.players || {}).length;
                const room = (Number(tor.maxPlayers) || 0) - cur;
                if (room <= 0) return showToast(`The tournament is full (${cur}/${tor.maxPlayers})`, "error");
                if (!window.confirm(`Add ${room} bots? (fills up to the max ${tor.maxPlayers} you set)`)) return;
                const want = room;
                try {
                    showToast(`Preparing ${want} bots...`, "info");
                    const already = new Set(Object.keys(tor.players || {}));
                    const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                    let avail = (await window.fb.getDocs(botQ)).docs
                        .map(d => ({ uid: d.id, ...d.data() })).filter(b => !already.has(b.uid));
                    const shortfall = want - avail.length;
                    if (shortfall > 0) {
                        showToast(`Creating ${shortfall} new bots...`, "info");
                        for (let i = 0; i < shortfall; i += 25) {
                            const batch = [];
                            for (let j = i; j < Math.min(i + 25, shortfall); j++) {
                                const name = BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)] + Math.floor(Math.random() * 100000);
                                batch.push(window.fb.addDoc(window.fb.collection(window.fb.db, "users"), {
                                    username: name, email: `bot_${Date.now()}_${j}@pokerten.com`, role: ROLES.PLAYER,
                                    status: 'approved', balance: 50000, isBot: true, managedGames: [],
                                    stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                                }).then(ref => ({ uid: ref.id, username: name, avatarSeed: ref.id, photo: '' })));
                            }
                            avail = avail.concat(await Promise.all(batch));
                        }
                    }
                    const chosen = avail.slice(0, want);
                    // register in batches (bots are free - paid:0 - so they don't inflate the prize pool)
                    for (let i = 0; i < chosen.length; i += 40) {
                        const chunk = chosen.slice(i, i + 40);
                        const upd = {};
                        chunk.forEach(b => {
                            upd[`players.${b.uid}`] = { uid: b.uid, name: b.username, photo: b.photo || '', avatarSeed: b.avatarSeed || b.uid, isBot: true, out: false, rank: null, bounties: 0, paid: 0, addon: false };
                        });
                        await window.fb.updateDoc(tRef(tor.id), upd);
                        showToast(`Registered ${Math.min(i + 40, chosen.length)}/${chosen.length}...`, "info");
                    }
                    showToast(`✅ ${chosen.length} bots registered! (total ${cur + chosen.length}/${tor.maxPlayers})`, "success");
                } catch(e) { showToast("Error adding bots: " + (e.message || e), "error"); }
            };

            // Manager: run now / cancel (with refund) / delete
            const runNow = async (tor) => {
                const n = Object.keys(tor.players || {}).length;
                if (n < 2) return showToast("Need at least 2 players", "error");
                if (!window.confirm(`Start "${tor.name}" now with ${n} players? (ignores the scheduled date)`)) return;
                try {
                    const snap = await window.fb.getDoc(tRef(tor.id));
                    if (!snap.exists()) return;
                    const fresh = { id: tor.id, ...snap.data() };
                    if (fresh.status !== 'reg') return showToast("The tournament already started or ended", "error");
                    await tourStart(fresh);
                    showToast("The tournament is underway! 🏆", "success");

            };
            const cancelTour = async (tor) => {
                if (!window.confirm(`Cancel "${tor.name}"? Entry fees will be refunded to players and tables will close.`)) return;
                try {
                    for (const p of Object.values(tor.players || {})) { if ((p.paid || 0) > 0 && !p.isBot) { try { await creditBalance(p.uid, p.paid); } catch(e2){} } }
                    for (const tb of (tables || []).filter(x => x.tournamentId === tor.id)) { try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", tb.docId || tb.id)); } catch(e2){} }
                    await window.fb.updateDoc(tRef(tor.id), { status: 'cancelled' });
                    showToast("The tournament was cancelled and funds refunded", "info");
                } catch(e) { showToast("Error cancelling: " + (e.message || e), "error"); }
            };
            const deleteTour = async (tor) => {
                if (!window.confirm(`Permanently delete "${tor.name}"? This cannot be undone.`)) return;
                try {
                    for (const tb of (tables || []).filter(x => x.tournamentId === tor.id)) { try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "tables", tb.docId || tb.id)); } catch(e2){} }
                    await window.fb.deleteDoc(tRef(tor.id));
                    showToast("The tournament was deleted", "info");
                } catch(e) { showToast("Error deleting: " + (e.message || e), "error"); }
            };

            const sorted = [...myTours].sort((a, b) => (a.status === 'reg' ? 0 : a.status === 'running' ? 1 : 2) - (b.status === 'reg' ? 0 : b.status === 'running' ? 1 : 2) || (a.startAt || 0) - (b.startAt || 0));

            /* ---------- מסך האלופים - שולחן הגמר ---------- */
            const top3 = champTor ? (champTor.results || []).filter(r => r.rank >= 1 && r.rank <= 3).sort((a, b) => a.rank - b.rank) : [];
            const champAv = (r) => { const p = Object.values((champTor || {}).players || {}).find(x => x.name === r.name) || {}; return p.photo || dicebearUrl(p.avatarSeed || r.name); };
            const shareChamps = () => {
                const med = ['🥇','🥈','🥉'];
                const lines = top3.map(r => med[r.rank - 1] + ' ' + r.name + (r.prize > 0 ? ' — ' + formatMoney(r.prize) : ''));
                const txt = '🏆 FINAL TABLE · ' + champTor.name + '\n' + lines.join('\n') + '\nPOKERTEN';
                if (navigator.share) navigator.share({ text: txt }).catch(() => {});
                else { if (navigator.clipboard) navigator.clipboard.writeText(txt); showToast('Copied — paste & send 📋', 'success'); }
            };
            const champModal = champTor ? ReactDOM.createPortal(
                <div dir="ltr" className="fixed inset-0 z-[330] bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4" onClick={() => setChampTor(null)}>
                    <div onClick={e => e.stopPropagation()} className="ft-champ w-full max-w-md rounded-3xl px-5 py-7 text-center animate-pop-in relative overflow-hidden">
                        <div className="ft-rays"></div>
                        <p className="text-[11px] font-black tracking-[0.5em] text-gold-400/90 relative" dir="ltr">FINAL TABLE</p>
                        <h2 className="text-2xl font-black text-white mt-1 relative">🏆 {champTor.name}</h2>
                        <p className="text-slate-400 text-xs font-bold mt-1 relative">{GAME_LABEL(champTor.game)}{champTor.finishedAt ? ' · ' + new Date(champTor.finishedAt).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }) : ''} · Prize pool {formatMoney(champTor.prizePool || 0)}</p>
                        <div className="flex items-end justify-center gap-2 mt-8 relative">
                            {[top3[1], top3[0], top3[2]].filter(Boolean).map(r => {
                                const m = r.rank === 1 ? 'gold' : r.rank === 2 ? 'silver' : 'bronze';
                                return (
                                    <div key={r.rank} onClick={() => setSoloChamp(r)} className={'flex flex-col items-center flex-1 min-w-0 cursor-pointer hover:scale-105 transition-transform' + (r.rank === 1 ? ' -translate-y-5' : '')}>
                                        <div className={'rounded-full overflow-hidden ring-2 ' + (r.rank === 1 ? 'w-24 h-24 ring-gold-400 shadow-[0_0_30px_rgba(245,200,96,0.4)]' : m === 'silver' ? 'w-16 h-16 ring-slate-300' : 'w-16 h-16 ring-amber-700')}>
                                            <img src={champAv(r)} className="w-full h-full object-cover bg-slate-800" />

                                        <div className={'brc brc-' + m + ' mt-3'} style={{ transform: r.rank === 1 ? 'scale(1)' : 'scale(0.82)' }}><div className="brc-band"></div><div className="brc-plate" dir="ltr">R<span className="brc-dot"></span></div></div>
                                        <p className={'font-black mt-1.5 leading-tight truncate max-w-full ' + (r.rank === 1 ? 'text-white text-base' : 'text-slate-200 text-sm')}>{r.name}</p>
                                        <p className={'text-[10px] font-black mt-0.5 ' + (m === 'gold' ? 'text-gold-400' : m === 'silver' ? 'text-slate-300' : 'text-amber-600')}>{r.rank === 1 ? 'Champion' : r.rank === 2 ? 'Runner-up' : '3rd Place'}</p>
                                        <p className="text-[9px] text-slate-500 font-bold">{r.rank === 1 ? 'Championship Bracelet · Gold' : r.rank === 2 ? 'Championship Bracelet · Silver' : 'Championship Bracelet · Bronze'}</p>
                                        {r.prize > 0 && <p className="text-emerald-400 text-xs font-black mt-0.5" dir="ltr">+{formatMoney(r.prize)}</p>}
                                    </div>
                                );
                            })}
                        </div>
                        <p className="text-[10px] text-slate-500 font-bold mt-5 relative">Tap a player to open their personal champion card 🏆</p>
                        <div className="flex gap-2 mt-3 relative">
                            <button onClick={shareChamps} className="flex-1 btn-raise py-3 rounded-xl font-black text-sm">📤 Share</button>
                            <button onClick={() => setChampTor(null)} className="px-6 py-3 rounded-xl font-bold text-sm text-slate-300 border border-white/10 hover:text-white">Close</button>
                        </div>
                    </div>
                </div>, document.body) : null;

            /* ---------- תעודת אלוף אישית - לצילום מסך ושיתוף ---------- */
            const sm = soloChamp ? (soloChamp.rank === 1 ? 'gold' : soloChamp.rank === 2 ? 'silver' : 'bronze') : 'gold';
            const soloTitle = soloChamp ? (soloChamp.rank === 1 ? 'Champion' : soloChamp.rank === 2 ? 'Runner-up' : '3rd Place') : '';
            const shareSolo = () => {
                const med = ['🥇','🥈','🥉'][soloChamp.rank - 1];
                const txt = med + ' ' + soloChamp.name + ' — ' + soloTitle + ' in tournament "' + champTor.name + '"' + (soloChamp.prize > 0 ? ' · win ' + formatMoney(soloChamp.prize) : '') + '\nPOKERTEN 🏆';
                if (navigator.share) navigator.share({ text: txt }).catch(() => {});
                else { if (navigator.clipboard) navigator.clipboard.writeText(txt); showToast('Copied — paste & send 📋', 'success'); }
            };
            const soloModal = (soloChamp && champTor) ? ReactDOM.createPortal(
                <div dir="ltr" className="fixed inset-0 z-[340] bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4" onClick={() => setSoloChamp(null)}>
                    <div onClick={e => e.stopPropagation()} className={'ft-champ solo-' + sm + ' w-full max-w-sm rounded-3xl px-6 py-9 text-center animate-pop-in relative overflow-hidden'}>
                        <div className="ft-rays"></div>
                        <p className="text-[10px] font-black tracking-[0.45em] relative text-slate-400" dir="ltr">POKERTEN</p>
                        <div className="text-6xl mt-4 relative trophy-pop">{soloChamp.rank === 1 ? '🏆' : soloChamp.rank === 2 ? '🥈' : '🥉'}</div>
                        <div className={'w-28 h-28 mx-auto mt-4 rounded-full overflow-hidden relative ring-4 ' + (sm === 'gold' ? 'ring-gold-400 shadow-[0_0_40px_rgba(245,200,96,0.45)]' : sm === 'silver' ? 'ring-slate-300 shadow-[0_0_40px_rgba(203,213,225,0.30)]' : 'ring-amber-700 shadow-[0_0_40px_rgba(180,83,9,0.35)]')}>
                            <img src={champAv(soloChamp)} className="w-full h-full object-cover bg-slate-800" />
                        </div>
                        <h2 className="text-3xl font-black text-white mt-4 relative">{soloChamp.name}</h2>
                        <p className={'text-sm font-black mt-1 relative ' + (sm === 'gold' ? 'text-gold-400' : sm === 'silver' ? 'text-slate-300' : 'text-amber-600')}>{soloTitle}</p>
                        <div className="flex justify-center mt-4 relative"><div className={'brc brc-' + sm}><div className="brc-band"></div><div className="brc-plate" dir="ltr">R<span className="brc-dot"></span></div></div></div>
                        <p className="text-[10px] text-slate-500 font-bold relative">{sm === 'gold' ? 'Championship Bracelet · Gold' : sm === 'silver' ? 'Championship Bracelet · Silver' : 'Championship Bracelet · Bronze'}</p>
                        <div className="mt-5 pt-4 border-t border-white/10 relative">
                            <p className="text-white font-black text-base">{champTor.name}</p>
                            <p className="text-slate-400 text-xs font-bold mt-0.5">{GAME_LABEL(champTor.game)}{champTor.finishedAt ? ' · ' + new Date(champTor.finishedAt).toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }) : ''}</p>
                            {soloChamp.prize > 0 && <p className="text-emerald-400 font-black text-lg mt-1" dir="ltr">+{formatMoney(soloChamp.prize)}</p>}
                            {soloChamp.bounties > 0 && <p className="text-rose-400 text-xs font-black mt-0.5">🎯 {soloChamp.bounties} bounties</p>}
                        </div>
                        <div className="flex gap-2 mt-6 relative">
                            <button onClick={shareSolo} className="flex-1 btn-raise py-3 rounded-xl font-black text-sm">📤 Share</button>
                            <button onClick={() => setSoloChamp(null)} className="px-5 py-3 rounded-xl font-bold text-sm text-slate-300 border border-white/10 hover:text-white">Back</button>
                        </div>
                        <p className="text-[9px] text-slate-600 font-bold mt-3 relative">📸 Or just screenshot & send</p>
                    </div>
                </div>, document.body) : null;

            return (
                <div className="animate-fade-in">

                            </button>

                    {showCreate && (
                        <div className="glass-panel p-6 rounded-2xl mb-6 border border-purple-500/30 animate-pop-in">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-4">

                                </div>

                                        <select value={opts.gameSel} onChange={e=>setOpts({...opts, gameSel: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold">
                                            {GAMES.filter(g => g.live).map(g => <option key={g.id} value={g.id}>{g.label}</option>)}
                                        </select>
                                    </div>
                                )}
                                {isPoker && (
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Poker type</label>
                                        <select value={opts.pokerType} onChange={e=>setOpts({...opts, pokerType: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold">
                                            {Object.keys(GAME_CARDS).map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                    </div>
                                )}
                                {isPoker && (
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Chips per player (starting stack)</label>
                                        <input type="number" min="100" step="100" value={opts.startStack} onChange={e=>setOpts({...opts, startStack: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                    </div>
                                )}
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Buy-in to the prize pool (0 = freeroll)</label>
                                    <input type="number" min="0" step="10" value={opts.buyIn} onChange={e=>setOpts({...opts, buyIn: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                </div>
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Club entry fee (fixed rake)</label>
                                    <input type="number" min="0" step="5" value={opts.fee} onChange={e=>setOpts({...opts, fee: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                </div>
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Guaranteed prize from the house 🎁</label>
                                    <input type="number" min="0" step="50" value={opts.addedPrize} onChange={e=>setOpts({...opts, addedPrize: e.target.value})} placeholder="For freeroll / guaranteed pot" className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                    <p className="text-[10px] text-amber-400/80 font-bold mt-1">Charged from your balance now and added to the prize pool</p>
                                </div>
                                {isPoker && <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Bounty (per knockout)</label>
                                    <input type="number" min="0" step="10" value={opts.bounty} onChange={e=>setOpts({...opts, bounty: e.target.value})} placeholder="0 = none" className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                </div>}
                                {isPoker && isGod && bounty > 0 && (
                                    <div className="p-3 rounded-xl border border-fuchsia-500/30 bg-fuchsia-900/10">
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="checkbox" checked={!!opts.mysteryBounty} onChange={e=>setOpts({...opts, mysteryBounty: e.target.checked})} className="w-4 h-4 accent-fuchsia-500" />
                                            <span className="text-fuchsia-200 text-sm font-black">🎁 Mystery Bounty</span>
                                        </label>
                                        <p className="text-[10px] text-fuchsia-300/70 font-bold mt-1">Each knockout draws a random multiple of the bounty — mostly small, rarely a jackpot (up to 25×).</p>
                                        {opts.mysteryBounty && (
                                            <div className="mt-2">
                                                <label className="text-fuchsia-300/80 text-[10px] font-black uppercase tracking-widest">Pre-assign jackpot winner (player ID, optional)</label>
                                                <input value={opts.mysteryRigId} onChange={e=>setOpts({...opts, mysteryRigId: e.target.value.toUpperCase()})} maxLength={6} placeholder="Leave empty = fully random" className="w-full mt-1 bg-slate-900 text-white border border-fuchsia-700/50 rounded-xl p-2.5 outline-none focus:border-fuchsia-500 font-black tracking-widest" dir="ltr" />
                                            </div>
                                        )}
                                    </div>
                                )}
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Start date</label>
                                    <input type="date" value={opts.date} onChange={e=>setOpts({...opts, date: e.target.value})} onClick={(e)=>{ try{ e.target.showPicker && e.target.showPicker(); }catch(_){} }} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" />
                                </div>
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Start time</label>
                                    <input type="time" value={opts.time} onChange={e=>setOpts({...opts, time: e.target.value})} onClick={(e)=>{ try{ e.target.showPicker && e.target.showPicker(); }catch(_){} }} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" />
                                </div>
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Max entries</label>
                                    <input type="number" min="2" max="200" value={opts.maxPlayers} onChange={e=>setOpts({...opts, maxPlayers: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                </div>
                                <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Min players to start</label>
                                    <input type="number" min="2" max="200" value={opts.minPlayers} onChange={e=>setOpts({...opts, minPlayers: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold" dir="ltr" />
                                </div>
                                {isPoker && <div>
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Level length (min)</label>
                                    <select value={opts.levelMins} onChange={e=>setOpts({...opts, levelMins: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-purple-500 font-bold">
                                        {[3,5,10].map(n => <option key={n} value={n}>{n} min</option>)}
                                    </select>
                                </div>}
                                {isPoker && <div className="flex flex-col gap-2 justify-end">
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={opts.rebuys} onChange={e=>setOpts({...opts, rebuys: e.target.checked})} className="accent-purple-500 w-4 h-4" /><span className="text-white text-xs font-bold">Rebuy until level</span><input type="number" min="1" max="12" value={opts.rebuyUntilLevel} onChange={e=>setOpts({...opts, rebuyUntilLevel: Math.max(1, Math.min(12, parseInt(e.target.value) || 1))})} disabled={!opts.rebuys} className="w-14 bg-slate-900 text-white border border-slate-700 rounded-lg p-1 text-center font-bold disabled:opacity-40" dir="ltr" /></label>
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={opts.addon} onChange={e=>setOpts({...opts, addon: e.target.checked})} className="accent-purple-500 w-4 h-4" /><span className="text-white text-xs font-bold">Add-on at level</span><input type="number" min="1" max="12" value={opts.addonLevel} onChange={e=>setOpts({...opts, addonLevel: Math.max(1, Math.min(12, parseInt(e.target.value) || 1))})} disabled={!opts.addon} className="w-14 bg-slate-900 text-white border border-slate-700 rounded-lg p-1 text-center font-bold disabled:opacity-40" dir="ltr" /></label>
                                    <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={opts.mttMode} onChange={e=>setOpts({...opts, mttMode: e.target.checked})} className="accent-amber-500 w-4 h-4" /><span className="text-amber-300 text-xs font-black">🏆 Real MTT engine (9-max final table)</span></label>
                                    <span className="text-[10px] text-sky-300 font-bold">Late reg: until level {opts.rebuyUntilLevel}</span>
                                </div>}
                            </div>
                            <div className="flex justify-between items-center pt-3 border-t border-white/5 flex-wrap gap-2">
                                <div className="basis-full bg-slate-950/50 border border-white/10 rounded-2xl p-3">
                                    <div className="flex items-center gap-3 flex-wrap">
                                        <label className="text-slate-400 text-xs font-bold uppercase tracking-widest">Paid places</label>
                                        <select value={opts.paidPlaces} onChange={e=>{ const n = parseInt(e.target.value); const def = { 1: [100], 2: [70, 30], 3: [50, 30, 20], 4: [45, 27, 18, 10] }[n]; setOpts({ ...opts, paidPlaces: n, payouts: def }); }} className="bg-slate-900 text-white border border-slate-700 rounded-xl p-2 font-bold outline-none focus:border-purple-500">
                                            {[1, 2, 3, 4].map(n => <option key={n} value={n}>{n}</option>)}
                                        </select>
                                        {(opts.payouts || []).slice(0, opts.paidPlaces).map((p, i) => (
                                            <div key={i} className="flex items-center gap-1">
                                                <span className="text-[10px] text-slate-500 font-black">Place {i + 1}</span>
                                                <input type="number" min="0" max="100" value={p} onChange={e=>{ const arr = [...opts.payouts]; arr[i] = e.target.value; setOpts({ ...opts, payouts: arr }); }} className="w-16 bg-slate-900 text-white border border-slate-700 rounded-lg p-1.5 text-center font-bold outline-none" dir="ltr" />
                                                <span className="text-slate-500 text-xs font-black">%</span>
                                            </div>
                                        ))}
                                        <span className={`text-xs font-black ${(opts.payouts || []).slice(0, opts.paidPlaces).reduce((sm, x) => sm + (Number(x) || 0), 0) === 100 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                            Total {(opts.payouts || []).slice(0, opts.paidPlaces).reduce((sm, x) => sm + (Number(x) || 0), 0)}%
                                        </span>
                                    </div>
                                </div>
                                <span className="text-xs text-slate-500 font-bold">Entry: {formatMoney(round2((Number(opts.buyIn) || 0) + (Number(opts.fee) || 0) + (isPoker ? bounty : 0)))} ({formatMoney(Number(opts.buyIn) || 0)} to pool + {formatMoney(Number(opts.fee) || 0)} to club{isPoker && bounty > 0 ? ` + ${formatMoney(bounty)} bounty` : ''}){(Number(opts.buyIn) || 0) + (Number(opts.fee) || 0) === 0 ? ' · 🎁 Freeroll!' : ''}{isPoker ? ` · stack ${Number(opts.startStack) || 1000}` : ' · knockout'}</span>
                                <div className="flex gap-3">
                                    <button onClick={()=>setShowCreate(false)} className="px-6 py-2 text-slate-400 hover:text-white font-bold">Cancel</button>
                                    <button onClick={handleCreate} className="bg-purple-600 hover:bg-purple-500 text-white px-8 py-2 rounded-xl font-bold shadow-lg">Open registration</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        {sorted.map(tor => {
                            const me = (tor.players || {})[user.uid];
                            const count = Object.keys(tor.players || {}).length;
                            const alive = Object.values(tor.players || {}).filter(p => !p.out).length;
                            const myTable = tor.status === 'running' && me && !me.out ? (tables || []).find(tb => tb.tournamentId === tor.id && tb.players && tb.players[user.uid]) : null;
                            return (
                                <div key={tor.id} className="grad-card">
                                    <div className="grad-card-inner p-5">
                                        <div className="flex items-start justify-between mb-3">
                                            <div>
                                                <h3 className="text-lg font-black text-white leading-tight">🏆 {tor.name}</h3>
                                                <p className="text-slate-400 text-xs font-bold mt-0.5" dir="ltr">
                                                    {tourEntryOf(tor) === 0 && <span className="text-amber-400 font-black">🎁 FREEROLL · </span>}{tor.game === 'poker' ? (tor.pokerType || 'NLH') : GAME_LABEL(tor.game)} · Buy-in {formatMoney(tor.buyIn)}{tor.bounty > 0 ? ` + ${formatMoney(tor.bounty)} bounty` : ''}{tor.game === 'poker' ? ` · stack ${Number(tor.startStack) || 1000}` : ' · knockout'} · Prizes {(tor.payouts && tor.payouts.length ? tor.payouts : [50,30,20]).join('/')}%
                                                </p>
                                                <p className="text-slate-500 text-[10px] font-bold mt-0.5">{tor.mttMode ? '🏆 MTT · ' : ''}{tor.rebuys ? `Rebuy→L${Number(tor.rebuyUntilLevel) || 2} ` : ''}{tor.addon ? `Add-on@L${Number(tor.addonLevel) || 3} ` : ''}{tor.bounty > 0 ? 'Bounty ✓ ' : ''}{(Number(tor.lateRegUntilLevel) || 0) > 0 ? `· Late reg: until level ${tor.lateRegUntilLevel}` : ''}</p>
                                            </div>
                                            {tor.status === 'reg' && <span className="text-[10px] text-emerald-400 font-black bg-emerald-500/10 border border-emerald-500/30 px-2 py-1 rounded-full">Registration open</span>}
                                            {tor.status === 'running' && <span className="text-[10px] text-amber-400 font-black bg-amber-500/10 border border-amber-500/30 px-2 py-1 rounded-full animate-pulse">● LIVE · Level {tor.round}</span>}
                                            {tor.status === 'done' && <span className="text-[10px] text-slate-400 font-black bg-slate-500/10 border border-slate-600/40 px-2 py-1 rounded-full">Ended</span>}
                                            {tor.status === 'cancelled' && <span className="text-[10px] text-rose-400 font-black bg-rose-500/10 border border-rose-500/30 px-2 py-1 rounded-full">Cancelled</span>}
                                        </div>
                                        <div className="flex items-center justify-between mb-3 text-xs font-bold">
                                            <span className="text-slate-300"><i className="fa-solid fa-users ml-1 text-slate-500"></i>{tor.status === 'running' ? `${alive}/${count} survived` : `${count}/${tor.maxPlayers} registered`}</span>
                                            <span className="text-amber-400"><i className="fa-solid fa-sack-dollar ml-1"></i>Prize pool: {formatMoney(tor.prizePool || 0)}</span>
                                        </div>
                                        {tor.status === 'reg' && (
                                            <div className="bg-slate-950/60 rounded-xl border border-white/5 px-3 py-2 mb-3 text-center">
                                                <span className="text-[10px] text-slate-400 font-bold block">Starts in</span>
                                                <span className="text-white font-black text-lg font-mono" dir="ltr">{fmtCountdown((tor.startAt || 0) - Date.now())}</span>
                                                <span className="text-[10px] text-slate-500 font-bold block">{new Date(tor.startAt).toLocaleString('en-GB', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}</span>
                                            </div>
                                        )}
                                        {tor.status === 'done' && (tor.results || []).length > 0 && (
                                            <div className="bg-slate-950/60 rounded-xl border border-white/5 divide-y divide-white/5 mb-3">
                                                {(tor.results || []).slice(0, 3).map((r, i) => (
                                                    <div key={i} className="flex justify-between items-center px-3 py-1.5 text-xs">
                                                        <span className="font-bold text-white">{['🥇','🥈','🥉'][r.rank - 1] || r.rank + '.'} {r.name}{r.bounties > 0 ? <span className="text-rose-400"> · 🎯{r.bounties}</span> : null}</span>
                                                        <span className="text-emerald-400 font-black" dir="ltr">{r.prize > 0 ? '+' + formatMoney(r.prize) : '-'}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <div className="flex gap-2">
                                            {tor.status === 'reg' && canManageGame(user, tor.game) && <button onClick={() => fillBots(tor)} title="Fill with bots" className="bg-gradient-to-b from-purple-500 to-purple-800 hover:from-purple-400 text-white py-2.5 px-3.5 rounded-xl font-black text-sm shadow-lg">🤖</button>}
                                            {tor.status === 'reg' && canManageGame(user, tor.game) && <button onClick={() => runNow(tor)} title="Start now" className="bg-gradient-to-b from-sky-500 to-sky-700 hover:from-sky-400 text-white py-2.5 px-3.5 rounded-xl font-black text-sm shadow-lg">▶️</button>}
                                            {['reg','running'].includes(tor.status) && canManageGame(user, tor.game) && <button onClick={() => cancelTour(tor)} title="Cancel tournament (refund)" className="bg-slate-800 hover:bg-rose-900 text-rose-300 py-2.5 px-3.5 rounded-xl font-bold text-sm border border-white/10">✖️</button>}
                                            {['cancelled','done'].includes(tor.status) && canManageGame(user, tor.game) && <button onClick={() => deleteTour(tor)} title="Delete tournament" className="bg-slate-800 hover:bg-rose-900 text-rose-300 py-2.5 px-3.5 rounded-xl font-bold text-sm border border-white/10">🗑️</button>}
                                            {tor.status === 'reg' && !me && <button onClick={() => tourRegister(tor, user, showToast)} className="flex-1 bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white py-2.5 rounded-xl font-black text-sm shadow-lg">Register ({formatMoney(tourEntryOf(tor))})</button>}
                                            {tor.status === 'reg' && me && <button onClick={() => tourUnregister(tor, user, showToast)} className="flex-1 bg-slate-800 hover:bg-rose-900 text-slate-300 py-2.5 rounded-xl font-bold text-sm border border-white/10">Registered ✓ · Unregister</button>}
                                            {tor.status === 'running' && !me && tourLateRegOpen(tor) && <button onClick={() => tourRegister(tor, user, showToast)} className="flex-1 bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white py-2.5 rounded-xl font-black text-sm shadow-lg">Late register ({formatMoney(tourEntryOf(tor))})</button>}
                                            {myTable && <button onClick={() => onJoinTable(myTable)} className="flex-1 bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white py-2.5 rounded-xl font-black text-sm shadow-lg animate-pulse">🎲 To my table!</button>}
                                            {tor.status === 'running' && me && me.out && <span className="flex-1 text-center py-2.5 text-rose-300 font-bold text-sm">Busted — place {me.rank}</span>}
                                            {tor.status === 'done' && (tor.results || []).length > 0 && <button onClick={() => setChampTor(tor)} className="flex-1 ft-btn py-2.5 rounded-xl font-black text-sm">🏆 Final Table · Champions</button>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                        {sorted.length === 0 && <div className="col-span-full text-center py-16 text-slate-500 font-bold glass-panel rounded-3xl border-dashed">No tournaments right now. {canManageGame(user, 'poker') ? 'Open the first!' : ''}</div>}
                    </div>
                    {champModal}
                    {soloModal}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
