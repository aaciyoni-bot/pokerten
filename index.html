        function LobbyView({ user, tables, tournaments, clubSettings, tab, setTab, onJoinPoker, onJoinDurak, onJoinOfc, onCreatePoker, showToast }) {
            const [showCreateDurak, setShowCreateDurak] = useState(false);
            const [durakOpts, setDurakOpts] = useState({ deckSize: 36, variant: 'podkidnoy', buyIn: 500, maxPlayers: 4, bluff: false });

            const pokerTables = tables.filter(t => t.type === 'poker' && !t.tournamentId && (t.clubId || 'main') === CLUB_ID).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
            const [pokFilter, setPokFilter] = useState('all'); // all | <variant> | tours
            // Always show the full variant set (incl. all Omaha types) so players can filter by any game, even with no open table right now
            const ALL_POKER_VARIANTS = ['NLH', 'Omaha 4', 'Omaha 5', 'Omaha 6', 'Pineapple'];
            const variantCount = (v) => pokerTables.filter(t => ((t.settings || {}).baseGameType || 'NLH') === v).length;
            const shownPoker = pokFilter === 'all' ? pokerTables : pokFilter === 'tours' ? [] : pokerTables.filter(t => ((t.settings || {}).baseGameType || 'NLH') === pokFilter);
            const showPokerTours = pokFilter === 'all' || pokFilter === 'tours';
            const durakTables = tables.filter(t => t.type === 'durak' && !t.tournamentId && (t.clubId || 'main') === CLUB_ID).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
            const ofcTables = tables.filter(t => t.type === 'ofc' && !t.tournamentId && (t.clubId || 'main') === CLUB_ID).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
            const [showCreateOfc, setShowCreateOfc] = useState(false);
            const [ofcOpts, setOfcOpts] = useState({ buyIn: 100, stake: 5, maxPlayers: 2 });
            const createOfc = async () => {
                try {
                    const bi = Math.max(1, Number(ofcOpts.buyIn) || 100);
                    const stk = Math.min(bi, Math.max(0.25, Number(ofcOpts.stake) || 5));
                    await window.fb.addDoc(window.fb.collection(window.fb.db, "tables"), ofcTableDoc(user.uid, { buyIn: bi, stake: round2(stk), maxPlayers: Math.min(3, Math.max(2, Number(ofcOpts.maxPlayers) || 2)), rakePercent: clubSettings?.rakePct ?? DEFAULT_RAKE_PCT }));
                    setShowCreateOfc(false);
                    showToast("Chinese poker table opened! 🀄", "success");
                } catch(e) { showToast("Error", "error"); }
            };
            // בונוס יומי - גלגל מזל (הסכומים בTrumpת בעל הקלאב, ההסתברויות קבועות)
            const bwConf = clubSettings?.bonusWheel || {};
            const bonusEnabled = bwConf.enabled !== false;
            const BONUS_SEGS = (Array.isArray(bwConf.prizes) && bwConf.prizes.length === 8) ? bwConf.prizes.map(x => Number(x) || 0) : [5, 10, 20, 30, 50, 75, 100, 200];
            // 80% ראשון · 10% שני · מדורג · האחרון 1 ל-200 סיבובים
            const BONUS_W = [800, 100, 35, 25, 18, 12, 5, 5];
            const [bonusOpen, setBonusOpen] = useState(false);
            // כרטיס גירוד שבועי
            const SCR_HOURS = 7 * 24;
            const [scrOpen, setScrOpen] = useState(false);
            const [scr, setScr] = useState(null); // {prize, grid, revealed}
            const scratchReady = bonusEnabled && (!user.lastScratchAt || (Date.now() - user.lastScratchAt) >= SCR_HOURS * 3600 * 1000);
            const SCR_SYM = { 10: '🍀', 15: '💎', 200: '👑', 400: '💰' };
            const buildGrid = (prize) => {
                const fillers = ['🎲', '🃏', '🎰', '⭐', '🔔', '7️⃣'].filter(f => f !== SCR_SYM[prize]);
                const cells = [SCR_SYM[prize], SCR_SYM[prize], SCR_SYM[prize]];
                const cnt = {};
                while (cells.length < 9) {
                    const f = fillers[Math.floor(Math.random() * fillers.length)];
                    if ((cnt[f] || 0) >= 2) continue;
                    cnt[f] = (cnt[f] || 0) + 1;
                    cells.push(f);
                }
                for (let k = cells.length - 1; k > 0; k--) { const j = Math.floor(Math.random() * (k + 1)); [cells[k], cells[j]] = [cells[j], cells[k]]; }
                return cells;
            };
            const claimScratch = async () => {
                try {
                    if (!scratchReady) throw "Not time yet";
                    let prize = 0, fromBank = false;
                    const ownerUid = (window.__club || {}).ownerUid;
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const mRef = memDoc(user.uid);
                        const mSnap = await tr.get(mRef);
                        if (!mSnap.exists()) throw "No membership";
                        const lastS = mSnap.data().lastScratchAt || 0;
                        if (Date.now() - lastS < SCR_HOURS * 3600 * 1000) throw "Already scratched this week";
                        const cRef = window.fb.doc(window.fb.db, "clubs", CLUB_ID);
                        const cSnap = await tr.get(cRef);
                        const cycleKey = String(cycleStartIL(0));
                        let sc = (cSnap.exists() && cSnap.data().scratch) || {};
                        if (sc.key !== cycleKey) sc = { key: cycleKey, won400: false, won200: false };
                        // הגרלה: 80% עשרה · 15% חמש-עשרה · 0.5% ארבע מאות (אחד בשבוע) · 1% מאתיים (אחד בשבוע) · השאר עשרה
                        const r = Math.random() * 1000;
                        if (r < 800) prize = 10;
                        else if (r < 950) prize = 15;
                        else if (r < 955) prize = !sc.won400 ? 400 : 10;
                        else if (r < 965) prize = !sc.won200 ? 200 : 10;
                        else prize = 10;
                        if (prize === 400) sc = { ...sc, won400: true };
                        if (prize === 200) sc = { ...sc, won200: true };
                        if (ownerUid && ownerUid !== user.uid) {
                            const oRef = memDoc(ownerUid);
                            const oSnap = await tr.get(oRef);
                            if (!oSnap.exists() || (oSnap.data().balance || 0) < prize) throw "Club bank is empty right now - try again later";
                            tr.update(oRef, { balance: round2((oSnap.data().balance || 0) - prize), bonusPaid: round2((oSnap.data().bonusPaid || 0) + prize) });
                            tr.update(mRef, { balance: round2((mSnap.data().balance || 0) + prize), lastScratchAt: Date.now() });
                            fromBank = true;
                        } else {
                            tr.update(mRef, { lastScratchAt: Date.now() });
                        }
                        tr.update(cRef, { scratch: sc });
                    });
                    setScr({ prize, grid: buildGrid(prize), revealed: false, fromBank });
                    playSnd('deal');
                } catch(e) { showToast(typeof e === 'string' ? e : "Error", "error"); }
            };
            const revealScratch = () => {
                setScr(sc => sc ? { ...sc, revealed: true } : sc);

                        {/* ===== טאב Durak ===== */}
                        {tab === 'durak' && (

                                    <h2 className="text-xl font-black text-white">Tables Durak</h2>
                                    {canManageGame(user, 'durak') && (
                                        <button onClick={()=>setShowCreateDurak(!showCreateDurak)} className="bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 text-white px-5 py-2.5 rounded-xl font-bold shadow-[0_6px_20px_rgba(59,130,246,0.3)] text-sm">
                                            <i className="fa-solid fa-plus ml-2"></i>New table
                                        </button>
                                    )}
                                </div>

                                {showCreateDurak && (
                                    <div className="glass-panel p-6 rounded-2xl mb-6 border border-blue-500/30 animate-pop-in">
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-4">
                                            <div>
                                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Deck</label>
                                                <select value={durakOpts.deckSize} onChange={e=>setDurakOpts({...durakOpts, deckSize: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500 font-bold">
                                                    <option value={36}>36 cards (6-A)</option><option value={52}>52 cards</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Type</label>
                                                <select value={durakOpts.variant} onChange={e=>setDurakOpts({...durakOpts, variant: e.target.value})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500 font-bold">
                                                    <option value="podkidnoy">Classic (Podkidnoy)</option><option value="perevodnoy">Transfer (Perevodnoy)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Buy-in</label>
                                                <select value={durakOpts.buyIn} onChange={e=>setDurakOpts({...durakOpts, buyIn: parseFloat(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500 font-bold">
                                                    {[50,100,250,500,1000,2500,5000].map(b => <option key={b} value={b}>{formatMoney(b)}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Players</label>
                                                <select value={durakOpts.maxPlayers} onChange={e=>setDurakOpts({...durakOpts, maxPlayers: parseInt(e.target.value)})} className="w-full bg-slate-900 text-white border border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500 font-bold">
                                                    {[2,3,4,5,6].map(n => <option key={n} value={n}>{n} Players</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center pt-3 border-t border-white/5">
                                            <label className="flex items-center gap-2 cursor-pointer bg-slate-900/70 border border-rose-500/30 rounded-xl px-3 py-2">
                                                <input type="checkbox" checked={!!durakOpts.bluff} onChange={e=>setDurakOpts({...durakOpts, bluff: e.target.checked})} className="accent-rose-500 w-4 h-4" />
                                                <span className="text-rose-300 text-xs font-black">🎭 Bluff mode</span>
                                                <span className="text-slate-500 text-[10px] font-bold hidden sm:inline">Attack with a face-down card, defender doubts or accepts</span>
                                            </label>
                                            <span className="text-xs text-slate-500 font-bold">The loser (the Durak) pays the winners</span>
                                            <div className="flex gap-3">
                                                <button onClick={()=>setShowCreateDurak(false)} className="px-6 py-2 text-slate-400 hover:text-white font-bold">Cancel</button>
                                                <button onClick={handleCreateDurak} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-xl font-bold shadow-lg">Confirm & open</button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                    {durakTables.map(t => {
                                        const s = t.settings || {};
                                        return (
                                            <div key={t.docId} className="grad-card cursor-pointer" onClick={()=>onJoinDurak(t)}>
                                                <div className="grad-card-inner p-5 relative">
                                                    {canManageGame(user, 'durak') && (
                                                        <button onClick={(e) => handleDelete(e, t)} className="absolute top-3 left-3 w-8 h-8 rounded-lg bg-slate-800/80 text-slate-500 hover:text-rose-400 flex items-center justify-center z-10"><i className="fa-solid fa-trash text-xs"></i></button>
                                                    )}
                                                    {t.players && t.players[user.uid] && <div className="absolute top-3 right-3 bg-emerald-500/20 border border-emerald-500 text-emerald-400 text-[10px] px-2 py-0.5 rounded-full animate-pulse font-bold z-10">🟢 You're seated here</div>}
                                                    <div className="flex items-center gap-3 mb-4 mt-3">
                                                        <div className="w-11 h-11 rounded-xl bg-blue-900/30 border border-blue-700/40 flex items-center justify-center"><i className="fa-solid fa-chess-king text-blue-400"></i></div>
                                                        <div>
                                                            <h3 className="text-lg font-black text-white leading-tight">Durak {s.variant === 'perevodnoy' ? 'Transfer' : 'Classic'}</h3>
                                                            <p className="text-slate-400 text-xs font-bold" dir="ltr">Buy-in {formatMoney(s.buyIn)} · {s.deckSize} cards</p>
                                                        </div>
                                                        {t.status === 'playing' && <span className="mr-auto text-[10px] text-amber-400 font-black bg-amber-500/10 border border-amber-500/30 px-2 py-1 rounded-full">● LIVE</span>}
                                                    </div>
                                                    <div className="flex justify-between items-center">
                                                        <AvatarsRow players={t.players} />
                                                        <span className="text-blue-400 font-bold text-xs bg-blue-900/20 border border-blue-700/40 px-3 py-1 rounded-full">{Object.keys(t.players||{}).length}/{s.maxPlayers || 6}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {durakTables.length === 0 && <div className="col-span-full text-center py-16 text-slate-500 font-bold glass-panel rounded-3xl border-dashed">No open Durak tables.</div>}
                                </div>
                                <div className="border-t border-white/5 my-8"></div>
                                <TournamentsTab game="durak" user={user} tournaments={tournaments} tables={tables} clubSettings={clubSettings} showToast={showToast} onJoinTable={onJoinDurak} />
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        /* ================================================================
           Backoffice - דשבורד, Roles לפי משחקים, Settings רייק
           ================================================================ */
        /* Weekly Settlement (read-only view). Owner/super-admin see all agents; an agent sees only their own players (read-only).
           Agent = % of the rake their players generate. Owner rake = gross rake − agent cuts. In clubs owned by the super-admin
           an extra 10% house-expenses line is shown ONLY to the super-admin. No mutations here — pure accounting view. */
        function SettlementSection({ user, showToast }) {
            const showToastG = showToast || ((m) => {});
            const [cyc, setCyc] = useState(0);
            const [aLog, setALog] = useState(null);
            const [gLog, setGLog] = useState(null);
            const [mems, setMems] = useState(null);
            const [busy, setBusy] = useState(false);
            const [transferFor, setTransferFor] = useState(null); // player membership being reassigned
            const [closed, setClosed] = useState((window.__club || {}).closedWeeks || {});
            useEffect(() => {
                (async () => {
                    try {
                        const clubWhere = window.fb.where("clubId", "==", CLUB_ID);
                        const [aS, gS, mS] = await Promise.all([
                            window.fb.getDocs(window.fb.query(window.fb.collection(window.fb.db, "agentLog"), clubWhere)),
                            window.fb.getDocs(window.fb.query(window.fb.collection(window.fb.db, "gameLog"), clubWhere)),
                            window.fb.getDocs(window.fb.query(window.fb.collection(window.fb.db, "memberships"), clubWhere)),
                        ]);
                        setALog(aS.docs.map(d => d.data()));
                        setGLog(gS.docs.map(d => d.data()));
                        setMems(mS.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => !m.isBot));
                    } catch (e) { setALog([]); setGLog([]); setMems([]); }
                })();
            }, []);
            if (aLog === null || gLog === null || mems === null) return <div className="text-center py-8 text-amber-500"><i className="fa-solid fa-spinner fa-spin text-2xl"></i></div>;

            const start = cycleStartIL(cyc), end = cyc === 0 ? Infinity : cycleStartIL(cyc - 1);
            const inCyc = (at) => (at || 0) >= start && (at || 0) < end;
            const cuts = {}; let houseGross = 0;
            aLog.forEach(e => { if (!inCyc(e.at)) return; if (e.kind === 'club') houseGross = round2(houseGross + (e.amount || 0)); else if (e.agentUid) cuts[e.agentUid] = round2((cuts[e.agentUid] || 0) + (e.amount || 0)); });
            const pres = {};
            gLog.forEach(e => { if (!inCyc(e.at) || !e.uid) return; pres[e.uid] = round2((pres[e.uid] || 0) + (e.profit || 0)); });
            const totalCuts = round2(Object.values(cuts).reduce((a, b) => a + b, 0));
            const grossRake = round2(houseGross + totalCuts);
            const club = window.__club || {};
            const iOwn = club.ownerUid === user.uid;
            const isOwnerView = iOwn || user.email === SUPER_ADMIN_EMAIL || user.role === ROLES.SUPER_ADMIN;
            const showHouse = isGodUser(user) && iOwn;
            const houseCut = showHouse ? round2(grossRake * 0.10) : 0;
            const ownerNet = round2(houseGross - houseCut);
            const playersByAgent = {};
            mems.forEach(m => { if (!m.agentUid) return; (playersByAgent[m.agentUid] = playersByAgent[m.agentUid] || []).push(m); });
            let agents = mems.filter(m => [ROLES.AGENT, ROLES.MANAGER, ROLES.CLUB_OWNER].includes(m.role) || cuts[m.uid] || playersByAgent[m.uid]);
            if (!isOwnerView) agents = agents.filter(a => a.uid === user.uid); // an agent sees only themselves
            agents.sort((a, b) => (cuts[b.uid] || 0) - (cuts[a.uid] || 0));
            const cycLabel = cyc === 0 ? 'Current week' : cyc === 1 ? 'Previous week' : `${cyc} weeks ago`;

            const exportCSV = () => {
                const rows = [['Cycle', cycLabel], [], ['Agent', 'Player', 'Player ID', 'Real name', 'Result', 'Agent %']];
                agents.forEach(a => {
                    (playersByAgent[a.uid] || []).forEach(p => rows.push([a.username, p.username, p.playerId || '', p.googleName || '', formatMoney(pres[p.uid] || 0), (p.agentPct || 0) + '%']));
                    rows.push([a.username, '→ agent cut (rake)', '', '', formatMoney(cuts[a.uid] || 0), '']);
                });
                rows.push([], ['Gross rake', formatMoney(grossRake)], ['Agent cuts', formatMoney(totalCuts)], ['Owner rake share', formatMoney(houseGross)]);
                if (showHouse) { rows.push(['House expenses (10%)', formatMoney(houseCut)], ['Owner net', formatMoney(ownerNet)]); }
                downloadCSV(rows, `settlement_${cycLabel.replace(/ /g, '_')}.csv`);
            };

            const weekLocked = !!closed[String(start)];

            // ── Owner-only actions (agents never reach these; UI is gated on isOwnerView too) ──
            const editResult = async (p) => {
                if (!isOwnerView || weekLocked) return;
                const cur = round2(pres[p.uid] || 0);
                const raw = window.prompt(`Corrected result for ${p.username} this cycle (currently ${formatMoney(cur)}):`, String(cur));
                if (raw === null) return;
                const next = Number(raw);
                if (isNaN(next)) return showToastG("Invalid amount", "error");
                const delta = round2(next - cur);
                if (delta === 0) return;
                setBusy(true);
                try {
                    const entry = { uid: p.uid, username: p.username, clubId: CLUB_ID, game: 'adjust', profit: delta, at: Date.now(), by: user.username, note: 'settlement correction' };
                    await window.fb.addDoc(window.fb.collection(window.fb.db, "gameLog"), entry);
                    setGLog(prev => [...(prev || []), entry]);
                    showToastG(`Result corrected (${delta > 0 ? '+' : ''}${formatMoney(delta)})`, "success");
                } catch (e) { showToastG("Correction failed", "error"); }
                setBusy(false);
            };
            const editPct = async (p) => {
                if (!isOwnerView || weekLocked) return;
                const raw = window.prompt(`Agent % for ${p.username} (0-100):`, String(p.agentPct || 0));
                if (raw === null) return;
                const pct = Math.max(0, Math.min(100, Number(raw)));
                if (isNaN(pct)) return showToastG("Invalid %", "error");
                setBusy(true);
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", p.id), { agentPct: pct });
                    setMems(prev => prev.map(m => m.id === p.id ? { ...m, agentPct: pct } : m));
                    showToastG(`Agent % set to ${pct}%`, "success");
                } catch (e) { showToastG("Update failed", "error"); }
                setBusy(false);
            };
            const reassign = async (p, agentUid) => {
                if (!isOwnerView || weekLocked) return;
                setBusy(true);
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", p.id), { agentUid: agentUid || null });
                    setMems(prev => prev.map(m => m.id === p.id ? { ...m, agentUid: agentUid || null } : m));
                    setTransferFor(null);
                    showToastG(agentUid ? "Player transferred" : "Player unassigned", "success");
                } catch (e) { showToastG("Transfer failed", "error"); }
                setBusy(false);
            };
            const closeWeek = async () => {
                if (!isOwnerView || weekLocked) return;
                if (!window.confirm(`Close ${cycLabel} and lock its results? This freezes the settlement so figures can't change afterward.`)) return;
                setBusy(true);
                try {
                    const rec = { at: Date.now(), by: user.username, grossRake, totalCuts, houseGross, houseCut, ownerNet };
                    const upd = { ...(closed || {}), [String(start)]: rec };
                    await window.fb.setDoc(window.fb.doc(window.fb.db, "clubs", CLUB_ID), { closedWeeks: upd }, { merge: true });
                    setClosed(upd);
                    if (window.__club) window.__club.closedWeeks = upd;
                    showToastG(`${cycLabel} closed & locked`, "success");
                } catch (e) { showToastG("Close failed", "error"); }
                setBusy(false);
            };

            return (
                <div className="mb-8">
                    <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
                        <h3 className="text-sm font-black text-emerald-400 uppercase tracking-widest"><i className="fa-solid fa-file-invoice-dollar ml-1"></i> Weekly Settlement {weekLocked && <span className="text-[9px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full align-middle"><i className="fa-solid fa-lock"></i> Locked</span>}</h3>
                        <div className="flex items-center gap-2">
                            {isOwnerView && !weekLocked && <button disabled={busy} onClick={closeWeek} className="text-xs bg-rose-900/40 hover:bg-rose-900/70 border border-rose-500/40 text-rose-200 px-3 py-1.5 rounded-lg font-black disabled:opacity-50"><i className="fa-solid fa-lock ml-1"></i> Close week</button>}
                            <button onClick={exportCSV} className="text-xs bg-slate-800 hover:bg-slate-700 border border-white/10 text-emerald-300 px-3 py-1.5 rounded-lg font-black"><i className="fa-solid fa-file-csv ml-1"></i> Export CSV</button>
                        </div>
                    </div>
                    <div className="flex gap-1.5 mb-4 flex-wrap">
                        {[[0, 'This week'], [1, 'Last week'], [2, '2 wks'], [3, '3 wks']].map(([k, l]) => (
                            <button key={k} onClick={() => setCyc(k)} className={`px-3 py-1.5 rounded-lg font-bold text-xs border transition-colors ${cyc === k ? 'bg-emerald-500/20 border-emerald-400/60 text-emerald-200' : 'bg-slate-900/60 border-white/10 text-slate-400 hover:text-white'}`}>{l}</button>
                        ))}
                    </div>
                    {isOwnerView && (
                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2.5 mb-5">
                            <div className="glass-panel rounded-2xl p-3"><div className="text-[9px] text-slate-500 font-black uppercase">Gross rake</div><div className="text-lg font-black text-amber-300" dir="ltr">{formatMoney(grossRake)}</div></div>
                            <div className="glass-panel rounded-2xl p-3"><div className="text-[9px] text-slate-500 font-black uppercase">Agent cuts</div><div className="text-lg font-black text-purple-300" dir="ltr">{formatMoney(totalCuts)}</div></div>
                            <div className="glass-panel rounded-2xl p-3"><div className="text-[9px] text-slate-500 font-black uppercase">Owner rake</div><div className="text-lg font-black text-emerald-300" dir="ltr">{formatMoney(houseGross)}</div></div>
                            {showHouse
                                ? <div className="glass-panel rounded-2xl p-3 border border-rose-500/30"><div className="text-[9px] text-rose-400 font-black uppercase">Expenses 10% · net</div><div className="text-sm font-black text-rose-300" dir="ltr">-{formatMoney(houseCut)} · <span className="text-white">{formatMoney(ownerNet)}</span></div></div>
                                : <div className="glass-panel rounded-2xl p-3"><div className="text-[9px] text-slate-500 font-black uppercase">Agents</div><div className="text-lg font-black text-white" dir="ltr">{agents.length}</div></div>}
                        </div>
                    )}
                    <div className="space-y-3">
                        {agents.length === 0 && <div className="text-center py-8 text-slate-500 font-bold glass-panel rounded-2xl text-sm">No agents / no activity this cycle.</div>}
                        {agents.map(a => {
                            const pls = playersByAgent[a.uid] || [];
                            return (
                                <div key={a.uid} className="glass-panel rounded-2xl p-4">
                                    <div className="flex items-center justify-between mb-2 flex-wrap gap-1">
                                        <div className="font-black text-white text-sm">{a.username} <span className="text-[9px] bg-blue-500/15 border border-blue-500/40 text-blue-300 px-1.5 py-0.5 rounded-full">{ROLE_LABELS[a.role] || 'Agent'}</span></div>
                                        <div className="text-xs font-black text-purple-300" dir="ltr">cut {formatMoney(cuts[a.uid] || 0)}</div>
                                    </div>
                                    {pls.length === 0 ? <div className="text-[11px] text-slate-500 font-bold">No players assigned.</div> : (
                                        <div className="space-y-1">
                                            {pls.map(p => (
                                                <div key={p.uid} className="flex items-center justify-between text-xs border-t border-white/5 pt-1.5">
                                                    <div className="min-w-0 truncate"><span className="text-slate-200 font-bold">{p.username}</span> <span className="text-slate-600 font-black">{p.playerId || ''}</span>{isOwnerView && p.googleName && p.googleName !== p.username && <span className="text-slate-600"> · {p.googleName}</span>}</div>
                                                    <div className="flex items-center gap-2 shrink-0">
                                                        {isOwnerView && !weekLocked
                                                            ? <button onClick={() => editPct(p)} className="text-slate-400 hover:text-white bg-slate-800/60 border border-white/10 rounded px-1.5 py-0.5">{p.agentPct || 0}%</button>
                                                            : <span className="text-slate-500">{p.agentPct || 0}%</span>}
                                                        {isOwnerView && !weekLocked
                                                            ? <button onClick={() => editResult(p)} className={`font-black hover:underline ${((pres[p.uid] || 0) >= 0) ? 'text-emerald-300' : 'text-rose-300'}`} dir="ltr">{formatMoney(pres[p.uid] || 0)}</button>
                                                            : <span className={`font-black ${((pres[p.uid] || 0) >= 0) ? 'text-emerald-300' : 'text-rose-300'}`} dir="ltr">{formatMoney(pres[p.uid] || 0)}</span>}
                                                        {isOwnerView && !weekLocked && <button onClick={() => setTransferFor(transferFor === p.id ? null : p.id)} title="Transfer / remove" className="text-slate-500 hover:text-amber-300 w-6 text-center"><i className="fa-solid fa-right-left text-[10px]"></i></button>}
                                                    </div>
                                                </div>
                                            ))}
                                            {isOwnerView && transferFor && pls.some(p => p.id === transferFor) && (() => {
                                                const p = pls.find(x => x.id === transferFor);
                                                return (
                                                    <div className="mt-2 p-2 bg-slate-900/70 border border-white/10 rounded-lg">
                                                        <div className="text-[10px] text-slate-400 font-black mb-1.5">Move {p.username} to:</div>
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {agents.filter(x => x.uid !== a.uid).map(x => (
                                                                <button key={x.uid} disabled={busy} onClick={() => reassign(p, x.uid)} className="text-[11px] bg-slate-800 hover:bg-emerald-900/60 border border-white/10 text-slate-200 px-2 py-1 rounded font-bold disabled:opacity-50">{x.username}</button>
                                                            ))}
                                                            <button disabled={busy} onClick={() => reassign(p, null)} className="text-[11px] bg-slate-800 hover:bg-rose-900/60 border border-rose-500/30 text-rose-300 px-2 py-1 rounded font-bold disabled:opacity-50">Unassign</button>
                                                        </div>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function BackofficeView({ user, clubSettings, showToast }) {
            const [usersList, setUsersList] = useState([]);
            const [botsList, setBotsList] = useState([]);
            const [bcText, setBcText] = useState('');
            const [bwDraft, setBwDraft] = useState(null);
            const bwCur = bwDraft || {
                enabled: (clubSettings?.bonusWheel?.enabled) !== false,
                prizes: (Array.isArray(clubSettings?.bonusWheel?.prizes) && clubSettings.bonusWheel.prizes.length === 8) ? [...clubSettings.bonusWheel.prizes] : [5, 10, 20, 30, 50, 75, 100, 200]
            };
            const BW_PROB = ['80%', '10%', '3.5%', '2.5%', '1.8%', '1.2%', '0.5%', '1:200'];
            const saveBonusWheel = async () => {
                try {
                    const prizes = bwCur.prizes.map(x => Math.max(0, round2(Number(x) || 0)));
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "clubs", CLUB_ID), { bonusWheel: { enabled: !!bwCur.enabled, prizes } });
                    setBwDraft(null);
                    showToast(bwCur.enabled ? "Bonus wheel enabled and updated! 🎰" : "Bonus wheel turned off", "success");
                } catch(e) { showToast("Error saving", "error"); }
            };
            const sendBroadcast = async () => {
                const txt = bcText.trim();
                if (txt.length < 2) return showToast("Write a message", "error");
                try {
                    await window.fb.setDoc(window.fb.doc(window.fb.db, "broadcasts", CLUB_ID), { text: txt.slice(0, 300), at: Date.now(), by: user.username, clubName: (window.__club || {}).name || '' });
                    setBcText('');
                    showToast("Message broadcast to all club members! 📣", "success");
                } catch(e) { showToast("Error broadcasting", "error"); }
            };
            const [search, setSearch] = useState('');
            const [roleEditUser, setRoleEditUser] = useState(null);
            const [roleDraft, setRoleDraft] = useState({ role: ROLES.PLAYER, managedGames: [] });
            const [rakeDraft, setRakeDraft] = useState(clubSettings.rakePct);
            const [clubNameDraft, setClubNameDraft] = useState('');
            const [expFrom, setExpFrom] = useState('');
            const [expTo, setExpTo] = useState('');
            const [exporting, setExporting] = useState(false);

            const exportClubCSV = async () => {
                setExporting(true);
                try {
                    const s = await window.fb.getDocs(window.fb.collection(window.fb.db, "gameLog"));
                    let all = s.docs.map(d => d.data());
                    if (expFrom) all = all.filter(l => l.at >= new Date(expFrom).getTime());
                    if (expTo) all = all.filter(l => l.at <= new Date(expTo).getTime() + 24 * 3600 * 1000);
                    all.sort((a, b) => (a.at || 0) - (b.at || 0));
                    const rows = [['Date', 'Time', 'Player', 'Game', 'Profit/Loss']];
                    all.forEach(l => {
                        const d = new Date(l.at);
                        rows.push([d.toLocaleDateString('en-GB'), d.toLocaleTimeString('he-IL'), l.username || l.uid, GAME_LABEL(l.game), l.profit]);
                    });
                    rows.push([]);
                    rows.push(['Summary by player', '', '', '', '']);
                    const byUser = {};
                    all.forEach(l => { const k = l.username || l.uid; if (!byUser[k]) byUser[k] = { count: 0, profit: 0 }; byUser[k].count++; byUser[k].profit = round2(byUser[k].profit + (l.profit || 0)); });
                    Object.entries(byUser).forEach(([name, t]) => rows.push(['', '', name, t.count + ' games', t.profit]));
                    downloadCSV(rows, `club-report-${new Date().toISOString().slice(0,10)}.csv`);
                    showToast(`Exported ${all.length} records`, "success");
                } catch(e) { showToast("Export error", "error"); }
                setExporting(false);
            };

            useEffect(() => { setRakeDraft(clubSettings.rakePct); }, [clubSettings.rakePct]);

            useEffect(() => {
                const memQ = window.fb.query(window.fb.collection(window.fb.db, "memberships"), window.fb.where("clubId", "==", CLUB_ID));
                const unsub = window.fb.onSnapshot(memQ, (snap) => {
                    setUsersList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const botQ2 = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                const unsubB = window.fb.onSnapshot(botQ2, (snap) => {
                    setBotsList(snap.docs.map(doc => ({ id: doc.id, uid: doc.id, ...doc.data() })));
                });
                return () => { unsub(); unsubB(); };
            }, []);

            const isOwner = [ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER].includes(user.role);

            const [assignFor, setAssignFor] = useState(null); // בקשה שממתינה לבחירת Agent
            const approveWith = async (memId, agent) => {
                try {
                    const extra = agent ? { agentUid: agent.uid, agentPct: Number(agent.agentSharePct) || 50 } : {};
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", memId), { status: 'approved', ...extra });
                    setAssignFor(null);
                    showToast(agent ? `Player approved and assigned to ${agent.username}` : "Player approved", "success");
                } catch(e) { showToast("Approval error", "error"); }
            };
            const handleApprove = async (uid) => {
                const mem = usersList.find(x => x.id === uid);
                // כבר משויך (הגיע עם קוד/קישור)? מאשרים ישר. אחרת - שואלים למי לשייך
                if (mem && !mem.agentUid && agents.length > 0) { setAssignFor(mem); return; }
                approveWith(uid, null);
            };
            const handleReject = async (u) => {
                if (!window.confirm(`Decline and delete ${u.username}?`)) return;
                try { await window.fb.deleteDoc(window.fb.doc(window.fb.db, "memberships", u.id)); showToast("Request declined", "info"); }
                catch(e) { showToast("Decline error", "error"); }
            };

            const adjustBalance = async (target, isDeposit) => {
                const raw = window.prompt(isDeposit ? `How many chips to deposit to ${target.username}? (deducted from your balance)` : `How many chips to withdraw from ${target.username}? (added to your balance)`, "100");
                const amount = parseFloat(raw);
                if (!amount || isNaN(amount) || amount <= 0) return;
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const ownerRef = memDoc(user.uid);
                        const targetRef = window.fb.doc(window.fb.db, "memberships", target.id);
                        const ownerSnap = await tr.get(ownerRef);
                        const targetSnap = await tr.get(targetRef);
                        let ownerBal = ownerSnap.data().balance || 0;
                        let targetBal = targetSnap.data().balance || 0;
                        if (isDeposit) {
                            if (ownerBal < amount) throw "You don't have enough balance for this deposit.";
                            ownerBal -= amount; targetBal += amount;
                        } else {
                            if (targetBal < amount) throw "The player doesn't have enough balance for this withdrawal.";
                            ownerBal += amount; targetBal -= amount;
                        }
                        tr.update(ownerRef, { balance: round2(ownerBal) });
                        tr.update(targetRef, { balance: round2(targetBal) });
                    });
                    showToast(isDeposit ? `Deposited ${formatMoney(amount)} to ${target.username}` : `Withdrew ${formatMoney(amount)} from ${target.username}`, "success");
                } catch (e) { showToast(typeof e === 'string' ? e : "Action error", "error"); }
            };

            const saveClubSettings = async () => {
                const pct = parseFloat(rakeDraft);
                if (isNaN(pct) || pct < 0 || pct > 20) return showToast("Invalid rake percentage (0-20)", "error");
                try {
                    await window.fb.setDoc(window.fb.doc(window.fb.db, "clubs", CLUB_ID), { rakePct: pct }, { merge: true });
                    showToast(`Rake updated to ${pct}%`, "success");
                } catch(e) { showToast("Error saving settings", "error"); }
            };

            const openRoleEditor = (u) => {
                setRoleEditUser(u);
                setRoleDraft({ role: u.role || ROLES.PLAYER, managedGames: u.managedGames || [], agentUid: u.agentUid || '', agentPct: Number(u.agentPct) || 0 });
            };
            const censorPhoto = async (u) => {
                if (!window.confirm(`Reset the profile photo of ${u.username}?`)) return;
                try {
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", u.id), { photo: '', avatarSeed: '' });
                    if (u.uid) await window.fb.updateDoc(window.fb.doc(window.fb.db, "users", u.uid), { photo: '', avatarSeed: '' });
                    showToast("Photo reset", "success");
                } catch(e) {}
            };
            const toggleGame = (gid) => {
                setRoleDraft(prev => ({ ...prev, managedGames: prev.managedGames.includes(gid) ? prev.managedGames.filter(g => g !== gid) : [...prev.managedGames, gid] }));
            };
            const saveRole = async () => {
                try {
                    const managedGames = [ROLES.MANAGER, ROLES.AGENT].includes(roleDraft.role) ? roleDraft.managedGames : [];
                    const agentPct = Math.min(100, Math.max(0, Number(roleDraft.agentPct) || 0));
                    const becomingAgent = roleDraft.role === ROLES.AGENT;
                    const agentFields = becomingAgent ? { agentCode: roleEditUser.agentCode || genAgentCode(), agentSharePct: Number(roleEditUser.agentSharePct) || 50 } : {};
                    await window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", roleEditUser.id), { role: roleDraft.role, managedGames, agentUid: roleDraft.agentUid || '', agentPct: roleDraft.agentUid ? agentPct : 0, ...agentFields });
                    showToast(`${roleEditUser.username} updated to ${ROLE_LABELS[roleDraft.role]}`, "success");
                    setRoleEditUser(null);
                } catch(e) { showToast("Error updating role", "error"); }
            };

            const handleCreateBots = async () => {
                try {
                    showToast("Generating Bots...", "info");
                    for (let i = 0; i < 20; i++) {
                        const botName = BOT_NAMES[i % BOT_NAMES.length] + Math.floor(Math.random() * 100);
                        await window.fb.addDoc(window.fb.collection(window.fb.db, "users"), {
                            username: botName, email: `bot${i}@pokerten.com`, role: ROLES.PLAYER,
                            status: 'approved', balance: 50000, isBot: true, managedGames: [],
                            stats: { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 }
                        });
                    }
                    showToast("20 Bots created!", "success");
                } catch (e) { showToast("Error creating Bots", "error"); }
            };
            const handleDeleteBots = async () => {
                if(!window.confirm("Delete all Bots?")) return;
                try {
                    const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                    const snaps = await window.fb.getDocs(botQ);
                    for (const d of snaps.docs) { await window.fb.deleteDoc(d.ref); }
                    showToast("All Bots deleted.", "info");
                } catch(e) { showToast("Error deleting Bots", "error"); }
            };

            const pendingUsers = usersList.filter(u => u.status !== 'approved' && !u.isBot);
            const agents = usersList.filter(u => u.status === 'approved' && u.role === ROLES.AGENT && !u.isBot);
            const agentName = (uid) => (usersList.find(x => x.uid === uid) || {}).username || '';
            // השלמת קוד לסוכנים ותיקים שאין להם (אצל הבעלים בלבד)
            useEffect(() => {
                if (!isOwner) return;
                agents.filter(a => !a.agentCode).forEach(a => {
                    window.fb.updateDoc(window.fb.doc(window.fb.db, "memberships", a.id), { agentCode: genAgentCode(), agentSharePct: Number(a.agentSharePct) || 50 }).catch(() => {});
                });
            }, [agents.length, isOwner]);
            const [playerFile, setPlayerFile] = useState(null); // תיק שחקן פתוח
            const [agentCycle, setAgentCycle] = useState({});   // רווחי המחזור הנוכחי פר Agent
            useEffect(() => {
                (async () => {
                    try {
                        const q = window.fb.query(window.fb.collection(window.fb.db, "agentLog"), window.fb.where("clubId", "==", CLUB_ID));
                        const snap = await window.fb.getDocs(q);
                        const cyc = cycleStartIL(0);
                        const m = {};
                        snap.docs.forEach(d => { const e = d.data(); if ((e.at || 0) >= cyc) m[e.agentUid] = round2((m[e.agentUid] || 0) + (Number(e.amount) || 0)); });
                        setAgentCycle(m);
                    } catch(e) {}
                })();
            }, []);
            const isAgentOnly = user.role === ROLES.AGENT;
            const canManageAny = isOwner || user.role === ROLES.MANAGER;
            const myAgentMem = usersList.find(x => x.uid === user.uid);
            const copyText = async (txt, msg) => { try { await navigator.clipboard.writeText(txt); showToast(msg, "success"); } catch(e) { showToast(txt, "info"); } };
            const realPlayers = usersList.filter(u => u.status === 'approved' && !u.isBot);
            const players = usersList.filter(u => u.status === 'approved' && u.uid !== user.uid)
                .filter(u => !search || (u.username||'').toLowerCase().includes(search.toLowerCase()) || (u.email||'').toLowerCase().includes(search.toLowerCase()) || (u.playerId||'').toLowerCase().includes(search.toLowerCase()));

            const statTiles = [
                { label: 'Your balance', value: formatMoney(user.balance), icon: 'fa-wallet', color: 'text-white' },
                { label: 'Total held by Players', value: formatMoney(players.reduce((s, p) => s + (p.balance || 0), 0)), icon: 'fa-users', color: 'text-blue-400' },
                { label: 'Club earnings (Rake)', value: formatMoney(user.clubProfits || 0), icon: 'fa-building-columns', color: 'text-amber-400' },
                { label: 'Registered Players', value: realPlayers.length, icon: 'fa-id-card', color: 'text-emerald-400' },
            ];

            return (
                <div style={{overflowX:"hidden"}} className="scrollable-content aurora-bg p-4 sm:p-6">
                    <div className="max-w-5xl mx-auto animate-fade-in relative z-10">
                        <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
                            <div>
                                <h2 className="text-2xl sm:text-3xl font-black text-white">Club Management</h2>
                                <p className="text-sm text-slate-400 font-bold">Balances · Roles · Settings · Bots</p>
                            </div>
                            {user.role === ROLES.SUPER_ADMIN && (
                                <div className="flex gap-2">
                                    <button onClick={handleCreateBots} className="bg-gradient-to-b from-purple-500 to-purple-800 hover:from-purple-400 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg"><i className="fa-solid fa-robot ml-2"></i>20 Bots</button>
                                    <span className="text-purple-300 text-xs font-black bg-purple-500/10 border border-purple-500/40 px-3 py-2 rounded-xl self-center">🤖 {botsList.length} Bots in the system (serving all clubs)</span>
                                    <button onClick={handleDeleteBots} className="bg-slate-800/80 hover:bg-rose-900/80 border border-white/10 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl text-sm font-bold"><i className="fa-solid fa-trash"></i></button>
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                            {statTiles.map((t, i) => (
                                <div key={i} className="stat-tile p-5 rounded-2xl">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-slate-400 text-[11px] font-bold">{t.label}</span>
                                        <i className={`fa-solid ${t.icon} ${t.color} opacity-60`}></i>
                                    </div>
                                    <p className={`text-xl sm:text-2xl font-black ${t.color}`} dir="ltr">{t.value}</p>
                                </div>
                            ))}
                        </div>

                        {/* Settings מועדון - Global rake (Owner בלבד) */}
                        {isOwner && (
                            <div className="glass-panel p-6 rounded-3xl mb-6 border border-amber-500/20">
                                <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-amber-500/15 border border-amber-500/30 flex items-center justify-center"><i className="fa-solid fa-sliders text-amber-400 text-sm"></i></span>
                                    Club Settings
                                </h3>
                                <div className="flex items-end gap-4 flex-wrap mb-4 pb-4 border-b border-white/5">
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Club name</label>
                                        <input value={clubNameDraft} onChange={e=>setClubNameDraft(e.target.value)} maxLength={30} placeholder={clubSettings?.name || ''} className="bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white font-black w-56 outline-none focus:border-emerald-500/60" />
                                    </div>
                                    <button onClick={async () => { const nm = clubNameDraft.trim(); if (nm.length < 2) return showToast("Name must be 2 to 30 characters", "error"); try { await window.fb.updateDoc(window.fb.doc(window.fb.db, "clubs", CLUB_ID), { name: nm }); setClubNameDraft(''); showToast("Club name updated!", "success"); } catch(e) { showToast("Error", "error"); } }} className="bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Change name</button>
                                </div>
                                <div className="mb-4 pb-4 border-b border-white/5">
                                    <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">📣 Pop-up message to all club members</label>
                                    <div className="flex gap-2 items-start flex-wrap">
                                        <textarea value={bcText} onChange={e=>setBcText(e.target.value)} rows={2} maxLength={300} placeholder="e.g. Friday night tournament at 21:00! First prize 5,000 🏆" className="flex-1 min-w-[240px] bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white font-bold outline-none focus:border-amber-500/60 resize-none" />
                                        <button onClick={sendBroadcast} className="bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white px-6 py-3 rounded-xl font-black shadow-lg">Broadcast 📣</button>
                                    </div>
                                    <p className="text-[10px] text-slate-500 font-bold mt-1.5">The message pops up instantly on screen for everyone online, with a sound. Anyone who allowed browser notifications gets it even when the site is in the background.</p>
                                </div>
                                <div className="mb-4 pb-4 border-b border-white/5">
                                    <div className="flex items-center gap-3 mb-3 flex-wrap">
                                        <label className="text-slate-400 text-xs font-bold uppercase tracking-widest">🎰 Daily bonus wheel</label>
                                        <button onClick={() => setBwDraft({ ...bwCur, enabled: !bwCur.enabled })} className={`px-5 py-2 rounded-xl font-black text-xs border-2 transition-all ${bwCur.enabled ? 'bg-emerald-600 text-white border-emerald-400' : 'bg-slate-800 text-slate-400 border-slate-600'}`}>
                                            {bwCur.enabled ? '✓ On' : '✗ Off'}
                                        </button>
                                        <button onClick={saveBonusWheel} className="bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white px-6 py-2 rounded-xl font-black text-xs shadow-lg">Save</button>
                                    </div>
                                    <div className="grid grid-cols-4 sm:grid-cols-8 gap-2">
                                        {bwCur.prizes.map((p, i) => (
                                            <div key={i}>
                                                <input type="number" min="0" value={p} onChange={e => { const arr = [...bwCur.prizes]; arr[i] = e.target.value; setBwDraft({ ...bwCur, prizes: arr }); }} className="w-full bg-slate-900 border border-white/10 rounded-lg px-2 py-2 text-white font-bold text-center text-sm outline-none focus:border-amber-500/60" dir="ltr" />
                                                <div className={`text-[9px] text-center font-black mt-0.5 ${i === 0 ? 'text-emerald-400' : i === 7 ? 'text-amber-400' : 'text-slate-500'}`}>{BW_PROB[i]}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <p className="text-[10px] text-slate-500 font-bold mt-1.5">The amounts are up to you; the probabilities are fixed: 80% for the low prize, 10% for the second, graded in the middle, and the top prize hits once every 200 spins.</p>
                                </div>
                                <div className="flex items-end gap-4 flex-wrap">
                                    <div>
                                        <label className="text-slate-400 text-xs font-bold mb-1 block uppercase tracking-widest">Global rake (%) - for all games</label>
                                        <input type="number" min="0" max="20" step="0.5" value={rakeDraft} onChange={e=>setRakeDraft(e.target.value)} className="bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white font-black w-32 outline-none focus:border-amber-500/60" dir="ltr" />
                                    </div>
                                    <button onClick={saveClubSettings} className="bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Save</button>
                                    <p className="text-xs text-slate-500 font-bold basis-full">The rake applies to Rummy, Poker and all future games. Existing Poker Tables keep the rake set when they were opened.</p>
                                </div>
                            </div>
                        )}

                        {/* ייצוא דוח מועדון (Owner) */}
                        {isOwner && (
                            <div className="glass-panel p-6 rounded-3xl mb-6 border border-blue-500/20">
                                <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                    <span className="w-8 h-8 rounded-lg bg-blue-500/15 border border-blue-500/30 flex items-center justify-center"><i className="fa-solid fa-file-export text-blue-400 text-sm"></i></span>
                                    Export full club report
                                </h3>
                                <div className="flex flex-wrap items-end gap-3">
                                    <div>
                                        <label className="text-slate-400 text-[10px] font-bold mb-1 block uppercase">From date</label>
                                        <input type="date" value={expFrom} onChange={e=>setExpFrom(e.target.value)} className="bg-slate-900 text-white border border-white/10 rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-slate-400 text-[10px] font-bold mb-1 block uppercase">To date</label>
                                        <input type="date" value={expTo} onChange={e=>setExpTo(e.target.value)} className="bg-slate-900 text-white border border-white/10 rounded-xl px-3 py-2 text-sm font-bold outline-none" />
                                    </div>
                                    <button onClick={exportClubCSV} disabled={exporting} className="bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 text-white px-6 py-2 rounded-xl font-bold text-sm shadow-lg disabled:opacity-50">
                                        {exporting ? <i className="fa-solid fa-spinner fa-spin"></i> : <span><i className="fa-solid fa-file-csv ml-1"></i>Export CSV</span>}
                                    </button>
                                    <p className="text-xs text-slate-500 font-bold basis-full">Every result of every player, in all games - one row per game, with a total per player at the end of the file.</p>
                                </div>
                            </div>
                        )}

                        {/* Weekly settlement — owner/super see all agents; agents see only their own players (read-only) */}
                        {[ROLES.SUPER_ADMIN, ROLES.CLUB_OWNER, ROLES.MANAGER, ROLES.AGENT].includes(user.role) && (
                            <div className="glass-panel p-6 rounded-3xl mb-6">
                                <SettlementSection user={user} showToast={showToast} />
                            </div>
                        )}

                        {/* בקשות הצטרפות */}
                        <div className="glass-panel p-6 rounded-3xl mb-6">
                            <h3 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                <span className="w-8 h-8 rounded-lg bg-amber-500/15 border border-amber-500/30 flex items-center justify-center"><i className="fa-solid fa-user-check text-amber-400 text-sm"></i></span>
                                Join requests <span className="text-amber-400">({pendingUsers.length})</span>
                            </h3>
                            {pendingUsers.length === 0 && <p className="text-slate-500 text-sm font-bold">No pending requests.</p>}
                            <div className="flex flex-col gap-2">
                                {pendingUsers.map(u => (
                                    <div key={u.id} className="flex items-center justify-between bg-slate-900/70 rounded-2xl p-3 border border-white/5">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <img src={avatarUrl({ ...u, uid: u.id })} className="w-10 h-10 rounded-xl bg-slate-800 shrink-0" />
                                            <div className="min-w-0">
