name: Deploy Firebase Functions

# Auto-deploys Cloud Functions on any push that touches functions/
# Requires a repo secret named FIREBASE_TOKEN (from `firebase login:ci`)

on:
  push:
    branches:
      - main
      - claude/pokerten-v1
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: npm --prefix functions install

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only functions --project pokerten --non-interactive --force
