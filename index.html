                                Waiting for players... ({eligibleCount}/{setts.autoStart || 2})
                            </div>
                        )}
                    </div>

                    {/* פס פעולות */}
                    <div className="shrink-0 bg-slate-900/95 backdrop-blur-md border-t border-white/5 p-3 z-40 min-h-[110px] flex flex-col justify-center">
                        {isSeated && myPlayer?.status === 'active' && (myPlayer.cards || []).length > 0 && !['waiting','showdown'].includes(gs.phase) && (
                            <div className="flex justify-center gap-2 mb-2">
                                {!gs.allInReveal && myHand && <span className="bg-slate-950 border border-white/15 text-white text-[11px] font-black px-3 py-1 rounded-lg">{myHand}</span>}
                                {!gs.allInReveal && myEquity !== null && <span className="bg-emerald-900/80 border border-emerald-500/40 text-emerald-300 text-[11px] font-black px-3 py-1 rounded-lg" dir="ltr">🎯 {myEquity}%</span>}
                                {gs.allInReveal && realEq && realEq[user.uid] !== undefined && <span className="bg-amber-900/80 border border-amber-500/50 text-amber-300 text-[11px] font-black px-3 py-1 rounded-lg animate-pulse" dir="ltr">ALL-IN · {realEq[user.uid]}%</span>}
                            </div>
                        )}
                        {isMyTurn ? (
                            <div className="max-w-md mx-auto w-full flex flex-col gap-2.5">
                                <div className="flex items-center gap-2">
                                    <span className="text-[10px] font-black text-amber-400 w-14 text-center" dir="ltr">{formatShort(raiseAmt)}</span>
                                    <input type="range" min={Math.min(round2((gs.highestBet||0)+(gs.minRaise||BB)), myMaxBet)} max={myMaxBet} step={Number(setts.blinds) || 0.5} value={raiseAmt} onChange={e=>setRaiseAmt(parseFloat(e.target.value))} className="flex-1 accent-amber-500" dir="ltr" />
                                    <div className="flex gap-1">
                                        <button onClick={()=>setRaiseAmt(Math.min(round2((gs.highestBet||0)+(gs.minRaise||BB)), myMaxBet))} className="text-[9px] bg-slate-800 border border-white/10 px-2 py-1 rounded font-black text-slate-300">MIN</button>
                                        <button onClick={()=>setRaiseAmt(Math.min(round2(totalPot + toCallMe*2), myMaxBet))} className="text-[9px] bg-slate-800 border border-white/10 px-2 py-1 rounded font-black text-slate-300">POT</button>
                                        <button onClick={()=>setRaiseAmt(myMaxBet)} className="text-[9px] bg-slate-800 border border-white/10 px-2 py-1 rounded font-black text-rose-300">MAX</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-2.5">
                                    <button onClick={()=>performAction(user.uid,'fold')} className="btn-fold text-white py-3.5 font-black text-sm shadow-lg active:scale-95 transition-transform">FOLD</button>
                                    <button onClick={()=>performAction(user.uid,'call')} className="btn-call text-white py-3.5 font-black text-sm shadow-lg active:scale-95 transition-transform">
                                        {toCallMe > 0 ? <span>CALL <span dir="ltr" className="block text-[10px] opacity-90">{formatShort(Math.min(toCallMe, myPlayer?.stack||0))}</span></span> : 'CHECK'}
                                    </button>
                                    <button onClick={()=>performAction(user.uid,'raise', raiseAmt)} className="btn-raise text-white py-3.5 font-black text-sm shadow-lg active:scale-95 transition-transform">
                                        RAISE <span dir="ltr" className="block text-[10px] opacity-90">{formatShort(raiseAmt)}</span>
                                    </button>
                                </div>
                            </div>
                        ) : gs.phase === 'discard' && isSeated && (myPlayer?.cards||[]).length === 3 ? (
                            <div className="text-center text-amber-300 font-black text-sm animate-pulse">🍍 Tap a top card to discard it</div>
                        ) : (
                            <div className="text-center text-slate-500 font-bold text-xs">
                                {inBetting ? `Waiting for ${players[gs.activeTurnUid]?.name || '...'}` : gs.phase === 'showdown' ? 'New hand starting soon...' : spectate && !isSeated ? '' : 'A quiet moment at the table...'}
                            </div>
                        )}
                        {spectate && !isSeated && (
                            <button onClick={()=>setSpectate(false)} className="mx-auto mt-1 bg-gradient-to-b from-emerald-500 to-emerald-700 text-white px-8 py-2.5 rounded-xl font-black text-sm shadow-lg">Sit back in</button>
                        )}
                    </div>

                    {/* באנר טורניר: רמה, Blinds, זמן לרמה הבאה */}
                    {tour && (() => {
                        const lvl = tourLevelOf(tour);
                        const [sb, bb] = TOUR_SCHEDULE[lvl];
                        const nextIn = Math.max(0, ((tour.levelMins || 5) * 60000) * (lvl + 1) - (Date.now() - tour.startedAt));
                        const mm = Math.floor(nextIn / 60000), ss = Math.floor((nextIn % 60000) / 1000);
                        return (
                            <div className="bg-purple-950/80 border-b border-purple-500/30 px-3 py-1.5 flex items-center justify-center gap-3 text-[11px] font-black z-30 shrink-0 flex-wrap">
                                <span className="text-purple-300">🏆 {tour.name} · Level {tour.round}</span>
                                <span className="text-white">Level {lvl + 1}: {formatShort(sb)}/{formatShort(bb)}{lvl >= (tour.anteFromLevel ?? 4) ? ` + ante ${formatShort(sb)}` : ''}</span>
                                <span className="text-purple-300 font-mono" dir="ltr">⏱ {mm}:{String(ss).padStart(2,'0')}</span>
                                {tour.finished && <span className="text-amber-400 animate-pulse">🏆 {players[tour.tableWinner]?.name || ''} advanced!</span>}
                                {isSeated && myPlayer && lvl === (tour.addonAt ?? -1) && myPlayer.status !== 'out' && (
                                    <button onClick={tourAddon} className="bg-amber-600 hover:bg-amber-500 text-white px-3 py-1 rounded-lg">🚀 Add-on</button>
                                )}
                            </div>
                        );
                    })()}

                    {/* טורניר: Bustedת - Rebuy אם החלון פתוח */}
                    {tour && myPlayer && myPlayer.status === 'busted' && (
                        <div className="absolute inset-0 z-[240] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-panel rounded-3xl p-6 w-full max-w-sm text-center animate-pop-in border border-white/10">
                                <div className="text-5xl mb-2">💥</div>
                                <h3 className="text-2xl font-black text-purple-300 mb-1">Busted from the hand!</h3>
                                <p className="text-slate-300 text-sm font-bold mb-3">The Rebuy window is open - a rebuy brings you back with a full stack</p>
                                <div className={`text-4xl font-black font-mono my-2 ${bustLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-white'}`}>{bustLeft}</div>
                                <div className="flex gap-3">
                                    <button onClick={tourRebuyMe} className="flex-1 bg-gradient-to-b from-purple-500 to-purple-700 hover:from-purple-400 text-white py-3.5 rounded-2xl font-black shadow-lg">Rebuy 💪</button>
                                    <button onClick={tourDecline} className="flex-1 bg-slate-800 hover:bg-rose-900 text-slate-300 py-3.5 rounded-2xl font-black border border-white/10">Folded</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Bustedת! 30 שניות להחליט על קנייה נוספת */}
                    {myPlayer && myPlayer.status === 'busted' && !tableState.tournament && (
                        <div className="absolute inset-0 z-[240] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-panel rounded-3xl p-6 w-full max-w-sm text-center animate-pop-in border border-white/10">
                                <div className="text-5xl mb-2">💥</div>
                                <h3 className="text-2xl font-black text-rose-400 mb-1">Out of chips!</h3>
                                <p className="text-slate-300 text-sm font-bold mb-1">Rebuy and stay at the table?</p>
                                <div className={`text-4xl font-black font-mono my-3 ${bustLeft <= 10 ? 'text-rose-500 animate-pulse' : 'text-white'}`}>{bustLeft}</div>
                                <input type="range" min={minBuy} max={maxBuy} step={BB} value={Math.min(Math.max(buyAmt, minBuy), maxBuy)} onChange={e=>setBuyAmt(parseFloat(e.target.value))} className="w-full accent-emerald-500 mb-1" dir="ltr" />
                                <div className="text-emerald-400 font-black text-lg mb-3" dir="ltr">{formatMoney(Math.min(Math.max(buyAmt, minBuy), maxBuy))}</div>
                                <div className="flex gap-3">
                                    <button onClick={rebuyAfterBust} className="flex-1 bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white py-3.5 rounded-2xl font-black shadow-lg">Rebuy & stay 💪</button>
                                    <button onClick={handleStandUp} className="flex-1 bg-slate-800 hover:bg-rose-900 text-slate-300 py-3.5 rounded-2xl font-black border border-white/10">Stand up</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Hand history - עד 100 אחורה */}
                    {historyOpen && (
                        <div className="absolute inset-0 z-[250] bg-black/75 backdrop-blur-sm flex items-center justify-center p-3" onClick={() => setHistoryOpen(false)}>
                            <div className="glass-panel rounded-3xl w-full max-w-md max-h-[80vh] flex flex-col animate-pop-in" onClick={e => e.stopPropagation()} dir="ltr">
                                <div className="flex items-center justify-between px-4 py-3 border-b border-white/5 shrink-0">
                                    <span className="font-black text-white text-sm"><i className="fa-solid fa-clock-rotate-left ml-2 text-amber-400"></i>Hand history ({(tableState.history || []).length})</span>
                                    <button onClick={() => setHistoryOpen(false)} className="text-slate-500 hover:text-white w-7 h-7"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="overflow-y-auto p-3 flex flex-col gap-2">
                                    {[...(tableState.history || [])].reverse().map((h, i) => (
                                        <div key={i} className="bg-slate-900/70 rounded-xl border border-white/5">
                                            <button onClick={() => setHistExpand(histExpand === i ? null : i)} className="w-full flex items-center justify-between px-3 py-2.5 text-right">
                                                <span className="text-[11px] font-bold text-slate-300">
                                                    <span className="text-slate-500 ml-2">{new Date(h.at).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}</span>
                                                    {h.game} · 🏆 {h.winners}
                                                </span>
                                                <span className="text-emerald-400 font-black text-xs" dir="ltr">+{formatShort(h.amount)}</span>
                                            </button>
                                            {histExpand === i && (
                                                <div className="px-3 pb-3 border-t border-white/5 pt-2">
                                                    {(h.board || []).length > 0 && (
                                                        <div className="flex gap-1 justify-center mb-2" dir="ltr">
                                                            {h.board.map((c, ci) => <PCard key={ci} card={c} size="sm" />)}
                                                        </div>
                                                    )}
                                                    <div className="flex flex-col gap-1.5">
                                                        {(h.ps || []).map((q, qi) => (
                                                            <div key={qi} className={`flex items-center justify-between bg-slate-950/60 rounded-lg px-2 py-1.5 ${q.f ? 'opacity-45' : ''}`}>
                                                                <span className="text-[11px] font-bold text-white">{q.w ? '🏆 ' : ''}{q.n}{q.f ? ' (discarded)' : ''}</span>
                                                                <div className="flex gap-0.5" dir="ltr">{(q.c || []).map((c, ci) => <PCard key={ci} card={c} size="sm" />)}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="text-[10px] text-slate-500 font-bold mt-2 text-center">&nbsp;</div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {(tableState.history || []).length === 0 && <div className="text-center text-slate-500 font-bold text-xs py-10">No hands have been played at this table yet.</div>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* צ'אט */}
                    <button onClick={()=>ch.setChatOpen(!ch.chatOpen)} className="absolute bottom-[128px] left-3 z-[60] w-11 h-11 rounded-2xl glass-panel text-slate-300 hover:text-white shadow-xl">
                        <i className="fa-solid fa-comment-dots"></i>
                    </button>
                    {ch.chatOpen && <ChatPanel chat={ch.chatArr} meUid={user.uid} onSend={ch.sendChat} onClose={()=>ch.setChatOpen(false)} className="bottom-[128px] left-3" targets={Object.values(players).filter(p => p.uid !== user.uid).map(p => ({ uid: p.uid, name: p.name }))} mutedUids={ch.mutedUids} onToggleMuteUid={ch.toggleMuteUid} canModerate={ch.canModerate} chatMuted={ch.chatMuted} onToggleTableMute={ch.toggleTableMute} />}
                    {isSeated && myPlayer?.sitOut && (
                        <div className="absolute top-16 left-1/2 -translate-x-1/2 z-[70] bg-amber-500/95 text-slate-900 font-black text-xs rounded-full px-4 py-2 shadow-xl cursor-pointer" onClick={toggleSitOut}>☕ You're in Sit out - tap to return ✋</div>
                    )}
                    {isSeated && (
                        <div className="absolute bottom-20 left-3 z-[60] flex flex-col gap-2">
                            <button onClick={toggleSitOut} title={myPlayer?.sitOut ? 'Sit back in' : 'Sit out'} className={`w-11 h-11 rounded-2xl border shadow-xl text-lg ${myPlayer?.sitOut ? 'bg-amber-500 text-slate-900 border-amber-300 animate-pulse' : 'bg-slate-900/90 border-white/10 text-slate-300 hover:text-amber-300'}`}>{myPlayer?.sitOut ? '✋' : '☕'}</button>
                            {!(tableState?.tournamentId) && <button onClick={topUpChips} title="Add chips" className="w-11 h-11 rounded-2xl glass-panel text-slate-300 hover:text-emerald-300 shadow-xl text-lg">💰</button>}
                        </div>
                    )}

                    {/* Buy-in */}
                    {(canShowBuyIn || needRebuy) && (
                        <div className="absolute inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-panel rounded-3xl p-6 w-full max-w-sm text-center animate-pop-in border border-amber-500/30">
                                <i className="fa-solid fa-coins text-4xl text-gold-400 mb-3"></i>
                                <h3 className="text-xl font-black text-white mb-1">{needRebuy ? 'Out of chips - Rebuy' : 'Table buy-in'}</h3>
                                <p className="text-slate-400 text-xs font-bold mb-4" dir="ltr">Blinds {formatShort(setts.blinds)}/{formatShort(BB)} · Balance: {formatMoney(user.balance)}</p>
                                <div className="text-3xl font-black text-gold-400 mb-2" dir="ltr">{formatMoney(buyAmt)}</div>
                                <input type="range" min={minBuy} max={maxBuy} step={BB} value={Math.min(Math.max(buyAmt, minBuy), maxBuy)} onChange={e=>setBuyAmt(parseFloat(e.target.value))} className="w-full accent-amber-500 mb-1" dir="ltr" />
                                <div className="flex justify-between text-[10px] text-slate-500 font-bold mb-2" dir="ltr"><span>Min {formatMoney(minBuy)}</span><span>Max {formatMoney(maxBuy)}</span></div>
                                {lockActive && !needRebuy && <div className="text-[10px] text-amber-400 font-bold mb-3">🔒 You left here with {formatMoney(leftLock.amount)} - you must return with at least this</div>}
                                {!needRebuy && isFull && !onWaitlist && (
                                    <div className="mb-2">
                                        <div className="text-[11px] text-amber-300 font-bold mb-2">Table full ({tblCap}/{tblCap}){waitlist.length > 0 ? ` · ${waitlist.length} waiting` : ''}. Join the waitlist and you'll be seated automatically with this buy-in when a spot opens.</div>
                                        <button onClick={joinWaitlist} className="w-full bg-gradient-to-b from-sky-500 to-sky-700 hover:from-sky-400 text-white py-3.5 rounded-2xl font-black shadow-lg"><i className="fa-solid fa-clock-rotate-left ml-1"></i> Join waitlist</button>
                                    </div>
                                )}
                                {!needRebuy && onWaitlist && (
                                    <div className="mb-2">
                                        <div className="text-sm text-sky-300 font-black mb-2">🪑 On the waitlist — position {myWaitPos + 1} of {waitlist.length}</div>
                                        <button onClick={leaveWaitlist} className="w-full bg-slate-800 hover:bg-slate-700 border border-white/10 text-slate-300 py-2.5 rounded-2xl font-black">Leave waitlist</button>
                                    </div>
                                )}
                                {!(isFull && !needRebuy) && <button onClick={needRebuy ? handleRebuy : handleSit} className="w-full bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 text-white py-3.5 rounded-2xl font-black shadow-lg mb-2">
                                    {needRebuy ? 'Do Rebuy' : 'Sit back in'}
                                </button>}
                                {!needRebuy && <button onClick={()=>setSpectate(true)} className="text-slate-400 hover:text-white text-xs font-bold underline">Spectate</button>}
                                {needRebuy && <button onClick={handleStandUp} className="text-slate-400 hover:text-white text-xs font-bold underline">Stand up</button>}
                                <button onClick={onLeave} className="block mx-auto mt-2 text-slate-500 hover:text-white text-xs font-bold underline">Back to lobby</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        /* ================================================================
           Durak - מנוע מלא (Podkidnoy / Perevodnoy)
           ================================================================ */
        const DURAK_TIME = 30;
        const durakDeck = (size) => {
            const base = [['6',6],['7',7],['8',8],['9',9],['10',10],['J',11],['Q',12],['K',13],['A',14]];
            const ranks = size === 52 ? [['2',2],['3',3],['4',4],['5',5], ...base] : base;
            let d = [];
            for (const suit of SUITS) for (const [r, v] of ranks) d.push({ id: `${r}${suit}`, val: r, suit, v });
            for (let i = d.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [d[i], d[j]] = [d[j], d[i]]; }
            return d;
        };
        const beatsCard = (c, t, trump) => (c.suit === t.suit && c.v > t.v) || (c.suit === trump && t.suit !== trump);

        function DurakTable({ tableDocId, user, clubSettings, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [godView, setGodView] = useState(false);
            const [timeLeft, setTimeLeft] = useState(DURAK_TIME);
            const [resHide, setResHide] = useState(false);
            useEffect(() => { setResHide(false); }, [tableState && tableState.status]);
            const stayLeft = useShowdownSweep(tableState, () => tblRef(), Number(tableState?.settings?.maxPlayers) || 5, null);
            const [bluffMode, setBluffMode] = useState(false);

            const tableRef = useRef(null);
            const settlingRef = useRef(false);
            const synthRef = useRef(null);

            const isGod = isGodUser(user);
            const isSuperAdmin = user.role === ROLES.SUPER_ADMIN;
            const tblRef = () => window.fb.doc(window.fb.db, "tables", tableDocId);

            const T = tableState || {};
            const setts = T.settings || {};
            const players = T.players || {};
            const me = players[user.uid];
            const isSeated = !!me;
            const isHost = T.hostUid === user.uid;
            const pairs = T.pairs || [];
            const undefPairs = pairs.filter(x => !x.d);
            const iAmDefender = T.defenderUid === user.uid;
            const iAmAttackerMain = T.attackerUid === user.uid;
            const myTurn = T.turnUid === user.uid && T.status === 'playing';

            const toastErr = (m) => showToast(m, 'error');
            const clonePlayers = (pl) => { const o = {}; Object.entries(pl || {}).forEach(([k, v]) => o[k] = { ...v, cards: [...(v.cards || [])] }); return o; };
            const activeList = (pl) => Object.values(pl).filter(p => !p.out && !p.left).sort((a, b) => a.seatIndex - b.seatIndex);
            const nextActive = (pl, uid) => {
                const arr = activeList(pl); if (!arr.length) return null;
                const seat = pl[uid]?.seatIndex ?? -1;
                const after = arr.filter(p => p.seatIndex > seat).concat(arr.filter(p => p.seatIndex <= seat && p.uid !== uid));
                return after[0]?.uid ?? null;
            };
            const pairRanks = (prs) => { const s = new Set(); prs.forEach(x => { s.add(x.a.v); if (x.d) s.add(x.d.v); }); return s; };
            const attackerFor = (pl, preferUid, defUid) => {
                let a = preferUid, guard = 0;
                while (a && guard < 10 && (a === defUid || !pl[a] || pl[a].out || pl[a].left)) { a = nextActive(pl, a); guard++; }
                return (a && a !== defUid) ? a : null;
            };

            /* ---------- סנכרון ---------- */
            useEffect(() => {
                if (!tableDocId) return;
                const unsub = window.fb.onSnapshot(tblRef(), d => {
                    if (d.exists()) { const t = { id: d.id, ...d.data() }; tableRef.current = t; setTableState(t); setLoading(false); }
                    else { showToast("The table closed", "error"); onLeave(); }
                });
                return () => unsub();
            }, [tableDocId]);

            /* ---------- צ'אט ---------- */
            const ch = useTableChat(tableState, tableDocId, user, 'durak', showToast);
            const prevDSnd = useRef({ status: '', chatLen: 0, pairsN: 0, turnMine: false });
            useEffect(() => {
                if (!tableState) return;
                const ps = prevDSnd.current;
                if (T.status === 'showdown' && ps.status !== 'showdown') playSnd('win');
                if (T.status === 'playing' && ps.status !== 'playing') playSnd('deal');
                const pn = (T.pairs || []).length;
                if (pn > ps.pairsN) playSnd('tile');
                const mine = T.turnUid === user.uid && T.status === 'playing';
                if (mine && !ps.turnMine) playSnd('turn');
                const cl = (T.chat || []).length;
                if (ps.chatLen && cl > ps.chatLen) playSnd('msg');
                prevDSnd.current = { status: T.status, chatLen: cl, pairsN: pn, turnMine: mine };
            }, [tableState]);

            /* ---------- התחלת משחק (מארח / סופר-אדמין) ---------- */
            const startGame = async () => {
                const t = tableRef.current; if (!t) return;
                if (!(t.hostUid === user.uid || isSuperAdmin)) return;
                if (!['setup', 'showdown'].includes(t.status)) return;
                if (Object.keys(t.players || {}).length < 2) return toastErr("Need at least 2 players");
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const snap = await tr.get(tblRef());
                        if (!snap.exists()) throw "Table doesn't exist";
                        const tbl = snap.data();
                        if (!['setup', 'showdown'].includes(tbl.status)) throw "Game already running";
                        const buyIn = Number(tbl.settings.buyIn) || 0;
                        const pl = {};
                        Object.entries(tbl.players).forEach(([k, v]) => pl[k] = { ...v, cards: [], out: false, left: false });
                        const uids = Object.values(pl).sort((a, b) => a.seatIndex - b.seatIndex).map(p => p.uid);
                        // גביית Buy-in מכל הPlayers בטרנזקציה
                        const uSnaps = {};
                        for (const uid of uids) {
                            if (pl[uid].isBot) continue;
                            const s = await tr.get(memDoc(uid));
                            if (!s.exists() || (s.data().balance || 0) < buyIn) throw `${pl[uid].name} doesn't have enough chips (${formatMoney(buyIn)})`;
                            uSnaps[uid] = s;
                        }
                        for (const uid of Object.keys(uSnaps)) tr.update(uSnaps[uid].ref, { balance: round2((uSnaps[uid].data().balance || 0) - buyIn) });
                        // חלוקה
                        const deck = durakDeck(Number(tbl.settings.deckSize) || 36);
                        for (let i = 0; i < 6; i++) for (const uid of uids) pl[uid].cards.push(deck.pop());
                        const trumpCard = deck[0]; const trumpSuit = trumpCard.suit;
                        // המתחיל: בעל הTrump הנמוך ביותר
                        let low = 99, attacker = uids[0];
                        uids.forEach(uid => pl[uid].cards.forEach(c => { if (c.suit === trumpSuit && c.v < low) { low = c.v; attacker = uid; } }));
                        const defender = nextActive(pl, attacker);
                        tr.update(tblRef(), {
                            status: 'playing', pot: round2(buyIn * uids.filter(u => !pl[u].isBot).length), deck, trumpCard, trumpSuit,
                            players: pl, pairs: [], attackerUid: attacker, defenderUid: defender,
                            turnUid: attacker, roundCap: 6, passed: [], discard: 0, finishOrder: [],
                            lastResults: null, turnStartedAt: Date.now()
                        });
                    });
                } catch(e) { toastErr(typeof e === 'string' ? e : "Error starting the game"); }
            };

            /* ---------- סליקה ---------- */
            const settle = async (pl, durakUid, soloWinnerUid, deck, discard, fo) => {
                if (settlingRef.current) return;
                settlingRef.current = true;
                try {
                    const t = tableRef.current; if (!t) return;
                    if (t.tournamentId) {
                        const champ = soloWinnerUid || (fo && fo[0]) || null;
                        await window.fb.updateDoc(tblRef(), {
                            status: 'showdown', showdownAt: Date.now(), players: pl, pairs: [], deck: deck || [], discard: discard || 0,
                            finishOrder: fo || [], turnUid: null, pot: 0,
                            lastResults: { durakName: durakUid && pl[durakUid] ? pl[durakUid].name : null, winners: [], share: 0, rake: 0, pot: 0, tournament: true },
                            tournament: { ...t.tournament, finished: true, tableWinner: champ }
                        });
                        return;
                    }
                    const pot = t.pot || 0;
                    const rake = round2(pot * ((Number(setts.rakePercent) || 0) / 100));
                    const buyIn = Number(setts.buyIn) || 0;
                    let winners = soloWinnerUid ? [pl[soloWinnerUid]] : Object.values(pl).filter(p => p.out && !p.left && p.uid !== durakUid);
                    const share = winners.length ? Math.floor(((pot - rake) / winners.length) * 100) / 100 : 0;
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const reads = {};
                        for (const w of winners) { const s = await tr.get(memDoc(w.uid)); if (s.exists()) reads[w.uid] = s; }
                        let durakSnap = null;
                        if (durakUid && pl[durakUid] && !pl[durakUid].left) { const s = await tr.get(memDoc(durakUid)); if (s.exists()) durakSnap = s; }
                        for (const w of winners) {
                            const s = reads[w.uid]; if (!s) continue;
                            const st = s.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            tr.update(s.ref, {
                                balance: round2((s.data().balance || 0) + share),
                                'stats.gamesPlayed': (st.gamesPlayed || 0) + 1,
                                'stats.gamesWon': (st.gamesWon || 0) + 1,
                                'stats.totalProfit': round2((st.totalProfit || 0) + share - buyIn)
                            });
                        }
                        if (durakSnap) {
                            const st = durakSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                            tr.update(durakSnap.ref, {
                                'stats.gamesPlayed': (st.gamesPlayed || 0) + 1,
                                'stats.totalProfit': round2((st.totalProfit || 0) - buyIn)
                            });
                        }
                        tr.update(tblRef(), {
                            status: 'showdown', showdownAt: Date.now(), players: pl, pairs: [], deck: deck || [], discard: discard || 0,
                            finishOrder: fo || [], turnUid: null, pot: 0,
                            lastResults: { durakName: durakUid ? pl[durakUid].name : null, winners: winners.map(w => w.name), share, rake, pot, solo: !!soloWinnerUid }
                        });
                    });
                    distributeRake(rake, Object.keys(pl));
                    logGameResult([
                        ...winners.filter(w => !w.isBot).map(w => ({ uid: w.uid, username: w.name, game: 'durak', profit: round2(share - (Number(setts.buyIn) || 0)) })),
                        ...(durakUid && pl[durakUid] && !pl[durakUid].left && !pl[durakUid].isBot ? [{ uid: durakUid, username: pl[durakUid].name, game: 'durak', profit: -(Number(setts.buyIn) || 0) }] : [])
                    ], tableDocId);
                } catch(e) {} finally { settlingRef.current = false; }
            };

            /* ---------- סיום סיבוב: ביטה או לקיחה ---------- */
            const finishRound = async (t, pl, prs, kind, bustedUid) => {
                let discard = t.discard || 0;
                if (kind === 'bita') {
                    discard += prs.reduce((s, x) => s + 1 + (x.d ? 1 : 0), 0);
                } else if (kind === 'busted' && bustedUid && pl[bustedUid]) {
                    const buster = pl[bustedUid];
                    prs.forEach(x => { buster.cards.push(x.a); if (x.d) buster.cards.push(x.d); });
                } else {
                    const def = pl[t.defenderUid];
                    prs.forEach(x => { def.cards.push(x.a); if (x.d) def.cards.push(x.d); });
                }
                // שליפה עד 6: תוקף ראשי, שאר התוקפים לפי השעון, המגן אחרון
                const deck = [...(t.deck || [])];
                const order = [];
                let cur = attackerFor(pl, t.attackerUid, t.defenderUid);
                let guard = 0;
                while (cur && guard < 8) {
                    if (!order.includes(cur)) order.push(cur);
                    let nxt = nextActive(pl, cur); guard++;
                    if (!nxt || order.includes(nxt) || nxt === cur) break;
                    cur = (nxt === t.defenderUid) ? nextActive(pl, nxt) : nxt;
                    if (cur && order.includes(cur)) break;
                }
                if (pl[t.defenderUid] && !pl[t.defenderUid].out && !pl[t.defenderUid].left) order.push(t.defenderUid);
                for (const uid of order) { const p = pl[uid]; if (!p) continue; while (p.cards.length < 6 && deck.length) p.cards.push(deck.pop()); }
                // מי שנשאר בלי קלפים כשהקופה ריקה - יצא בשלום
                const fo = [...(t.finishOrder || [])];
                Object.values(pl).forEach(p => { if (!p.out && !p.left && deck.length === 0 && p.cards.length === 0) { p.out = true; if (!fo.includes(p.uid)) fo.push(p.uid); } });
                const remain = activeList(pl);
                if (remain.length <= 1) { await settle(pl, remain[0]?.uid || null, null, deck, discard, fo); return; }
                // Roles לסיבוב הבא
                let newAtt;
                if (kind === 'bita' || kind === 'busted') newAtt = attackerFor(pl, t.defenderUid, null);
                else newAtt = attackerFor(pl, nextActive(pl, t.defenderUid), null);
                const newDef = nextActive(pl, newAtt);
                await window.fb.updateDoc(tblRef(), {
                    players: pl, pairs: [], deck, discard, finishOrder: fo,
                    attackerUid: newAtt, defenderUid: newDef,
                    roundCap: Math.min(6, pl[newDef].cards.length),
                    passed: [], turnUid: newAtt, turnStartedAt: Date.now()
                });
            };

            /* ---------- פעולות משחק ---------- */
            const playCard = async (uid, cardId, blind = false) => {
                const t = tableRef.current; if (!t || t.status !== 'playing') return;
                const pl = clonePlayers(t.players);
                const p = pl[uid]; if (!p || p.out || p.left) return;
                const prs = (t.pairs || []).map(x => ({ ...x }));
                const card = p.cards.find(c => c.id === cardId); if (!card) return;
                const trump = t.trumpSuit;
                const undef = prs.filter(x => !x.d);

                if (uid === t.defenderUid) {
                    if (t.turnUid !== uid) return;
                    if (undef.length === 0) return toastErr("No card to respond to");
                    if (undef.some(x => x.blind)) return toastErr("There's a face-down card on the table - doubt it or take it first");
                    // העברה (Perevodnoy): לפני כל הגנה, עם קלף באותה דרגה
                    const noDef = prs.every(x => !x.d);
                    if (setts.variant === 'perevodnoy' && noDef && prs.every(x => x.a.v === card.v)) {
                        const newDef = nextActive(pl, uid);
                        if (newDef && pl[newDef].cards.length >= prs.length + 1) {
                            p.cards = p.cards.filter(c => c.id !== cardId);
                            prs.push({ a: card, d: null, by: uid });
                            if (t.deck.length === 0 && p.cards.length === 0) { p.out = true; }
                            await window.fb.updateDoc(tblRef(), {
                                players: pl, pairs: prs, defenderUid: newDef,
                                roundCap: Math.min(6, pl[newDef].cards.length),
                                passed: [], turnUid: newDef, turnStartedAt: Date.now(),
                                finishOrder: p.out ? [...(t.finishOrder || []), uid] : (t.finishOrder || [])
                            });
                            return;
                        }
                    }
                    const target = undef.find(x => beatsCard(card, x.a, trump));
                    if (!target) return toastErr("This card doesn't beat any open card");
                    const real = prs.find(x => x.a.id === target.a.id);
                    real.d = card;
                    p.cards = p.cards.filter(c => c.id !== cardId);
                    const stillUndef = prs.some(x => !x.d);
                    if (!stillUndef && t.deck.length === 0 && p.cards.length === 0) {
                        await finishRound({ ...t, pairs: prs }, pl, prs, 'bita');
                        return;
                    }
                    const nextTurn = stillUndef ? uid : attackerFor(pl, t.attackerUid, t.defenderUid);
                    await window.fb.updateDoc(tblRef(), { players: pl, pairs: prs, passed: [], turnUid: nextTurn || t.attackerUid, turnStartedAt: Date.now() });
                    return;
                }

                // תוקף
                if (undef.length > 0) return toastErr("Waiting for the defender's response");
                if (blind && (!setts.bluffEnabled || prs.length === 0)) blind = false;
                if (prs.length === 0) {
                    if (uid !== t.attackerUid) return toastErr("The main attacker opens the round");
                } else {
                    if (t.turnUid !== uid) return toastErr("Wait for your turn to add");
                    if (!blind && !pairRanks(prs).has(card.v)) return toastErr("You can only add ranks already on the table");
                }
                if (prs.length >= (t.roundCap || 6)) return toastErr("You've reached the max attacks this round");
                if ((pl[t.defenderUid]?.cards.length || 0) < 1) return toastErr("The defender has no cards");
                p.cards = p.cards.filter(c => c.id !== cardId);
                prs.push({ a: card, d: null, by: uid, blind: !!blind });
                const fo = [...(t.finishOrder || [])];
                if (t.deck.length === 0 && p.cards.length === 0) { p.out = true; if (!fo.includes(uid)) fo.push(uid); }
                await window.fb.updateDoc(tblRef(), { players: pl, pairs: prs, passed: [], turnUid: t.defenderUid, turnStartedAt: Date.now(), finishOrder: fo });
            };

            const acceptBlind = async (uid) => {
                const t = tableRef.current; if (!t || t.status !== 'playing' || uid !== t.defenderUid || t.turnUid !== uid) return;
                const prs = (t.pairs || []).map(x => ({ ...x }));
                const bp = prs.find(x => !x.d && x.blind);
                if (!bp) return;
                bp.blind = false;
                playSnd('tile');
                await window.fb.updateDoc(tblRef(), { pairs: prs, turnStartedAt: Date.now() });
            };

            const challengeBlind = async (uid) => {
                const t = tableRef.current; if (!t || t.status !== 'playing' || uid !== t.defenderUid || t.turnUid !== uid) return;
                const prs = (t.pairs || []).map(x => ({ ...x }));
                const bp = prs.find(x => !x.d && x.blind);
                if (!bp) return;
                bp.blind = false;
                const otherRanks = new Set();
                prs.forEach(x => { if (x !== bp) { otherRanks.add(x.a.v); if (x.d) otherRanks.add(x.d.v); } });
                const legal = otherRanks.has(bp.a.v);
                const pl = clonePlayers(t.players);
                if (legal) {
                    showToast(`😬 The card was valid (${bp.a.val}${bp.a.suit}) - you take it all!`, "error");
                    await finishRound({ ...t, pairs: prs }, pl, prs, 'take');
                } else {
                    showToast(`🎭 Bluff revealed! (${bp.a.val}${bp.a.suit}) - ${(pl[bp.by] || {}).name || 'the bluffer'} takes it all`, "success");
                    await finishRound({ ...t, pairs: prs }, pl, prs, 'busted', bp.by);
                }
            };

            // הכרזה מיידית: שחקן שסיים את הקלפים לא מחכה לשעון - הסיבוב נסגר ברגע שהכול מכוסה
            const instaRef = useRef(0);
            useEffect(() => {
                if (!tableState || T.status !== 'playing' || T.turnUid !== user.uid) return;
                const meP = players[user.uid];
                if (!meP || (meP.cards || []).length > 0 || (T.deck || []).length > 0) return;
                if (T.defenderUid === user.uid) return;
                const prs = T.pairs || [];
                if (!prs.length || !prs.every(x => x.d)) return; // עדיין יש Attack פתוחה
                const key = T.turnStartedAt || 1;
                if (instaRef.current === key) return;
                instaRef.current = key;
                const tm = setTimeout(async () => {
                    const t = tableRef.current;
                    if (!t || t.status !== 'playing' || t.turnUid !== user.uid) return;
                    try { await finishRound(t, clonePlayers(t.players), (t.pairs || []).map(x => ({ ...x })), 'bita'); playSnd('win'); } catch(e) {}
                }, 350);
                return () => clearTimeout(tm);
            }, [tableState && T.turnUid, tableState && T.turnStartedAt, tableState && (T.pairs || []).length]);

            const takeCards = async (uid) => {
                const t = tableRef.current; if (!t || t.status !== 'playing') return;
                if (uid !== t.defenderUid || !(t.pairs || []).length) return;
                const pl = clonePlayers(t.players);
                await finishRound(t, pl, (t.pairs || []).map(x => ({ ...x })), 'take');
            };

            const passAttack = async (uid) => {
                const t = tableRef.current; if (!t || t.status !== 'playing') return;
                if (uid === t.defenderUid || t.turnUid !== uid) return;
                const prs = t.pairs || [];
                if (!prs.length || prs.some(x => !x.d)) return;
                const pl = clonePlayers(t.players);
                const passed = [...(t.passed || []), uid];
                let nxt = nextActive(pl, uid); let guard = 0;
                while (nxt && guard < 8 && (nxt === t.defenderUid || passed.includes(nxt) || nxt === uid)) { nxt = nextActive(pl, nxt); guard++; }
                if (!nxt || nxt === t.defenderUid || passed.includes(nxt) || nxt === uid) {
                    await finishRound(t, pl, prs.map(x => ({ ...x })), 'bita');
                } else {
                    await window.fb.updateDoc(tblRef(), { passed, turnUid: nxt, turnStartedAt: Date.now() });
                }
            };

            const autoAction = async (uid) => {
                const t = tableRef.current; if (!t || t.status !== 'playing' || !t.players[uid]) return;
                const prs = t.pairs || [];
                if (uid === t.defenderUid) { if (prs.some(x => !x.d)) await takeCards(uid); return; }
                if (prs.length === 0 && uid === t.attackerUid) {
                    const hand = [...t.players[uid].cards].sort((a, b) => (a.suit === t.trumpSuit ? 100 : 0) + a.v - ((b.suit === t.trumpSuit ? 100 : 0) + b.v));
                    if (hand[0]) await playCard(uid, hand[0].id);
                    return;
                }
                await passAttack(uid);
            };

            /* ---------- הצטרפות / עזיבה / בוט ---------- */
            const handleJoin = async () => {
                try {
                    let becameFull = false;
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const uRef = memDoc(user.uid);
                        const [uSnap, tSnap] = [await tr.get(uRef), await tr.get(tblRef())];
                        if (!tSnap.exists()) throw "Table doesn't exist";
                        const t = tSnap.data();
                        if (!['setup', 'showdown'].includes(t.status)) throw "Game already running - wait for the next hand";
                        if (t.players[user.uid]) throw "You're already at the table";
                        if (Object.keys(t.players).length >= (t.settings.maxPlayers || 6)) throw "The table is full";
                        if ((uSnap.data().balance || 0) < (Number(t.settings.buyIn) || 0)) throw "Not enough balance for the buy-in";
                        let seatIndex = 0;
                        const taken = new Set(Object.values(t.players).map(p => p.seatIndex));
                        while (taken.has(seatIndex)) seatIndex++;
                        tr.update(tblRef(), { [`players.${user.uid}`]: { uid: user.uid, name: user.username, photo: user.photo || '', avatarSeed: user.avatarSeed || '', seatIndex, cards: [], isBot: false, out: false, left: false } });
                        if (Object.keys(t.players).length + 1 >= (t.settings.maxPlayers || 6)) becameFull = true;
                    });
                    if (becameFull) spawnTwinTable(tableRef.current);
                } catch(e) { toastErr(typeof e === 'string' ? e : "Error joining"); }
            };

            const handleLeave = async () => {
                const t = tableRef.current;
                if (!t || !t.players[user.uid]) { onLeave(); return; }
                if (t.status === 'playing' && !t.players[user.uid].out) {
                    if (!window.confirm("⚠️ Quitting mid Durak game = forfeiting the buy-in. Sure?")) return;
                    try {
                        const pl = clonePlayers(t.players);
                        const meP = pl[user.uid];
                        // קלפי השולחן חוזרים לבעליהם, מתחילים סיבוב נקי בלי הפורש
                        (t.pairs || []).forEach(x => {
                            const owner = pl[x.by] && !pl[x.by].left && x.by !== user.uid ? pl[x.by] : null;
                            if (owner) owner.cards.push(x.a); 
                            if (x.d) { const dOwner = pl[t.defenderUid] && t.defenderUid !== user.uid ? pl[t.defenderUid] : null; if (dOwner) dOwner.cards.push(x.d); }
                        });
                        delete pl[user.uid];
                        // סטטיסטיקת מפסיד לפורש (לא בטורניר - שם אין Buy-in לשולחן)
                        if (!t.tournamentId) try {
                            const uRef = memDoc(user.uid);
                            const uSnap = await window.fb.getDoc(uRef);
                            if (uSnap.exists()) {
                                const st = uSnap.data().stats || { gamesPlayed: 0, gamesWon: 0, totalProfit: 0 };
                                await window.fb.updateDoc(uRef, { 'stats.gamesPlayed': (st.gamesPlayed || 0) + 1, 'stats.totalProfit': round2((st.totalProfit || 0) - (Number(setts.buyIn) || 0)) });
                            }
                        } catch(e2) {}
                        const remain = activeList(pl);
                        if (remain.length <= 1) {
                            await settle(pl, null, remain[0]?.uid || null, t.deck || [], t.discard || 0, t.finishOrder || []);
                        } else {
                            const newAtt = attackerFor(pl, nextActive(pl, remain[0].uid) ? remain[0].uid : remain[0].uid, null);
                            const newDef = nextActive(pl, newAtt);
                            await window.fb.updateDoc(tblRef(), {
                                players: pl, pairs: [], attackerUid: newAtt, defenderUid: newDef,
                                roundCap: Math.min(6, pl[newDef].cards.length), passed: [], turnUid: newAtt, turnStartedAt: Date.now()
                            });
                        }
                    } catch(e) {}
                    onLeave(); return;
                }
                // setup / showdown / כבר יצא
                try {
                    const pl = { ...t.players }; delete pl[user.uid];
                    if (Object.keys(pl).length === 0 && t.status !== 'playing') {
                        await window.fb.deleteDoc(tblRef());
                    } else {
                        const upd = { players: pl };
                        if (t.hostUid === user.uid) { const first = Object.values(pl).sort((a,b)=>a.seatIndex-b.seatIndex)[0]; if (first) upd.hostUid = first.uid; }
                        await window.fb.updateDoc(tblRef(), upd);
                    }
                } catch(e) {}
                onLeave();
            };

            const handleAddBot = async () => {
                const t = tableRef.current; if (!t || !['setup', 'showdown'].includes(t.status)) return;
                if (Object.keys(t.players).length >= (setts.maxPlayers || 6)) return toastErr("The table is full");
                try {
                    const botQ = window.fb.query(window.fb.collection(window.fb.db, "users"), window.fb.where("isBot", "==", true));
                    const botSnaps = await window.fb.getDocs(botQ);
                    const bots = botSnaps.docs.map(d => ({ id: d.id, ...d.data() })).filter(b => !t.players[b.id]);
                    if (!bots.length) return toastErr("No bots available - create bots in the dashboard");
                    const bot = bots[Math.floor(Math.random() * bots.length)];
                    let seatIndex = 0;
                    const taken = new Set(Object.values(t.players).map(p => p.seatIndex));
                    while (taken.has(seatIndex)) seatIndex++;
                    await window.fb.updateDoc(tblRef(), { [`players.${bot.id}`]: { uid: bot.id, name: bot.username, photo: bot.photo || '', avatarSeed: bot.avatarSeed || '', seatIndex, cards: [], isBot: true, out: false, left: false } });
                } catch(e) {}
            };

            /* ---------- מוח Bots + אכיפת טיימאאוט (אצל הסופר-אדמין) ---------- */
            useEffect(() => {
                if (!isSuperAdmin || !tableState) return;
                if (T.status === 'playing' && T.turnUid && players[T.turnUid]?.isBot) {
                    const uid = T.turnUid;
                    const tm = setTimeout(async () => {
                        const t = tableRef.current; if (!t || t.turnUid !== uid || t.status !== 'playing') return;
                        const b = t.players[uid]; if (!b) return;
                        const prs = t.pairs || [];
                        const trump = t.trumpSuit;
                        const sortHand = (h) => [...h].sort((a, c) => ((a.suit === trump ? 100 : 0) + a.v) - ((c.suit === trump ? 100 : 0) + c.v));
                        if (uid === t.defenderUid) {
                            const undef = prs.filter(x => !x.d);
                            if (!undef.length) return;
                            if (undef.some(x => x.blind)) { if (Math.random() < 0.5) await challengeBlind(uid); else await acceptBlind(uid); return; }
                            const noDef = prs.every(x => !x.d);
                            if (setts.variant === 'perevodnoy' && noDef && Math.random() < 0.5) {
                                const tCard = b.cards.find(c => prs.every(x => x.a.v === c.v));
                                const newDef = nextActive(t.players, uid);
                                if (tCard && newDef && t.players[newDef].cards.length >= prs.length + 1) { await playCard(uid, tCard.id); return; }
                            }
                            const cand = sortHand(b.cards).find(c => undef.some(x => beatsCard(c, x.a, trump)));
                            if (cand) await playCard(uid, cand.id); else await takeCards(uid);
                            return;
                        }
                        if (prs.length === 0 && uid === t.attackerUid) {
                            const h = sortHand(b.cards);
                            if (h[0]) await playCard(uid, h[0].id);
                            return;
                        }
                        const ranks = pairRanks(prs);
                        const adds = sortHand(b.cards).filter(c => ranks.has(c.v));
                        if (adds.length && prs.length < (t.roundCap || 6) && Math.random() < 0.7) await playCard(uid, adds[0].id);
                        else if (t.settings.bluffEnabled && prs.length > 0 && prs.length < (t.roundCap || 6) && b.cards.length > 1 && Math.random() < 0.35) await playCard(uid, sortHand(b.cards)[0].id, true);
                        else await passAttack(uid);
                    }, 1900);
                    return () => clearTimeout(tm);
                }
            }, [T.turnUid, T.status, T.turnStartedAt, (T.pairs || []).length, isSuperAdmin]);

            // Bots מצטרפים אוטומטית בזמן ההמתנה
            const dPlayersCount = Object.keys(players).length;
            useEffect(() => {
                if (!isSuperAdmin || !tableState || T.status !== 'setup') return;
                const iv = setInterval(async () => {
                    const t = tableRef.current; if (!t || t.status !== 'setup') return;
                    const pl = t.players || {};
                    const hasHuman = Object.values(pl).some(p => !p.isBot);
                    if (!hasHuman || Object.keys(pl).length >= (t.settings.maxPlayers || 6)) return;
                    await handleAddBot();
                }, 3500);
                return () => clearInterval(iv);
            }, [T.status, dPlayersCount, isSuperAdmin]);

            // אכיפת טיימאאוט לכל שחקן שנרדם
            useEffect(() => {
                if (!isSuperAdmin || !tableState || T.status !== 'playing') return;
                const iv = setInterval(() => {
                    const t = tableRef.current; if (!t || t.status !== 'playing' || !t.turnStartedAt) return;
                    if (Date.now() - t.turnStartedAt > (DURAK_TIME + 5) * 1000) autoAction(t.turnUid);
                }, 4000);
                return () => clearInterval(iv);
            }, [T.status, isSuperAdmin]);

            /* ---------- טיימר התור שלי ---------- */
            useEffect(() => {
                let interval;
                if (T.status === 'playing' && T.turnStartedAt) {
                    interval = setInterval(() => {
                        const remaining = Math.max(0, DURAK_TIME - Math.floor((Date.now() - T.turnStartedAt) / 1000));
                        setTimeLeft(remaining);
                        if (remaining <= 5 && remaining > 0 && T.turnUid === user.uid) {
                            try {
                                if (window.Tone && window.Tone.context.state !== 'running') window.Tone.context.resume();
                                if (!synthRef.current && window.Tone) { synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination(); synthRef.current.volume.value = -14; }
                                synthRef.current?.triggerAttackRelease("E6", "0.05");
                            } catch(e) {}
                        }
                        if (remaining === 0 && T.turnUid === user.uid) { clearInterval(interval); autoAction(user.uid); }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [T.turnStartedAt, T.turnUid, T.status]);

            if (loading || !tableState) return <div className="h-full flex items-center justify-center text-blue-400"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            /* ---------- חישובי תצוגה ---------- */
            const list = Object.values(players).sort((a, b) => a.seatIndex - b.seatIndex);
            let displayList = list;
            if (isSeated) {
                const myIdx = list.findIndex(p => p.uid === user.uid);
                displayList = [...list.slice(myIdx), ...list.slice(0, myIdx)];
            }
            const N = Math.max(displayList.length, 2);
            const seatPos = (i) => { const ang = Math.PI / 2 + (i * 2 * Math.PI) / N; return { left: `${50 + 40 * Math.cos(ang)}%`, top: `${50 + 40 * Math.sin(ang)}%` }; };
            const trumpCol = SUIT_COLORS[T.trumpSuit] || '#f8fafc';
            const canIDefend = iAmDefender && myTurn && undefPairs.length > 0;
            const allDefended = pairs.length > 0 && undefPairs.length === 0;
            const canIAdd = isSeated && !iAmDefender && !me?.out && T.status === 'playing' && ((pairs.length === 0 && iAmAttackerMain) || (pairs.length > 0 && allDefended && myTurn));
            const canTransfer = canIDefend && setts.variant === 'perevodnoy' && pairs.every(x => !x.d) && (me?.cards || []).some(c => pairs.every(x => x.a.v === c.v));
            const blindPending = iAmDefender && myTurn && undefPairs.some(x => x.blind);
            const canBluff = setts.bluffEnabled && isSeated && !iAmDefender && !me?.out && T.status === 'playing' && pairs.length > 0 && allDefended && myTurn;
            const res = T.lastResults;

            return (
                <div className="h-full w-full flex flex-col bg-slate-950 font-sans overflow-hidden select-none" dir="ltr"
                     style={{ background: 'radial-gradient(ellipse at 50% 0%, #1a2436 0%, #05070f 60%)' }}>

                    {/* Header */}
                    <div className="h-14 bg-slate-900/80 backdrop-blur-md border-b border-white/5 flex justify-between items-center px-3 shrink-0 z-40">
                        <div className="flex items-center gap-2">
                            <button onClick={handleLeave} className="px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 hover:bg-rose-700 hover:text-white text-xs font-bold border border-white/10">
                                <i className="fa-solid fa-door-open ml-1"></i>{isSeated ? 'Stand up' : 'Leave'}
                            </button>
                            {isGod && (
                                <button onClick={() => setGodView(!godView)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black border transition-all ${godView ? 'bg-purple-600 text-white border-purple-400 shadow-[0_0_12px_purple]' : 'bg-slate-800 text-purple-400 border-white/10'}`}>
                                    <i className="fa-solid fa-eye ml-1"></i>GOD
                                </button>
                            )}
                            {isSuperAdmin && ['setup','showdown'].includes(T.status) && (
                                <button onClick={handleAddBot} className="px-2.5 py-1.5 rounded-lg bg-slate-800 text-purple-300 text-[10px] font-black border border-white/10" title="Add bot"><i className="fa-solid fa-robot"></i></button>
                            )}
                        </div>
                        <div className="flex-1 min-w-0 flex flex-col items-center px-1">
                            <span className="text-blue-300 font-black text-sm tracking-wider">Durak {setts.variant === 'perevodnoy' ? '· Transfer' : ''}</span>
                            <span className="text-slate-400 text-[10px] font-bold" dir="ltr">{setts.deckSize} cards</span>
                        </div>
                        <div className="flex items-center gap-2">
                            {T.trumpSuit && T.status !== 'setup' && (
                                <div className="bg-slate-950/80 border border-white/10 rounded-xl px-2.5 py-1 text-center">
                                    <span className="text-[9px] text-slate-400 font-bold block leading-none mb-0.5">Trump</span>
                                    <span className="font-black text-lg leading-none" style={{ color: trumpCol, textShadow: '0 0 8px rgba(255,255,255,0.2)' }}>{T.trumpSuit}</span>
                                </div>
                            )}
                            <div className="bg-slate-950/80 border border-amber-500/30 rounded-xl px-3 py-1 text-center">
                                <span className="text-[9px] text-amber-300 font-bold block leading-none mb-0.5">POT</span>
                                <span className="text-amber-400 font-black text-sm leading-none" dir="ltr">{formatShort(T.status === 'showdown' ? (res?.pot || 0) : (T.pot || 0))}</span>
                            </div>
                        </div>
                    </div>

                    {/* השולחן */}
                    <div className="flex-1 relative flex items-center justify-center p-3 sm:p-5 min-h-0 pt-16">

                        {/* Trump + קופה + פח - למעלה, מחוץ לשולחן */}
                        {T.status === 'playing' && (
                            <div className="absolute top-1 left-1/2 -translate-x-1/2 z-30 flex items-center gap-3 sm:gap-4 bg-slate-950/85 border border-white/10 rounded-2xl px-4 py-1.5 backdrop-blur shadow-2xl">
                                <div className="flex items-center gap-2">
                                    <span className="text-[9px] text-slate-400 font-bold">Trump</span>
                                    {T.trumpCard && (T.deck || []).length > 0 ? (
                                        <div className="relative" style={{ width: '4.6rem', height: '3.3rem' }}>
                                            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 rotate-90 drop-shadow-xl"><PCard card={T.trumpCard} size="lg" /></div>
                                        </div>
                                    ) : (
                                        <span className="font-black text-4xl leading-none px-2 drop-shadow" style={{ color: trumpCol }}>{T.trumpSuit}</span>
                                    )}
                                </div>
                                <div className="w-px h-10 bg-white/10"></div>
                                <div className="flex items-center gap-2.5">
                                    {(T.deck || []).length > 0 && (
                                        <div className="relative w-9 shrink-0" style={{ height: '3.3rem' }}>
                                            <div className="w-9 card-back absolute inset-0" style={{ height: '3.3rem' }}></div>
                                            <div className="absolute inset-0 flex items-center justify-center"><span className="text-white font-black text-sm bg-black/60 rounded px-1 shadow">{(T.deck || []).length}</span></div>
                                        </div>
                                    )}
                                    <span className="text-[10px] text-slate-400 font-bold bg-black/40 px-2 py-1 rounded-full whitespace-nowrap">🗑 {T.discard || 0}</span>
                                </div>
                            </div>
                        )}

                        <div className="poker-table w-full max-w-[440px] h-full max-h-[calc(100dvh-265px)] relative">

                            {/* זוגות הAttack/הגנה */}
                            {T.status === 'playing' && (
                                <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-wrap justify-center items-center gap-x-5 gap-y-4 w-[62%] z-10" dir="ltr">
                                    {pairs.map((x, i) => (
                                        <div key={i} className="relative animate-pop-in" style={{ width: '3rem', height: '4.6rem' }}>
                                            {x.blind && !godView ? (
                                                <div className="absolute inset-0 w-12 card-back rounded-lg flex items-center justify-center ring-2 ring-rose-500/70 shadow-[0_0_12px_rgba(244,63,94,0.5)]" style={{ height: '4.4rem' }}>
                                                    <span className="text-white font-black text-2xl drop-shadow">?</span>
                                                </div>
                                            ) : x.blind && godView ? (
                                                <div className="absolute inset-0 ring-2 ring-purple-500 rounded-lg"><PCard card={x.a} size="md" /></div>
                                            ) : (
                                                <div className="absolute inset-0"><PCard card={x.a} size="md" /></div>
                                            )}
                                            {x.d && <div className="absolute left-3 top-3 rotate-[12deg] drop-shadow-xl"><PCard card={x.d} size="md" /></div>}
                                        </div>
                                    ))}
                                    {pairs.length === 0 && <span className="text-emerald-200/20 font-black text-xs tracking-[0.25em] uppercase pointer-events-none">POKERTEN</span>}
                                </div>
                            )}

                            {/* Players */}
                            {displayList.map((p, i) => {
                                const isMe = p.uid === user.uid;
                                const isTurn = T.turnUid === p.uid && T.status === 'playing';
                                const isAtt = T.attackerUid === p.uid && T.status === 'playing';
                                const isDef = T.defenderUid === p.uid && T.status === 'playing';
                                const topSeat = parseFloat(seatPos(i).top) < 34;
                                const timerPct = isTurn ? Math.max(0, timeLeft / DURAK_TIME) : 0;
                                const showAll = godView && !isMe;
                                const oppFan = !isMe && !p.out && (p.cards || []).length > 0 && T.status === 'playing';
                                return (
                                    <div key={p.uid} className="absolute z-20" style={{ ...seatPos(i), transform: 'translate(-50%, -50%)' }}>
                                        {isTurn && <div className="player-spotlight"></div>}
                                        <div className={`relative flex flex-col items-center ${p.out || p.left ? 'opacity-45' : ''}`}>
                                            {ch.bubbles[p.uid] && <div className="chat-bubble">{ch.bubbles[p.uid]}</div>}
                                            {ch.gifts.filter(g => g.to === p.uid).map((g, gi) => <div key={'g'+gi} className="gift-fx">{g.giftE}</div>)}
                                            {isAtt && !p.out && <div className="action-badge badge-blind">⚔ Attacker</div>}
                                            {isDef && !p.out && <div className="action-badge badge-fold">🛡 Defender</div>}
                                            {p.out && <div className="action-badge badge-call">✓ Done</div>}

                                            {oppFan && !topSeat && (
                                                <div className="flex mb-[-8px] z-0" dir="ltr">
                                                    {(showAll ? p.cards : p.cards.slice(0, 6)).map((c, ci) => (
                                                        <div key={ci} style={{ marginLeft: ci > 0 ? '-14px' : 0 }}><PCard card={c} hidden={!showAll} size="sm" /></div>
                                                    ))}
                                                </div>
                                            )}

                                            <div className={`player-pod ${isTurn ? 'active-glow' : ''} ${isMe ? 'w-16 h-16' : ''}`} style={{ backgroundImage: `url(${avatarUrl(p)})` }}>
                                                {isTurn && (
                                                    <svg className="absolute inset-0 w-full h-full timer-ring" viewBox="0 0 40 40">
                                                        <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(245,200,96,0.9)" strokeWidth="3" strokeDasharray={`${113 * timerPct} 113`} strokeLinecap="round" />
                                                    </svg>
                                                )}
                                            </div>
                                            {T.hostUid === p.uid && <div className="absolute -left-3 top-0 w-5 h-5 rounded-full bg-amber-400 text-slate-900 text-[9px] font-black flex items-center justify-center shadow-lg z-30">★</div>}
                                            <div className="text-[10px] font-bold text-white mt-1 max-w-[74px] truncate text-center">{isMe ? 'You' : p.name}</div>
                                            <div className="stack-capsule text-slate-200 font-black text-[10px]" dir="ltr">🂠 {(p.cards || []).length}</div>
                                            {oppFan && topSeat && (
                                                <div className="flex mt-1 z-20" dir="ltr">
                                                    {(showAll ? p.cards : p.cards.slice(0, 6)).map((c, ci) => (
                                                        <div key={ci} style={{ marginLeft: ci > 0 ? '-14px' : 0 }}><PCard card={c} hidden={!showAll} size="sm" /></div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* המתנה לPlayers */}
                        {T.status === 'setup' && (
                            <div className="absolute inset-0 z-[100] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="glass-panel rounded-3xl p-6 w-full max-w-sm text-center animate-pop-in border border-blue-500/40">
                                    <i className="fa-solid fa-chess-king text-4xl text-blue-400 mb-2"></i>
                                    <h3 className="text-xl font-black text-white mb-1">Waiting for players...</h3>
                                    <p className="text-slate-400 text-xs font-bold mb-4" dir="ltr">Buy-in: {formatMoney(setts.buyIn)} · {Object.keys(players).length}/{setts.maxPlayers || 6}</p>
                                    <div className="flex justify-center gap-3 mb-5 flex-wrap">
                                        {list.map(p => (
                                            <div key={p.uid} className="flex flex-col items-center">
                                                <img src={avatarUrl(p)} className={`w-12 h-12 rounded-xl bg-slate-800 border-2 ${p.isBot ? 'border-purple-500' : 'border-blue-500'}`} />
                                                <span className="text-[10px] text-white font-bold mt-1 max-w-[60px] truncate">{p.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                    {!isSeated && <button onClick={handleJoin} className="w-full bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 text-white py-3.5 rounded-2xl font-black shadow-lg mb-2">Join ({formatMoney(setts.buyIn)})</button>}
                                    {(isHost || isSuperAdmin) && Object.keys(players).length >= 2 && (
                                        <button onClick={startGame} className="w-full bg-gradient-to-b from-emerald-500 to-emerald-700 hover:from-emerald-400 text-white py-3.5 rounded-2xl font-black shadow-lg mb-2"><i className="fa-solid fa-play ml-2"></i>Start game</button>
                                    )}
                                    <button onClick={handleLeave} className="text-slate-400 hover:text-white text-xs font-bold underline">Back to lobby</button>
                                </div>
                            </div>
                        )}

                        {/* תוצאות */}
                        {T.status === 'showdown' && res && !resHide && (
                            <div className="absolute inset-0 z-[100] bg-black/75 backdrop-blur-sm flex items-center justify-center p-4">
                                <div className="glass-panel rounded-3xl p-6 w-full max-w-sm text-center animate-pop-in border border-amber-500/40">
                                    {res.durakName ? (
                                        <React.Fragment>
                                            <div className="text-5xl mb-2">🤡</div>
                                            <h3 className="text-2xl font-black text-rose-400 mb-1">{res.durakName} is the Durak!</h3>
                                        </React.Fragment>
                                    ) : (
                                        <React.Fragment>
                                            <i className="fa-solid fa-trophy text-4xl text-amber-400 mb-2"></i>
                                            <h3 className="text-xl font-black text-white mb-1">Winner!</h3>
                                        </React.Fragment>
                                    )}
                                    <div className="bg-slate-950/60 rounded-2xl border border-white/5 divide-y divide-white/5 text-sm my-4">
                                        {(res.winners || []).map((w, i) => (
                                            <div key={i} className="flex justify-between items-center px-4 py-2.5">
                                                <span className="font-bold text-emerald-300">🏆 {w}</span>
                                                <span className="text-emerald-400 font-black" dir="ltr">+{formatMoney(res.share)}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-3">
                                        {(isHost || isSuperAdmin) && !tableState.tournamentId && Object.keys(players).length >= 2 && <button onClick={startGame} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-black">New game</button>}
                                        {isSeated && <button onClick={() => { window.fb.updateDoc(tblRef(), { [`players.${user.uid}.stayAt`]: Date.now() }).catch(() => {}); setResHide(true); }} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-black border border-slate-500">I&apos;m staying 🔄 ({stayLeft})</button>}
                                        {isSeated && <button onClick={handleLeave} className="flex-1 bg-slate-800 hover:bg-rose-900 text-slate-300 py-3 rounded-xl font-black border border-white/10">Stand up 🚪</button>}
                                        {!isSeated && <button onClick={() => setResHide(true)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-3 rounded-xl font-black border border-white/10">👁 Keep watching</button>}
                                    </div>
                                </div>
                            </div>
                        )}

        const SHOWDOWN_GRACE = 15;
        function useShowdownSweep(T, refGetter, maxPlayers, seatWaitlistFn, cashStacks) {
            const [stayLeft, setStayLeft] = useState(SHOWDOWN_GRACE);
            const sweptRef = useRef(0);
            useEffect(() => {
                if (!T || T.status !== 'showdown' || !T.showdownAt) return;
                const iv = setInterval(async () => {
                    const rem = Math.max(0, SHOWDOWN_GRACE - Math.floor((Date.now() - T.showdownAt) / 1000));
                    setStayLeft(rem);
                    if (rem > 0 || sweptRef.current === T.showdownAt) return;
                    sweptRef.current = T.showdownAt;
                    let deletedT = null;
                    try {
                        await window.fb.runTransaction(window.fb.db, async (tr) => {
                            const ref = refGetter();
                            const snap = await tr.get(ref);
                            if (!snap.exists()) return;
                            const t = snap.data();
                            if (t.status !== 'showdown' || t.showdownAt !== T.showdownAt) return;
                            const pl = {};
                            const kicked = [];
                            Object.entries(t.players || {}).forEach(([k, p]) => {
                                if (p.isBot || (p.stayAt || 0) >= t.showdownAt) pl[k] = { ...p };
                                else kicked.push(p);
                            });
                            // בTables סטאק (Chinese Poker (OFC)): מי שנבעט מקבל את הצ'יפים שלו Back לארנק
                            if (cashStacks) {
                                // פיירסטור: כל הקריאות לפני כל הכתיבות - שלב א' collecting, phase ' מזכה
                                const payable = kicked.filter(p => !p.isBot && p.stack > 0);
                                const snaps = [];
                                for (const p of payable) snaps.push([p, await tr.get(memDoc(p.uid))]);
                                for (const [p, ms] of snaps) {
                                    if (ms.exists()) tr.update(ms.ref, { balance: round2((ms.data().balance || 0) + p.stack) });
                                }
                            }
                            let wl = t.waitlist || [];
                            if (seatWaitlistFn) wl = seatWaitlistFn(pl, [...wl], maxPlayers);
                            const humans = Object.values(pl).filter(p => !p.isBot).length;
                            if (humans === 0 && !wl.length) { tr.delete(ref); deletedT = { ...t, docId: ref.id }; return; }
                            tr.update(ref, { players: pl, status: 'setup', waitlist: wl, showdownAt: null });
                        });
                    } catch(e) {}
                    if (deletedT) spawnTwinTable(deletedT); // שולחן שנסגר - נולד חדש במקומו
                }, 500);
                return () => clearInterval(iv);
            }, [T && T.status, T && T.showdownAt]);
            return stayLeft;
        }
