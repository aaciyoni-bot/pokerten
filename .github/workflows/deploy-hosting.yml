name: Deploy Firebase Hosting

# Serves the precompiled site (this branch) on Firebase Hosting:
#   https://pokerten.web.app  and  https://pokerten.firebaseapp.com
# Independent of the pokerten.com custom-domain DNS — a reliable fallback link.
# Requires repo secret FIREBASE_TOKEN (same one used by the functions deploy).

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'sw.js'
      - 'assets/**'
      - 'icon-*.png'
      - 'firebase.json'
  workflow_dispatch: {}

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting --project pokerten --non-interactive
