        /* ================================================================
           Poker table - מנוע + תצוגה
           ================================================================ */
        function PokerTable({ tableDocId, user, onLeave, showToast }) {
            const [tableState, setTableState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [godView, setGodView] = useState(false);
            const [spectate, setSpectate] = useState(false);
            const [buyAmt, setBuyAmt] = useState(0);
            const [raiseAmt, setRaiseAmt] = useState(0);
            const [timeLeft, setTimeLeft] = useState(30);

            const tableRef = useRef(null);
            const advanceRef = useRef(null);
            const nextHandRef = useRef(null);
            const startingRef = useRef(false);
            const synthRef = useRef(null);

            const isGod = isGodUser(user);
            const isSuperAdmin = user.role === ROLES.SUPER_ADMIN;
            const tblRef = () => window.fb.doc(window.fb.db, "tables", tableDocId);

            const setts = tableState?.settings || {};
            const gs = tableState?.gameState || {};
            const players = tableState?.players || {};
            const myPlayer = players[user.uid];
            const isSeated = !!myPlayer;
            const BB = (Number(setts.blinds) || 0.5) * 2;
            const BETTING = ['preflop','flop','turn','river'];
            const inBetting = BETTING.includes(gs.phase);
            const isMyTurn = gs.activeTurnUid === user.uid && inBetting;

            const clonePlayers = (pl) => { const o = {}; Object.entries(pl || {}).forEach(([k,v]) => o[k] = { ...v, cards: [...(v.cards||[])] }); return o; };
            const saveGame = async (g, pl, extra = {}) => { try { await window.fb.updateDoc(tblRef(), { gameState: g, players: pl, ...extra }); } catch(e) {} };

            /* ---------- סנכרון ---------- */
            useEffect(() => {
                if (!tableDocId) return;
                const unsub = window.fb.onSnapshot(tblRef(), d => {
                    if (d.exists()) { const t = { id: d.id, ...d.data() }; tableRef.current = t; setTableState(t); setLoading(false); }
                    else { showToast("The table closed", "error"); onLeave(); }
                });
                return () => { unsub(); clearTimeout(advanceRef.current); clearTimeout(nextHandRef.current); };
            }, [tableDocId]);

            useEffect(() => {
                if (!tableState) return;
                const left = (tableState.leftStacks || {})[user.uid];
                const lock = left && Date.now() - left.at < 12 * 60 * 60 * 1000 ? left.amount : 0;
                const minB = Math.max((setts.minBuyInBB || 40) * BB, lock);
                if (buyAmt < minB) setBuyAmt(round2(minB));
            }, [tableState]);

            useEffect(() => {
                if (isMyTurn) setRaiseAmt(round2(Math.min((gs.highestBet || 0) + (gs.minRaise || BB), (myPlayer?.bet || 0) + (myPlayer?.stack || 0))));
            }, [gs.activeTurnUid, gs.turnStartedAt]);

            /* ---------- מנוע ---------- */
            const firstAfterDealer = (g, pl) => {
                const actives = Object.values(pl).filter(p => p.status === 'active').sort((a,b) => a.seatIndex - b.seatIndex);
                const dSeat = pl[g.dealerUid]?.seatIndex ?? -1;
                const rot = actives.filter(p => p.seatIndex > dSeat).concat(actives.filter(p => p.seatIndex <= dSeat));
                const cand = rot.find(p => p.stack > 0);
                return cand ? cand.uid : null;
            };

            const finishEarlyWin = async (g, pl, winnerUid) => {
                gatherBetsToPots(g, pl);
                const pot = round2((g.pots || []).reduce((s, p) => s + p.amount, 0));
                const rakeFrac = (Number(setts.rakePercent) || 0) / 100;
                const rake = (g.board || []).length > 0 ? round2(pot * rakeFrac) : 0; // No Flop No Drop
                pl[winnerUid].stack = round2(pl[winnerUid].stack + pot - rake);
                pl[winnerUid].actionText = 'WINNER';
                g.pots = []; g.phase = 'showdown'; g.activeTurnUid = null;
                g.lastWinAmount = round2(pot - rake);
                g.lastWinners = pl[winnerUid].name;
                Object.values(pl).forEach(q => { if ((q.stack || 0) <= 0 && (q.cards || []).length && !['busted','out'].includes(q.status)) { q.status = 'busted'; q.bustedAt = Date.now(); } });
                const tourExtra = applyTourFlow(pl, [winnerUid]);
                const histT = tableRef.current;
                const histEntry = {
                    at: Date.now(), game: g.currentGameType, board: g.board || [], rake, amount: round2(pot - rake), winners: pl[winnerUid].name,
                    ps: Object.values(pl).filter(q => (q.cards || []).length).map(q => ({ n: q.name, c: q.cards, w: q.uid === winnerUid, f: q.status === 'folded' }))
                };
                await saveGame(g, pl, { history: [...((histT && histT.history) || []), histEntry].slice(-100), ...tourExtra });
                distributeRake(rake, Object.values(pl).filter(q => (q.cards || []).length).map(q => q.uid));
                clearTimeout(nextHandRef.current);
                nextHandRef.current = setTimeout(() => startHand(), 3500);
            };

            const runShowdown = async (g, pl) => {
                const actives = Object.values(pl).filter(p => p.status === 'active');
                const scores = {};
                actives.forEach(p => {
                    const isOmaha = (g.currentGameType || '').startsWith('Omaha');
                    let best = 0;
                    if (isOmaha) {
                        const hc = getCombinations(p.cards, 2); const bc = getCombinations(g.board, 3);
                        hc.forEach(h => bc.forEach(b => { const sc = evaluate5Cards([...h, ...b]); if (sc > best) best = sc; }));
                    } else {
                        const all = [...p.cards, ...g.board];
                        getCombinations(all, 5).forEach(c => { const sc = evaluate5Cards(c); if (sc > best) best = sc; });
                    }
                    scores[p.uid] = best;
                });
                let rakeTotal = 0; const winnerNames = new Set(); let winTotal = 0;
                const rakeFrac = (Number(setts.rakePercent) || 0) / 100;
                (g.pots || []).forEach((pot, idx) => {
                    const elig = (pot.eligible || []).filter(uid => pl[uid] && pl[uid].status === 'active');
                    if (elig.length === 0) return;
                    let bestS = -1; let winners = [];
                    elig.forEach(uid => { const sc = scores[uid] || 0; if (sc > bestS) { bestS = sc; winners = [uid]; } else if (sc === bestS) winners.push(uid); });
                    let amount = pot.amount;
                    if (idx === 0) { const r = round2(amount * rakeFrac); rakeTotal = round2(rakeTotal + r); amount = round2(amount - r); }
                    const share = Math.floor((amount / winners.length) * 100) / 100;
                    winTotal = round2(winTotal + share * winners.length);
                    winners.forEach(uid => { pl[uid].stack = round2(pl[uid].stack + share); pl[uid].actionText = 'WINNER'; winnerNames.add(pl[uid].name); });
                });
                g.pots = []; g.phase = 'showdown'; g.activeTurnUid = null;
                g.lastWinAmount = winTotal;
                g.lastWinners = [...winnerNames].join(', ');
                Object.values(pl).forEach(q => { if ((q.stack || 0) <= 0 && (q.cards || []).length && !['busted','out'].includes(q.status)) { q.status = 'busted'; q.bustedAt = Date.now(); } });
                const winnersUids = Object.values(pl).filter(q => winnerNames.has(q.name)).map(q => q.uid);
                const tourExtra = applyTourFlow(pl, winnersUids);
                const histT = tableRef.current;
                const histEntry = {
                    at: Date.now(), game: g.currentGameType, board: g.board || [], rake: rakeTotal, amount: winTotal, winners: g.lastWinners,
                    ps: Object.values(pl).filter(q => (q.cards || []).length).map(q => ({ n: q.name, c: q.cards, w: winnerNames.has(q.name), f: q.status === 'folded' }))
                };
                await saveGame(g, pl, { history: [...((histT && histT.history) || []), histEntry].slice(-100), ...tourExtra });
                distributeRake(rakeTotal, Object.values(pl).filter(q => (q.cards || []).length).map(q => q.uid));
                clearTimeout(nextHandRef.current);
                nextHandRef.current = setTimeout(() => startHand(), 5000);
            };

            const advancePhase = async (gIn, plIn) => {
                const g = { ...gIn }; const pl = clonePlayers(plIn);
                gatherBetsToPots(g, pl);
                g.highestBet = 0; g.minRaise = BB;
                Object.values(pl).forEach(p => { if (p.status === 'active') { p.hasActed = false; if (p.actionText !== 'All-in') p.actionText = ''; } });
                const deck = [...(g.deck || [])];

                if (g.phase === 'preflop') {
                    deck.pop(); g.board = [deck.pop(), deck.pop(), deck.pop()]; g.deck = deck;
                    if (g.currentGameType === 'Pineapple') {
                        // תיקון קריטי: קודם ה-return רץ לפני השמירה והפיינאפל נתקע לנצח
                        g.phase = 'discard'; g.activeTurnUid = null; g.turnStartedAt = Date.now();
                        await saveGame(g, pl);
                        return;
                    }
                    g.phase = 'flop';
                } else if (g.phase === 'flop') { deck.pop(); g.board = [...g.board, deck.pop()]; g.deck = deck; g.phase = 'turn'; }
                else if (g.phase === 'turn') { deck.pop(); g.board = [...g.board, deck.pop()]; g.deck = deck; g.phase = 'river'; }
                else if (g.phase === 'river') { await runShowdown(g, pl); return; }
                else return;

                const actors = Object.values(pl).filter(p => p.status === 'active' && p.stack > 0);
                if (actors.length < 2) {
                    // Runout אוטומטי כשכולם All-in - הקלפים נחשפים והאחוזים האמיתיים מוצגים
                    g.allInReveal = true;
                    g.activeTurnUid = null;
                    await saveGame(g, pl);
                    clearTimeout(advanceRef.current);
                    advanceRef.current = setTimeout(() => advancePhase(g, pl), 1500);
                    return;
                }
                g.activeTurnUid = firstAfterDealer(g, pl);
                g.turnStartedAt = Date.now();
                await saveGame(g, pl);
            };

            const performAction = async (actorUid, type, targetBet, autoTimeout) => {
                const t = tableRef.current; if (!t) return;
                const g = { ...t.gameState };
                if (g.activeTurnUid !== actorUid || !BETTING.includes(g.phase)) return;
                const pl = clonePlayers(t.players);
                const p = pl[actorUid]; if (!p || p.status !== 'active') return;
                // Sit out אוטומטי: שתי החמצות טיימר רצופות
                p.missed = autoTimeout ? (p.missed || 0) + 1 : 0;
                if (autoTimeout && p.missed >= 2 && !p.sitOut) { p.sitOut = true; p.sitOutAt = Date.now(); p.sitAuto = true; }

                if (type === 'fold') { p.status = 'folded'; p.actionText = 'Fold'; p.hasActed = true; }
                else if (type === 'call') {
                    const toCall = round2(Math.max(0, g.highestBet - (p.bet || 0)));
                    const pay = Math.min(toCall, p.stack);
                    p.stack = round2(p.stack - pay); p.bet = round2((p.bet || 0) + pay);
                    p.actionText = pay > 0 ? (p.stack === 0 ? 'All-in' : 'Call') : 'Check';
                    p.hasActed = true;
                } else if (type === 'raise') {
                    const maxT = round2((p.bet || 0) + p.stack);
                    let target = Math.min(round2(targetBet), maxT);
                    const minT = round2(g.highestBet + g.minRaise);
                    if (target < minT) target = Math.min(minT, maxT);
                    const add = round2(target - (p.bet || 0));
                    if (add <= 0) return;
                    p.stack = round2(p.stack - add); p.bet = target;
                    if (target > g.highestBet) {
                        g.minRaise = Math.max(g.minRaise, round2(target - g.highestBet));
                        g.highestBet = target;
                        // רייס פותח מחדש את הסיבוב לכל השאר - זה מה שתוקן מ"A round that closed after one check"
                        Object.values(pl).forEach(q => { if (q.uid !== actorUid && q.status === 'active' && q.stack > 0) q.hasActed = false; });
                    }
                    p.actionText = p.stack === 0 ? 'All-in' : 'Raise';
                    p.hasActed = true;
                }

                const actives = Object.values(pl).filter(q => q.status === 'active');
                if (actives.length === 1) { await finishEarlyWin(g, pl, actives[0].uid); return; }

                const order = actives.sort((a,b) => a.seatIndex - b.seatIndex);
                const actorSeat = p.seatIndex;
                const after = order.filter(q => q.seatIndex > actorSeat).concat(order.filter(q => q.seatIndex <= actorSeat && q.uid !== actorUid));
                let next = null;
                for (const q of after) { if (q.stack > 0 && (!q.hasActed || (q.bet || 0) < g.highestBet)) { next = q; break; } }

                if (next) { g.activeTurnUid = next.uid; g.turnStartedAt = Date.now(); await saveGame(g, pl); }
                else {
                    g.activeTurnUid = null;
                    const actorsLeft = actives.filter(q => q.stack > 0);
                    if (actives.length > 1 && actorsLeft.length < 2) g.allInReveal = true; // All-in: חושפים קלפים ומציגים אחוזים אמיתיים
                    await saveGame(g, pl);
                    clearTimeout(advanceRef.current);
                    advanceRef.current = setTimeout(() => advancePhase(g, pl), 1300);
                }
            };

            const executeDeal = async (gBase, plBase, gameType) => {
                const tour = (tableRef.current || {}).tournament || null;
                const deck = pokerDeck();
                const pl = clonePlayers(plBase);
                const actives = Object.values(pl).filter(p => p.status === 'active').sort((a,b) => a.seatIndex - b.seatIndex);
                const n = GAME_CARDS[gameType] || 2;
                actives.forEach(p => { p.cards = deck.splice(0, n); p.bet = 0; p.hasActed = false; p.actionText = ''; });
                // Blinds ואנטה: רגיל מהSettings, טורניר לפי הרמה
                let sbAmt = Number(setts.blinds), bbAmt = BB, anteAmt = round2(Number(setts.ante) || 0), lvl = 0;
                if (tour) {
                    lvl = Math.min(TOUR_SCHEDULE.length - 1, Math.floor((Date.now() - (tour.startedAt || Date.now())) / ((tour.levelMins || 5) * 60000)));
                    sbAmt = TOUR_SCHEDULE[lvl][0]; bbAmt = TOUR_SCHEDULE[lvl][1];
                    anteAmt = lvl >= (tour.anteFromLevel ?? 4) ? sbAmt : 0;
                }
                let anteTotal = 0;
                if (anteAmt > 0) actives.forEach(p => { const a = Math.min(anteAmt, p.stack); p.stack = round2(p.stack - a); anteTotal = round2(anteTotal + a); });
                const dIdx = Math.max(0, actives.findIndex(p => p.uid === gBase.dealerUid));
                let sbP, bbP, utgP, utgIdx;
                if (actives.length === 2) { sbP = actives[dIdx]; bbP = actives[(dIdx+1)%2]; utgP = sbP; utgIdx = dIdx; }
                else { sbP = actives[(dIdx+1)%actives.length]; bbP = actives[(dIdx+2)%actives.length]; utgIdx = (dIdx+3)%actives.length; utgP = actives[utgIdx]; }
                const post = (p, amt, label) => { const pay = Math.min(amt, p.stack); p.stack = round2(p.stack - pay); p.bet = round2(pay); p.actionText = label; };
                post(sbP, sbAmt, 'SB'); post(bbP, bbAmt, 'BB');
                // Straddle וולונטרי (משחקים רגילים): UTG שהדליק את הטוגל שם 2xBB עיוור ומקבל אופציה אחרונה
                let high = bbAmt, minR = bbAmt, firstUid = utgP.uid;
                if (!tour && setts.straddle && actives.length >= 3 && plBase[utgP.uid] && plBase[utgP.uid].straddleNext && utgP.stack > bbAmt * 2) {
                    post(utgP, bbAmt * 2, 'Straddle');
                    utgP.hasActed = false;
                    high = round2(bbAmt * 2); minR = round2(bbAmt * 2);
                    firstUid = actives[(utgIdx + 1) % actives.length].uid;
                }
                const g = { ...gBase, deck, board: [], pots: anteTotal > 0 ? [{ amount: anteTotal, eligible: actives.map(p => p.uid) }] : [], highestBet: high, minRaise: minR, phase: 'preflop', currentGameType: gameType, activeTurnUid: firstUid, turnStartedAt: Date.now(), lastWinners: null, lastWinAmount: 0, allInReveal: false, tourLevel: lvl };
                await saveGame(g, pl);
            };

            const startHand = async () => {
                if (startingRef.current) return;
                startingRef.current = true;
                try {
                    const snap = await window.fb.getDoc(tblRef());
                    if (!snap.exists()) return;
                    const t = snap.data();
                    const g0 = t.gameState;
                    if (!['waiting','showdown'].includes(g0.phase)) return;
                    const pl = clonePlayers(t.players);
                    Object.values(pl).forEach(p => { p.cards = []; p.bet = 0; p.actionText = ''; p.hasActed = false; p.status = p.stack > 0 ? ((p.sitOut && !t.tournamentId) ? 'sitout' : 'active') : (['busted','out'].includes(p.status) ? p.status : 'sitout'); });
                    const actives = Object.values(pl).filter(p => p.status === 'active').sort((a,b) => a.seatIndex - b.seatIndex);
                    if (actives.length < 2) {
                        await saveGame({ ...g0, phase: 'waiting', activeTurnUid: null, board: [], pots: [] }, pl);
                        return;
                    }
                    const uids = actives.map(p => p.uid);
                    let dIdx = uids.indexOf(g0.dealerUid);
                    const dealerUid = uids[(dIdx + 1) % uids.length];
                    // Dealer's Choice מתוקן: הכפתור מתקדם כל יד, ה-DC זז אחורה מושב אחד רק כשהכפתור משלים הקפה מלאה.
                    // כך הם נפגשים אחת ל"Level + hand" ולא נתקעים אצל אותו שחקן.
                    let dcUid = g0.dcUid || null;
                    let dcAnchor = g0.dcAnchor || null;
                    if (setts.isDealerChoice) {
                        if (!dcUid || uids.indexOf(dcUid) === -1 || !dcAnchor || uids.indexOf(dcAnchor) === -1) {
                            dcAnchor = dealerUid;
                            dcUid = uids[(uids.indexOf(dealerUid) - 1 + uids.length) % uids.length];
                        } else if (dealerUid === dcAnchor) {
                            dcUid = uids[(uids.indexOf(dcUid) - 1 + uids.length) % uids.length];
                        }
                    } else { dcUid = null; dcAnchor = null; }
                    const g = { ...g0, dealerUid, dcUid, dcAnchor, board: [], pots: [], lastWinners: null, lastWinAmount: 0, allInReveal: false };
                    if (setts.isDealerChoice && dealerUid === dcUid) {
                        // הכפתורים נפגשו - הדילר בוחר משחק!
                        g.phase = 'dc_selection'; g.activeTurnUid = null; g.turnStartedAt = Date.now();
                        await saveGame(g, pl);
                    } else {
                        await executeDeal(g, pl, setts.isDealerChoice ? (g.currentGameType || setts.baseGameType) : setts.baseGameType);
                    }
                } finally { startingRef.current = false; }
            };

            const selectDCGame = async (gameType, byUid = user.uid) => {
                const t = tableRef.current; if (!t) return;
                const g = t.gameState;
                if (g.phase !== 'dc_selection' || g.dcUid !== byUid) return;
                await executeDeal({ ...g }, clonePlayers(t.players), gameType);
            };

            const handleDiscardCard = async (uid, cardIdx) => {
                const t = tableRef.current; if (!t) return;
                const g = { ...t.gameState };
                if (g.phase !== 'discard') return;
                const pl = clonePlayers(t.players);
                const p = pl[uid];
                if (!p || p.status !== 'active' || (p.cards || []).length !== 3) return;
                p.cards.splice(cardIdx, 1);
                p.actionText = 'Discard';
                const pending = Object.values(pl).some(q => q.status === 'active' && (q.cards || []).length === 3);
                if (!pending) {
                    // כולם זרקו - מתחיל סיבוב הימורים על הFlop (תוקן: קודם דילג ישר לTurn)
                    g.phase = 'flop';
                    Object.values(pl).forEach(q => { if (q.status === 'active') { q.hasActed = false; if (q.actionText !== 'All-in') q.actionText = ''; } });
                    const actors = Object.values(pl).filter(q => q.status === 'active' && q.stack > 0);
                    if (actors.length < 2) {
                        g.activeTurnUid = null;
                        await saveGame(g, pl);
                        clearTimeout(advanceRef.current);
                        advanceRef.current = setTimeout(() => advancePhase(g, pl), 1400);
                        return;
                    }
                    g.activeTurnUid = firstAfterDealer(g, pl);
                    g.turnStartedAt = Date.now();
                }
                await saveGame(g, pl);
            };

            /* ---------- ישיבה / Rebuy / קימה ---------- */
            const handleSit = async () => {
                if (tableState?.tournament) return showToast("Tournament table - join via registration in the lobby", "error");
                try {
                    let becameFull = false;
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const uRef = memDoc(user.uid);
                        const [uSnap, tSnap] = [await tr.get(uRef), await tr.get(tblRef())];
                        if (!tSnap.exists()) throw "Table doesn't exist";
                        const t = tSnap.data();
                        const pl = t.players || {};
                        if (pl[user.uid]) throw "You're already seated";
                        if (Object.keys(pl).length >= (t.settings.maxPlayers || 6)) throw "The table is full";
                        if ((uSnap.data().balance || 0) < buyAmt) throw "Not enough balance in wallet";
                        const left = (t.leftStacks || {})[user.uid];
                        if (left && Date.now() - left.at < 12 * 60 * 60 * 1000 && buyAmt < round2(left.amount)) throw `You left this table with ${formatMoney(left.amount)} - you must return with at least this amount`;
                        let seatIndex = 0;
                        const taken = new Set(Object.values(pl).map(p => p.seatIndex));
                        while (taken.has(seatIndex)) seatIndex++;
                        const midHand = !['waiting','showdown'].includes(t.gameState.phase);
                        tr.update(uRef, { balance: round2(uSnap.data().balance - buyAmt) });
                        tr.update(tblRef(), { [`leftStacks.${user.uid}`]: null, [`players.${user.uid}`]: {
                            uid: user.uid, name: user.username, photo: user.photo || '', avatarSeed: user.avatarSeed || '', seatIndex, stack: round2(buyAmt), bet: 0, buyTotal: round2(buyAmt),
                            status: midHand ? 'waiting' : 'active', cards: [], hasActed: false, actionText: '', isBot: false
                        }});
                        if (Object.keys(pl).length + 1 >= (t.settings.maxPlayers || 6)) becameFull = true;
                    });
                    setSpectate(false);
                    if (becameFull) spawnTwinTable(tableRef.current);
                } catch(e) { showToast(typeof e === 'string' ? e : "Error taking a seat", "error"); }
            };

            // ── Waitlist: queue for a full table, auto-seat when a spot frees ──
            const joinWaitlist = async () => {
                if (tableState?.tournamentId) return;
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const tSnap = await tr.get(tblRef());
                        if (!tSnap.exists()) throw "Table doesn't exist";
                        const t = tSnap.data();
                        if ((t.players || {})[user.uid]) throw "You're already seated";
                        const wl = Array.isArray(t.waitlist) ? t.waitlist.slice() : [];
                        if (wl.some(w => w.uid === user.uid)) throw "You're already on the waitlist";
                        wl.push({ uid: user.uid, name: user.username, at: Date.now(), buyAmt: round2(buyAmt) });
                        tr.update(tblRef(), { waitlist: wl });
                    });
                    showToast("Added to the waitlist — you'll be seated automatically when a spot opens 🪑", "success");
                } catch(e) { showToast(typeof e === 'string' ? e : "Waitlist error", "error"); }
            };
            const leaveWaitlist = async () => {
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const tSnap = await tr.get(tblRef());
                        if (!tSnap.exists()) return;
                        const wl = (tSnap.data().waitlist || []).filter(w => w.uid !== user.uid);
                        tr.update(tblRef(), { waitlist: wl });
                    });
                    showToast("Removed from the waitlist", "info");
                } catch(e) {}
            };
            // First person on the list auto-seats themselves the moment a seat frees.
            const promotingRef = useRef(false);
            useEffect(() => {
                const t = tableState; if (!t || t.tournamentId) return;
                const pl = t.players || {}; const wl = t.waitlist || [];
                if (pl[user.uid]) return;                        // already seated
                if (!wl.length || wl[0].uid !== user.uid) return; // not my turn
                const cap = (t.settings || {}).maxPlayers || 6;
                if (Object.keys(pl).length >= cap) return;        // still full
                if (promotingRef.current) return;
                promotingRef.current = true;
                (async () => {
                    try {
                        const want = round2(wl[0].buyAmt || buyAmt);
                        await window.fb.runTransaction(window.fb.db, async (tr) => {
                            const uRef = memDoc(user.uid);
                            const [uSnap, tSnap] = [await tr.get(uRef), await tr.get(tblRef())];
                            if (!tSnap.exists()) throw "gone";
                            const td = tSnap.data(); const p2 = td.players || {}; const w2 = td.waitlist || [];
                            if (p2[user.uid]) throw "seated";
                            if (!w2.length || w2[0].uid !== user.uid) throw "not-first";
                            if (Object.keys(p2).length >= ((td.settings || {}).maxPlayers || 6)) throw "full";
                            if ((uSnap.data().balance || 0) < want) throw "You reached the top of the waitlist but don't have enough balance — removed from list";
                            let seatIndex = 0; const taken = new Set(Object.values(p2).map(p => p.seatIndex));
                            while (taken.has(seatIndex)) seatIndex++;
                            const midHand = !['waiting','showdown'].includes(td.gameState.phase);
                            tr.update(uRef, { balance: round2(uSnap.data().balance - want) });
                            tr.update(tblRef(), {
                                waitlist: w2.slice(1),
                                [`leftStacks.${user.uid}`]: null,
                                [`players.${user.uid}`]: { uid: user.uid, name: user.username, photo: user.photo || '', avatarSeed: user.avatarSeed || '', seatIndex, stack: round2(want), bet: 0, buyTotal: round2(want), status: midHand ? 'waiting' : 'active', cards: [], hasActed: false, actionText: '', isBot: false }
                            });
                        });
                        setSpectate(false);
                        showToast("A seat opened up — you're in! 🎉", "success");
                    } catch(e) {
                        if (typeof e === 'string' && e.startsWith('You reached')) { showToast(e, "error"); leaveWaitlist(); }
                    } finally { promotingRef.current = false; }
                })();
            }, [tableState, user.uid]);

            const handleRebuy = async () => {
                if (tableState?.tournament) return showToast("No standard Rebuy in a tournament - use Rebuy/Add-on per tournament rules", "error");
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const uRef = memDoc(user.uid);
                        const [uSnap, tSnap] = [await tr.get(uRef), await tr.get(tblRef())];
                        if (!tSnap.exists()) throw "err";
                        const t = tSnap.data();
                        if (!t.players[user.uid]) throw "You're not seated at the table";
                        const capMax = (Number(t.settings.maxBuyInBB) || 200) * (Number(t.settings.blinds) || 0.5) * 2;
                        const room = round2(capMax - (t.players[user.uid].stack || 0));
                        if (room <= 0) throw `You're already at the max table buy-in (${formatMoney(capMax)})`;
                        const addAmt = Math.min(round2(buyAmt), room);
                        if ((uSnap.data().balance || 0) < addAmt) throw "Not enough balance in wallet";
                        tr.update(uRef, { balance: round2(uSnap.data().balance - addAmt) });
                        tr.update(tblRef(), {
                            [`players.${user.uid}.stack`]: round2((t.players[user.uid].stack || 0) + addAmt),
                            [`players.${user.uid}.buyTotal`]: round2((t.players[user.uid].buyTotal || 0) + addAmt),
                            [`players.${user.uid}.status`]: ['waiting','showdown'].includes(t.gameState.phase) ? 'active' : t.players[user.uid].status
                        });
                    });
                    showToast("Rebuy done!", "success");
                } catch(e) { showToast(typeof e === 'string' ? e : "Error", "error"); }
            };

            // טורניר: מי שירד ל-0 מדווח (דירוג + באונטי); שולחן עם שורד יחיד מסומן כגמור
            const applyTourFlow = (pl, winnersUids) => {
                const tour = (tableRef.current || {}).tournament;
                if (!tour) return {};
                const lvl = tourLevelOf(tour);
                const bustedNow = [];
                Object.values(pl).forEach(q => {
                    if (q.status === 'busted' && !q._reported) {
                        q._reported = true;
                        bustedNow.push(q.uid);
                        if (lvl > (tour.rebuyUntil ?? -1)) q.status = 'out';
                    }
                });
                if (bustedNow.length) {
                    const outsNow = bustedNow.filter(u => pl[u].status === 'out');
                    tourReportBust(tableState.tournamentId, outsNow, winnersUids.filter(w => !bustedNow.includes(w)), tour.bounty || 0, true);
                    if (tour.bounty > 0 && outsNow.length < bustedNow.length) {
                        tourReportBust(tableState.tournamentId, [], winnersUids.filter(w => !bustedNow.includes(w)), tour.bounty || 0, false);
                    }
                }
                const alive = Object.values(pl).filter(q => (q.stack || 0) > 0);
                if (alive.length === 1) {
                    // MTT: a non-final table with a single player does NOT finish - it waits for the
                    // orchestrator to move it to another table. Only the final table (tour.final) ends = champion.
                    if (tour.mttMode && !tour.final) return {};
                    return { tournament: { ...tour, finished: true, tableWinner: alive[0].uid } };
                }
                return {};
            };

            const toggleSitOut = async () => {
                const meP = tableRef.current?.players?.[user.uid]; if (!meP) return;
                try {
                    if (meP.sitOut) {
                        await window.fb.updateDoc(tblRef(), { [`players.${user.uid}.sitOut`]: false, [`players.${user.uid}.missed`]: 0, [`players.${user.uid}.sitAuto`]: false });
                        showToast("You're back at the table! Dealt in next hand 💪", "success");
                    } else {
                        await window.fb.updateDoc(tblRef(), { [`players.${user.uid}.sitOut`]: true, [`players.${user.uid}.sitOutAt`]: Date.now(), [`players.${user.uid}.sitAuto`]: false });
                        showToast(tableRef.current?.tournamentId ? "Sit out ☕ blinds keep going down in the tournament!" : "Sit out ☕ you have 10 minutes to return", "info");
                    }
                } catch(e) {}
            };
            const topUpChips = async () => {
                const t = tableRef.current; if (!t || t.tournamentId) return;
                const BBv = round2((Number(setts.blinds) || 1) * 2);
                const maxBuy2 = round2(BBv * (Number(setts.maxBuyInBB) || 100));
                const meP = t.players[user.uid]; if (!meP) return;
                const room = round2(maxBuy2 - (meP.stack || 0) - (meP.bet || 0));
                if (room <= 0) return showToast(`You're at the table cap (${formatMoney(maxBuy2)})`, "info");
                const inHand = !['waiting', 'showdown'].includes((t.gameState || {}).phase) && meP.status === 'active';
                if (inHand) return showToast("Chips can only be added between hands", "info");
                const amt = Number(window.prompt(`How much to add? (max ${formatMoney(room)})`, String(Math.min(room, BBv * 50))));
                if (!amt || amt <= 0) return;
                const add = Math.min(round2(amt), room);
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const ms = await tr.get(memDoc(user.uid));
                        const ts2 = await tr.get(tblRef());
                        if (!ms.exists() || !ts2.exists()) throw "err";
                        if ((ms.data().balance || 0) < add) throw "Not enough in wallet";
                        const cur = ts2.data().players[user.uid]; if (!cur) throw "err";
                        tr.update(ms.ref, { balance: round2((ms.data().balance || 0) - add) });
                        tr.update(tblRef(), { [`players.${user.uid}.stack`]: round2((cur.stack || 0) + add) });
                    });
                    playSnd('chip');
                    showToast(`${formatMoney(add)} added to your stack 💰`, "success");
                } catch(e) { showToast(typeof e === 'string' ? e : "Error", "error"); }
            };
            // בעיטת 10 דקות (קאש בלבד) - כל לקוח צופה בודק; מנהל יכול לבעוט ידנית
            const kickSeat = async (uid, byAdmin) => {
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const ts2 = await tr.get(tblRef());
                        if (!ts2.exists()) return;
                        const t = ts2.data();
                        const p = t.players[uid]; if (!p) return;
                        if (!byAdmin && !(p.sitOut && !t.tournamentId && Date.now() - (p.sitOutAt || 0) > 600000)) return;
                        const inHand = !['waiting', 'showdown'].includes((t.gameState || {}).phase) && p.status === 'active';
                        if (inHand && !byAdmin) return; // לא בועטים באמצע יד
                        const ms = p.isBot ? null : await tr.get(memDoc(uid));
                        const pl = { ...t.players }; delete pl[uid];
                        if (ms && ms.exists()) tr.update(ms.ref, { balance: round2((ms.data().balance || 0) + (p.stack || 0) + (inHand ? 0 : (p.bet || 0))) });
                        tr.update(tblRef(), { players: pl });
                    });
                } catch(e) {}
            };
            useEffect(() => {
                if (!tableState || tableState.tournamentId) return;
                const iv = setInterval(() => {
                    const t = tableRef.current; if (!t) return;
                    Object.values(t.players || {}).forEach(p => {
                        if (p.sitOut && !p.isBot && Date.now() - (p.sitOutAt || 0) > 600000) kickSeat(p.uid, false);
                    });

                return () => clearInterval(iv);
            }, [tableState && tableState.id]);

            const rebuyAfterBust = async () => {
                try {

                        const t = tSnap.data();
                        const me = t.players[user.uid];
                        if (!me || me.status !== 'busted') throw "Not allowed";

                        tr.update(uRef, { balance: round2(uSnap.data().balance - amt) });
                        tr.update(tblRef(), {
                            [`players.${user.uid}.stack`]: amt,

            const handleStandUp = async () => {

                    if (g.phase === 'discard' && (t.players[user.uid].cards || []).length === 3) {

                    if (g.phase === 'dc_selection' && g.dcUid === user.uid) {

                            const g2 = { ...gNow }; const pl = clonePlayers(tNow.players);

                            const actives = Object.values(pl).filter(q => q.status === 'active');

                    }
                    await new Promise(r => setTimeout(r, 500));
                }
                try {
                    let session = null;
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const uRef = memDoc(user.uid);
                        const [uSnap, tSnap] = [await tr.get(uRef), await tr.get(tblRef())];
                        if (!tSnap.exists()) return;
                        const td = tSnap.data();
                        const me = td.players[user.uid]; if (!me) return;
                        session = { stack: me.stack || 0, buy: me.buyTotal || me.stack || 0 };
                        const pl = { ...td.players }; delete pl[user.uid];
                        // ההימור התלוי של העוזב נכנס לקופה - הכסף לא נעלם
                        const pots = [...(td.gameState.pots || [])];
                        if ((me.bet || 0) > 0) {
                            const elig = Object.values(pl).filter(q => q.status === 'active').map(q => q.uid);
                            pots.push({ amount: round2(me.bet), eligible: elig });
                        }
                        tr.update(uRef, { balance: round2((uSnap.data().balance || 0) + (me.stack || 0)) });
                        const upd = { players: pl, 'gameState.pots': pots };
                        if ((me.stack || 0) > 0) upd[`leftStacks.${user.uid}`] = { amount: round2(me.stack), at: Date.now() }; // נעילת Back - 12 שעות
                        tr.update(tblRef(), upd);
                    });
                    if (session) logGameResult([{ uid: user.uid, username: user.username, game: 'poker', profit: round2(session.stack - session.buy) }], tableDocId);
                } catch(e) {}
                onLeave();
            };

            const handleAddBot = async () => {
                const t = tableRef.current; if (!t) return;
                const pl = t.players || {};
                if (Object.keys(pl).length >= (setts.maxPlayers || 6)) return showToast("The table is full", "error");
                let seatIndex = 0;
                const taken = new Set(Object.values(pl).map(p => p.seatIndex));

                const botUid = `bot_${Date.now()}`;
                const midHand = !['waiting','showdown'].includes(t.gameState.phase);
                await window.fb.updateDoc(tblRef(), { [`players.${botUid}`]: {
                    uid: botUid, name: BOT_NAMES[Math.floor(Math.random()*BOT_NAMES.length)] + Math.floor(Math.random()*99), seatIndex,
                    stack: round2(100 * BB), bet: 0, status: midHand ? 'waiting' : 'active', cards: [], hasActed: false, actionText: '', isBot: true
                }});

            /* ---------- מוח הBots (רץ רק אצל הסופר-אדמין) ---------- */
            useEffect(() => {
                if (!isSuperAdmin || !tableState || !gs.phase) return;

                if (BETTING.includes(gs.phase) && gs.activeTurnUid && players[gs.activeTurnUid]?.isBot) {
                    const uid = gs.activeTurnUid;
                    const tm = setTimeout(() => {
                        const t = tableRef.current; if (!t) return;
                        const g = t.gameState; if (g.activeTurnUid !== uid) return;
                        const b = t.players[uid]; if (!b) return;
                        const toCall = round2(Math.max(0, g.highestBet - (b.bet || 0)));
                        if (toCall <= 0) {
                            if (Math.random() < 0.85 || b.stack <= g.minRaise) performAction(uid, 'call');
                            else performAction(uid, 'raise', round2(g.highestBet + g.minRaise));
                        } else if (toCall >= b.stack) {
                            Math.random() < 0.5 ? performAction(uid, 'call') : performAction(uid, 'fold');
                        } else {
                            Math.random() < 0.82 ? performAction(uid, 'call') : performAction(uid, 'fold');
                        }
                    }, 2200);
                    return () => clearTimeout(tm);
                }

                if (gs.phase === 'discard') {
                    const iv = setInterval(() => {
                        const t = tableRef.current; if (!t || t.gameState.phase !== 'discard') { clearInterval(iv); return; }
                        const bot = Object.values(t.players).find(p => p.isBot && p.status === 'active' && (p.cards || []).length === 3);
                        if (bot) handleDiscardCard(bot.uid, Math.floor(Math.random() * 3));

                    const tm = setTimeout(() => {

                    }, 2200);

            const playersCount = Object.keys(players).length;
            useEffect(() => {

                // והצופה הוא סופר-אדמין — הוא מתחיל, כדי שאפשר יהיה לצפות בבוטים משחקים.
                const iStart = humans[0]?.uid === user.uid || (humans.length === 0 && isSuperAdmin);
                if (eligible.length >= (setts.autoStart || 2) && iStart) {

                    return () => clearTimeout(tm);
                }
            }, [gs.phase, playersCount, isSuperAdmin]);

            /* ---------- Bots מצטרפים אוטומטית לPoker (רץ אצל הסופר-אדמין, כמו ברמי) ----------
               מצטרפים כשיש לפחות אדם אחד בשולחן, בהפסקות בין ידיים, עד שהשולחן מתמלא. */
            useEffect(() => {
                if (!isSuperAdmin || !tableState) return;
                if (!['waiting','showdown'].includes(gs.phase)) return;

                    try {
                        const t = tableRef.current; if (!t) return;
                        if (!['waiting','showdown'].includes(t.gameState.phase)) return;
                        const pl = t.players || {};
                        const count = Object.keys(pl).length;

                        if (!hasHuman || count >= (t.settings.maxPlayers || 6)) return;

                        const botSnaps = await window.fb.getDocs(botQ);
                        if (botSnaps.empty) return;
                        const bots = botSnaps.docs.map(d => ({ id: d.id, ...d.data() })).filter(b => !pl[b.id]);
                        if (bots.length === 0) return;

                        const taken = new Set(Object.values(pl).map(p => p.seatIndex));
                        while (taken.has(seatIndex)) seatIndex++;
                        const bbNow = (Number(t.settings.blinds) || 0.5) * 2;
                        await window.fb.updateDoc(tblRef(), { [`players.${bot.id}`]: {

                            stack: round2(100 * bbNow), bet: 0,

                        }});

            useEffect(() => {

                        const remaining = Math.max(0, (setts.actionTime || 30) - elapsed);
                        setTimeLeft(remaining);

                                if (!synthRef.current && window.Tone) {
                                    synthRef.current = new window.Tone.Synth({ oscillator: { type: 'square' } }).toDestination();

                                synthRef.current?.triggerAttackRelease("E6", "0.05");

                        }
                        if (remaining === 0 && gs.activeTurnUid === user.uid) {

                            const toCall = round2(Math.max(0, gs.highestBet - (myPlayer?.bet || 0)));
                            performAction(user.uid, toCall > 0 ? 'fold' : 'call', undefined, true);
                        }

            }, [gs.turnStartedAt, gs.activeTurnUid, gs.phase]);

            /* ---------- דילוג מיידי על שחקן בסיט-אאוט בטורניר ----------
               בטורניר שחקן בסיט-אאוט נשאר 'active' (הבליינדים ממשיכים), אבל אין

            useEffect(() => {

                if (gs.activeTurnUid !== user.uid) return;

            const [bustLeft, setBustLeft] = useState(30);

            useEffect(() => {

                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const uRef = memDoc(user.uid);
                        const torRef = window.fb.doc(window.fb.db, "tournaments", tableState.tournamentId);
                        const [uSnap, tSnap, torSnap] = [await tr.get(uRef), await tr.get(tblRef()), await tr.get(torRef)];
                        if (!tSnap.exists() || !torSnap.exists()) throw "err";
                        const t = tSnap.data(); const torD = torSnap.data();
                        const me = t.players[user.uid];
                        if (!me || me.status !== 'busted') throw "Unavailable";
                        const entry = round2((Number(torD.buyIn) || 0) + (Number(torD.fee) || 0) + (Number(torD.bounty) || 0));
                        if ((uSnap.data().balance || 0) < entry) throw "Not enough balance for Rebuy";
                        tr.update(uRef, { balance: round2((uSnap.data().balance || 0) - entry) });
                        tr.update(tblRef(), { [`players.${user.uid}.stack`]: t.tournament.startStack || 1000, [`players.${user.uid}.status`]: 'waiting', [`players.${user.uid}.bustedAt`]: null });
                        tr.update(torRef, { prizePool: round2((torD.prizePool || 0) + (Number(torD.buyIn) || 0)), feeTotal: round2((torD.feeTotal || 0) + (Number(torD.fee) || 0)), [`players.${user.uid}.paid`]: round2(((torD.players[user.uid] || {}).paid || 0) + entry) });
                    });
                    playSnd('chip'); showToast("Rebuy successful! 💪", "success");
                } catch(e) { showToast(typeof e === 'string' ? e : "Error", "error"); }
            };
            const tourDecline = async () => {
                try {
                    await window.fb.updateDoc(tblRef(), { [`players.${user.uid}.status`]: 'out' });
                    tourReportBust(tableState.tournamentId, [user.uid], [], 0, false);
                } catch(e) {}
            };
            const tourAddon = async () => {
                try {
                    await window.fb.runTransaction(window.fb.db, async (tr) => {
                        const uRef = memDoc(user.uid);
                        const torRef = window.fb.doc(window.fb.db, "tournaments", tableState.tournamentId);
                        const [uSnap, tSnap, torSnap] = [await tr.get(uRef), await tr.get(tblRef()), await tr.get(torRef)];
                        if (!tSnap.exists() || !torSnap.exists()) throw "err";
                        const t = tSnap.data(); const torD = torSnap.data();
                        const me = t.players[user.uid];
                        if (!me || (torD.players[user.uid] || {}).addon) throw "Add-on already used";
                        const price = Number(torD.buyIn) || 0;
                        if ((uSnap.data().balance || 0) < price) throw "Not enough balance";
                        tr.update(uRef, { balance: round2((uSnap.data().balance || 0) - price) });
                        tr.update(tblRef(), { [`players.${user.uid}.stack`]: round2((me.stack || 0) + (t.tournament.startStack || 1000)) });
                        tr.update(torRef, { prizePool: round2((torD.prizePool || 0) + price), [`players.${user.uid}.addon`]: true, [`players.${user.uid}.paid`]: round2(((torD.players[user.uid] || {}).paid || 0) + price) });
                    });
                    playSnd('chip'); showToast("Add-on added to your stack! 🚀", "success");
                } catch(e) { showToast(typeof e === 'string' ? e : "Error", "error"); }
            };

            // 30 שניות להחליט על קנייה נוספת אחרי הדחה
            useEffect(() => {
                const me = tableState?.players?.[user.uid];
                if (!me || me.status !== 'busted') return;
                const isTour = !!tableState.tournament;
                const iv = setInterval(() => {
                    const cur = tableRef.current?.players?.[user.uid];
                    if (!cur || cur.status !== 'busted') { clearInterval(iv); return; }
                    const left = Math.max(0, 30 - Math.floor((Date.now() - (cur.bustedAt || Date.now())) / 1000));
                    setBustLeft(left);
                    if (left === 0) { clearInterval(iv); if (isTour) tourDecline(); else handleStandUp(); }
                }, 500);
                return () => clearInterval(iv);
            }, [tableState?.players?.[user.uid]?.status]);

            // אדמין: שומר-סף נגד ידיים תקועות (שחקן שLog out/קם באמצע זריקה, בחירת DC, או תור יתום)
            useEffect(() => {
                if (!isSuperAdmin) return;
                const iv = setInterval(async () => {
                    try {
                        const t = tableRef.current; if (!t) return;
                        const g = t.gameState || {};
                        const stuckFor = Date.now() - (g.turnStartedAt || 0);
                        if (g.phase === 'discard' && stuckFor > 25000) {
                            const p3 = Object.values(t.players || {}).find(q => q.status === 'active' && (q.cards || []).length === 3);
                            if (p3) { await handleDiscardCard(p3.uid, Math.floor(Math.random() * 3)); return; }
                        }
                        if (g.phase === 'dc_selection' && stuckFor > 25000 && g.dcUid) {
                            await selectDCGame(t.settings?.baseGameType || 'NLH', g.dcUid); return;
                        }
                        if (BETTING.includes(g.phase) && g.activeTurnUid) {
                            const actor = (t.players || {})[g.activeTurnUid];
                            if (!actor || actor.status !== 'active') {
                                // התור אצל שחקן שכבר לא קיים - מעבירים הלאה
                                const g2 = { ...g }; const pl = clonePlayers(t.players);
                                const actives = Object.values(pl).filter(q => q.status === 'active');
                                if (actives.length === 1) { await finishEarlyWin(g2, pl, actives[0].uid); return; }
                                if (actives.length === 0) { g2.phase = 'waiting'; g2.activeTurnUid = null; await saveGame(g2, pl); return; }
                                g2.activeTurnUid = firstAfterDealer(g2, pl); g2.turnStartedAt = Date.now();
                                await saveGame(g2, pl); return;
                            }
                            // שחקן בסיט-אאוט בטורניר: מדלגים מיד, בלי להמתין לטיימר המלא
                            const isSitSkip = t.tournamentId && actor.sitOut && actor.status === 'active';
                            const limit = ((Number(setts.actionTime) || 30) + 12) * 1000;
                            if (isSitSkip || stuckFor > limit) {
                                // שחקן מנותק/בסיט-אאוט שלא הגיב - Fold/צ'ק אוטומטי מהאדמין
                                const toCall = round2(Math.max(0, (g.highestBet || 0) - (actor.bet || 0)));
                                await performAction(g.activeTurnUid, toCall > 0 ? 'fold' : 'call');
                            }
                        }
                    } catch(e) {}
                }, 6000);
                return () => clearInterval(iv);
            }, [isSuperAdmin, tableDocId]);

            // אדמין: ניקוי מודחים שלא הגיבו + Bots מודחים
            useEffect(() => {
                if (!isSuperAdmin || !tableState) return;
                const iv = setInterval(async () => {
                    const t = tableRef.current; if (!t) return;
                    const stale = Object.values(t.players || {}).filter(q => q.status === 'busted' && (q.isBot || Date.now() - (q.bustedAt || 0) > 34000));
                    if (!stale.length) return;
                    if (t.tournament) {
                        const upd = {};
                        stale.forEach(q => { upd[`players.${q.uid}.status`] = 'out'; });
                        try { await window.fb.updateDoc(tblRef(), upd); } catch(e) {}
                        tourReportBust(t.tournamentId, stale.map(q => q.uid), [], 0, false);
                    } else {
                        const pl = { ...t.players };
                        stale.forEach(q => { delete pl[q.uid]; });
                        try { await window.fb.updateDoc(tblRef(), { players: pl }); } catch(e) {}
                    }
                }, 6000);
                return () => clearInterval(iv);
            }, [isSuperAdmin, tableDocId, tableState === null]);

            /* ---------- עוצמת יד + אחוזי זכייה ---------- */
            const activesOppCount = Object.values(players).filter(p => p.status === 'active' && p.uid !== user.uid).length;
            const myHand = useMemo(() => {
                if (!myPlayer || !(myPlayer.cards || []).length) return null;
                return handName(bestScoreNow(myPlayer.cards, gs.board || [], gs.currentGameType));
            }, [(myPlayer?.cards || []).length, (gs.board || []).length, gs.phase]);
            const myEquity = useMemo(() => {
                if (!myPlayer || myPlayer.status !== 'active' || !(myPlayer.cards || []).length) return null;
                if (gs.allInReveal || !['preflop','discard','flop','turn','river'].includes(gs.phase)) return null;
                if (activesOppCount < 1) return null;
                return simMyEquity(myPlayer.cards, gs.board || [], activesOppCount, gs.currentGameType);
            }, [(myPlayer?.cards || []).length, (gs.board || []).length, gs.phase, activesOppCount, gs.allInReveal]);
            const realEq = useMemo(() => {
                if (!gs.allInReveal) return null;
                const hands = Object.values(players).filter(p => p.status === 'active' && (p.cards || []).length > 0).map(p => ({ uid: p.uid, cards: p.cards }));
                if (hands.length < 2) return null;
                return simRealEquity(hands, gs.board || [], gs.currentGameType);
            }, [gs.allInReveal, (gs.board || []).length, gs.phase]);

            /* ---------- צלילים ---------- */
            const prevSnd = useRef({ board: 0, phase: '', turnMine: false, chatLen: 0, acts: {} });
            useEffect(() => {
                if (!tableState) return;
                const ps = prevSnd.current;
                const bl = (gs.board || []).length;
                if (bl > ps.board) playSnd('deal');
                if (gs.phase === 'showdown' && ps.phase !== 'showdown') playSnd('win');
                const mine = gs.activeTurnUid === user.uid && BETTING.includes(gs.phase);
                if (mine && !ps.turnMine) playSnd('turn');
                const cl = (tableState.chat || []).length;
                if (ps.chatLen && cl > ps.chatLen) playSnd('msg');
                Object.values(players).forEach(p => {
                    const prev = ps.acts[p.uid];
                    if (p.actionText && p.actionText !== prev) {
                        if (p.actionText === 'Fold') playSnd('fold');
                        else if (p.actionText === 'Check') playSnd('check');
                        else if (['Call','Raise','All-in','SB','BB'].includes(p.actionText)) playSnd('chip');
                    }
                    ps.acts[p.uid] = p.actionText;
                });
                ps.board = bl; ps.phase = gs.phase; ps.turnMine = mine; ps.chatLen = cl;
            }, [tableState]);

            if (loading || !tableState) return <div className="h-full flex items-center justify-center text-amber-500"><i className="fa-solid fa-spinner fa-spin text-3xl"></i></div>;

            /* ---------- חישובי תצוגה ---------- */
            const list = Object.values(players).sort((a,b) => (a.seatIndex - b.seatIndex) || String(a.uid).localeCompare(String(b.uid)));
            let displayList = list;
            if (isSeated) {
                const myIdx = list.findIndex(p => p.uid === user.uid);
                if (myIdx >= 0) displayList = [...list.slice(myIdx), ...list.slice(0, myIdx)]; // אני תמיד למטה במרכז
            }
            const N = Math.max(displayList.length, 2);
            const seatPos = (i) => {
                const ang = Math.PI / 2 + (i * 2 * Math.PI) / N;
                return { left: `${50 + 41 * Math.cos(ang)}%`, top: `${50 + 42 * Math.sin(ang)}%` };
            };
            const betPos = (i) => {
                const ang = Math.PI / 2 + (i * 2 * Math.PI) / N;
                return { left: `${50 + 21 * Math.cos(ang)}%`, top: `${50 + 24 * Math.sin(ang)}%` };
            };
            const totalPot = round2((gs.pots || []).reduce((s, p) => s + p.amount, 0) + Object.values(players).reduce((s, p) => s + (p.bet || 0), 0));
            const toCallMe = round2(Math.max(0, (gs.highestBet || 0) - (myPlayer?.bet || 0)));
            const myMaxBet = round2((myPlayer?.bet || 0) + (myPlayer?.stack || 0));
            const canShowBuyIn = !isSeated && !spectate;
            const tblCap = setts.maxPlayers || 6;
            const isFull = Object.keys(players).length >= tblCap;
            const waitlist = tableState.waitlist || [];
            const myWaitPos = waitlist.findIndex(w => w.uid === user.uid);
            const onWaitlist = myWaitPos >= 0;
            const baseMinBuy = (setts.minBuyInBB || 40) * BB;
            const baseMaxBuy = (setts.maxBuyInBB || 200) * BB;
            const leftLock = (tableState.leftStacks || {})[user.uid];
            const lockActive = leftLock && (Date.now() - leftLock.at < 12 * 60 * 60 * 1000) && leftLock.amount > baseMinBuy;
            const minBuy = lockActive ? round2(Math.max(baseMinBuy, leftLock.amount)) : baseMinBuy;
            const maxBuy = Math.max(baseMaxBuy, minBuy);
            const needRebuy = isSeated && (myPlayer?.stack || 0) <= 0 && ['waiting','showdown'].includes(gs.phase);
            const eligibleCount = Object.values(players).filter(p => p.stack > 0).length;

            return (
                <div className="h-full w-full flex flex-col bg-slate-950 font-sans overflow-hidden select-none" dir="ltr"
                     style={{ background: 'radial-gradient(ellipse at 50% 0%, #1a2436 0%, #05070f 60%)' }}>

                    {/* Header */}
                    <div className="min-h-[3.5rem] bg-slate-900/80 backdrop-blur-md border-b border-white/5 flex justify-between items-center gap-1.5 px-2 sm:px-3 py-1.5 shrink-0 z-40 relative">
                        <div className="flex items-center gap-1.5 sm:gap-2 flex-wrap shrink-0">
                            <button onClick={() => { if (tableState?.tournament || !isSeated) onLeave(); else handleStandUp(); }} className="px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 hover:bg-rose-700 hover:text-white text-xs font-bold border border-white/10">
                                <i className="fa-solid fa-door-open ml-1"></i>{tableState?.tournament ? 'To lobby' : (isSeated ? 'Stand up' : 'Leave')}
                            </button>
                            <button onClick={() => { setHistoryOpen(true); setHistExpand(null); }} className="px-2.5 py-1.5 rounded-lg bg-slate-800 text-slate-300 hover:text-white text-[10px] font-black border border-white/10" title="Hand history">
                                <i className="fa-solid fa-clock-rotate-left"></i>
                            </button>
                            {isSeated && setts.straddle && !tableState.tournament && (
                                <button onClick={async () => { try { await window.fb.updateDoc(tblRef(), { [`players.${user.uid}.straddleNext`]: !myPlayer?.straddleNext }); } catch(e) {} }}
                                        className={`px-2.5 py-1.5 rounded-lg text-[10px] font-black border transition-all ${myPlayer?.straddleNext ? 'bg-amber-600 text-white border-amber-400' : 'bg-slate-800 text-amber-300 border-white/10'}`} title="Straddle next hand (when you're UTG)">
                                    ST
                                </button>
                            )}
                            {isGod && (
                                <button onClick={() => setGodView(!godView)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black border transition-all ${godView ? 'bg-purple-600 text-white border-purple-400 shadow-[0_0_12px_purple]' : 'bg-slate-800 text-purple-400 border-white/10'}`}>
                                    <i className="fa-solid fa-eye ml-1"></i>GOD
                                </button>
                            )}
                            {isSuperAdmin && (
                                <React.Fragment>
                                    <button onClick={handleAddBot} className="px-2.5 py-1.5 rounded-lg bg-slate-800 text-purple-300 text-[10px] font-black border border-white/10" title="Add bot"><i className="fa-solid fa-robot"></i></button>
                                    {['waiting','showdown'].includes(gs.phase) && eligibleCount >= 2 && (
                                        <button onClick={() => startHand()} className="px-2.5 py-1.5 rounded-lg bg-emerald-700 text-white text-[10px] font-black border border-emerald-500">Deal</button>
                                    )}
                                </React.Fragment>
                            )}
                        </div>
                        <div className="flex-1 min-w-0 flex flex-col items-center px-1">
                            <span className="text-amber-400 font-black text-xs sm:text-sm tracking-wider truncate max-w-full">{gs.currentGameType || setts.baseGameType} {setts.isDealerChoice && <span className="text-rose-400 text-[9px] align-middle">DC</span>}</span>
                            <span className="text-slate-400 text-[9px] sm:text-[10px] font-bold truncate max-w-full" dir="ltr">{formatShort(setts.blinds)}/{formatShort(BB)}</span>
                        </div>
                        <div className="bg-slate-950/80 border border-amber-500/30 rounded-xl px-2.5 sm:px-3 py-1 text-center shrink-0">
                            <span className="text-[9px] text-amber-300 font-bold block leading-none mb-0.5">POT</span>
                            <span className="text-amber-400 font-black text-sm leading-none" dir="ltr">{formatShort(totalPot)}</span>
                        </div>
                    </div>

                    {/* השולחן */}
                    <div className="flex-1 relative flex items-center justify-center p-3 sm:p-5 min-h-0">

                        {/* GOD: מה יבוא בשולחן */}
                        {godView && ['preflop','discard','flop','turn','river'].includes(gs.phase) && (gs.deck || []).length >= 8 && (() => {
                            const d = gs.deck; const L = d.length; const bl = (gs.board || []).length;
                            const nxt = [];
                            if (bl === 0) { nxt.push(['Flop', [d[L-2], d[L-3], d[L-4]]]); nxt.push(['Turn', [d[L-6]]]); nxt.push(['River', [d[L-8]]]); }
                            else if (bl === 3) { nxt.push(['Turn', [d[L-2]]]); nxt.push(['River', [d[L-4]]]); }
                            else if (bl === 4) { nxt.push(['River', [d[L-2]]]); }
                            if (!nxt.length) return null;
                            return (
                                <div className="absolute top-1 left-1/2 -translate-x-1/2 z-[80] flex items-center gap-3 bg-purple-950/90 border border-purple-500/50 rounded-2xl px-4 py-1.5 backdrop-blur shadow-xl">
                                    <span className="text-purple-300 font-black text-[10px]"><i className="fa-solid fa-eye ml-1"></i>GOD</span>
                                    {nxt.map(([label, cards], i) => (
                                        <div key={i} className="flex items-center gap-1">
                                            <span className="text-[9px] text-purple-300 font-bold">{label}</span>
                                            <div className="flex gap-0.5" dir="ltr">{cards.map((c, ci) => c ? <PCard key={ci} card={c} size="sm" /> : null)}</div>
                                        </div>
                                    ))}
                                </div>
                            );
                        })()}

                        <div className={"poker-table w-full max-w-[440px] h-full max-h-[calc(100dvh-190px)] relative" + (tableState.tournament && tableState.tournament.final ? " final-table" : "")}>
                            {tableState.tournament && tableState.tournament.final && <div className="ft-banner" dir="ltr">FINAL TABLE</div>}

                            {/* מרכז: קופות, קלפים, מנצח */}
                            <div className="absolute left-1/2 top-[33%] -translate-x-1/2 flex gap-5 items-end z-10">
                                {(gs.pots || []).map((pot, i) => <CasinoChipStack key={i} amount={pot.amount} scale={1.1} />)}
                            </div>

                            <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 flex gap-1.5 z-10" dir="ltr">
                                {(gs.board || []).map((c, i) => <PCard key={i} card={c} size="lg" />)}
                                {gs.phase !== 'waiting' && [...Array(Math.max(0, 5 - (gs.board || []).length))].map((_, i) => (
                                    <div key={'ph'+i} className="w-11 sm:w-12 rounded-lg border border-dashed border-white/15 bg-white/[0.02]" style={{ height: '4.4rem' }}></div>
                                ))}
                            </div>

                            <div className="absolute left-1/2 top-[64%] -translate-x-1/2 text-center z-10 pointer-events-none w-[80%]">
                                <div className="text-slate-300/40 font-bold text-[11px] leading-relaxed" dir="ltr">
                                    <div>{(gs.currentGameType || setts.baseGameType || 'NLH') + ' ' + formatShort(setts.blinds) + '/' + formatShort(BB)}</div>
                                    <div>{'Blinds ' + formatShort(setts.blinds) + '/' + formatShort(BB) + (Number(setts.ante) > 0 ? ' · Ante ' + formatShort(setts.ante) : '')}</div>
                                    <div className="tracking-[0.15em] text-[9px] text-slate-400/30 uppercase mt-0.5">POKERTEN</div>
                                </div>
                                {gs.phase === 'discard' && <div className="text-amber-300 font-black text-xs animate-pulse">🍍 Pineapple - discard one card...</div>}
                            </div>

                            {/* כרזת מנצח - שכבה עליונה, מעל קלפי הקהילה */}
                            {gs.phase === 'showdown' && gs.lastWinners && (
                                <div className="absolute inset-0 z-40 flex items-center justify-center pointer-events-none">
                                    <div className="bg-slate-950/90 backdrop-blur-md border border-amber-500/50 rounded-2xl px-8 py-4 text-center animate-pop-in shadow-[0_10px_50px_rgba(0,0,0,0.8)]">
                                        <i className="fa-solid fa-trophy text-3xl text-amber-400 drop-shadow-[0_0_12px_#f59e0b]"></i>
                                        <div className="text-white font-black text-base mt-1.5">{gs.lastWinners}</div>
                                        {(gs.lastWinAmount || 0) > 0 && <div className="text-amber-400 font-black text-lg" dir="ltr">+{formatMoney(gs.lastWinAmount)}</div>}
                                    </div>
                                </div>
                            )}

                            {/* Players */}
                            {displayList.map((p, i) => {
                                const isTurn = gs.activeTurnUid === p.uid && inBetting;
                                const isMe = p.uid === user.uid;
                                const topSeat = parseFloat(seatPos(i).top) < 34;
                                const hidden = !godView && !isMe && !(gs.phase === 'showdown' && p.status === 'active') && !(gs.allInReveal && p.status === 'active');
                                const showCards = (p.cards || []).length > 0 && !['waiting'].includes(gs.phase) && p.status !== 'sitout';
                                const folded = p.status === 'folded';
                                const timerPct = isTurn ? Math.max(0, timeLeft / (setts.actionTime || 30)) : 0;
                                return (
                                    <div key={p.uid} className="absolute z-20" style={{ ...seatPos(i), transform: 'translate(-50%, -50%)' }}>
                                        {isTurn && <div className="player-spotlight"></div>}
                                        <div className={`relative flex flex-col items-center ${folded ? 'opacity-40 grayscale' : ''} ${p.sitOut ? 'opacity-50' : ''}`}>
                                            {ch.bubbles[p.uid] && <div className="chat-bubble">{ch.bubbles[p.uid]}</div>}
                                            {p.sitOut && <div className="absolute -top-2 right-0 z-30 text-[9px] font-black bg-slate-950/90 border border-amber-500/50 text-amber-300 rounded-full px-2 py-0.5">☕ Sit out{p.sitAuto ? ' 📵' : ''}</div>}
                                            {!isMe && canManageGame(user, 'poker') && (
                                                <button onClick={(e) => { e.stopPropagation(); if (window.confirm(`Remove ${p.name} from the table? Their stack returns to their wallet.`)) kickSeat(p.uid, true); }}
                                                        className="absolute -top-2 left-0 z-30 w-5 h-5 rounded-full bg-slate-900/90 border border-rose-500/50 text-rose-400 hover:bg-rose-800 hover:text-white text-[9px] font-black flex items-center justify-center">✕</button>
                                            )}
                                            {ch.gifts.filter(g => g.to === p.uid).map((g, gi) => <div key={'g'+gi} className="gift-fx">{g.giftE}</div>)}
                                            {p.actionText && <div className={`action-badge ${p.actionText === 'Fold' ? 'badge-fold' : p.actionText === 'Raise' || p.actionText === 'All-in' ? 'badge-raise' : p.actionText === 'WINNER' ? 'badge-win' : ['SB','BB'].includes(p.actionText) ? 'badge-blind' : 'badge-call'}`}>{p.actionText}</div>}

                                            {/* קלפים מעל הפוד - שלי מוגדלים; במושב עליון עוברים מתחת לפוד כדי שלא ייחתכו */}
                                            {showCards && (isMe || !topSeat) && (
                                                <div className={`flex ${isMe ? 'gap-1 mb-[-8px]' : 'gap-0.5 mb-[-10px]'} z-0`} dir="ltr">
                                                    {p.cards.map((c, ci) => (
                                                        isMe && gs.phase === 'discard' && p.cards.length === 3
                                                        ? <div key={ci} onClick={() => handleDiscardCard(user.uid, ci)} className="cursor-pointer hover:-translate-y-2 transition-transform ring-2 ring-amber-400/70 rounded-lg"><PCard card={c} size="xl" /></div>
                                                        : <PCard key={ci} card={c} hidden={hidden} size={isMe ? (p.cards.length > 4 ? 'lg' : 'xl') : 'sm'} />
                                                    ))}
                                                </div>
                                            )}

                                            {gs.phase === 'showdown' && gs.lastWinners && String(gs.lastWinners).split(', ').includes(p.name) && (
                                                <div className="win-tag" dir="ltr">WIN{(gs.lastWinAmount || 0) > 0 ? ' +' + formatShort(gs.lastWinAmount) : ''}</div>
                                            )}
                                            <div className={`player-pod ${isTurn ? 'active-glow' : ''} ${isMe ? 'w-16 h-16' : ''}`} style={{ backgroundImage: `url(${avatarUrl(p)})` }}>
                                                {isTurn && (
                                                    <svg className="absolute inset-0 w-full h-full timer-ring" viewBox="0 0 40 40">
                                                        <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(245,200,96,0.9)" strokeWidth="3"
                                                            strokeDasharray={`${113 * timerPct} 113`} strokeLinecap="round" />
                                                    </svg>
                                                )}
                                            </div>

                                            {gs.dealerUid === p.uid && <div className="absolute -left-3 top-0 w-5 h-5 rounded-full bg-white text-slate-900 text-[9px] font-black flex items-center justify-center shadow-lg border border-slate-300 z-30">D</div>}
                                            {setts.isDealerChoice && gs.dcUid === p.uid && <div className="absolute -right-3 top-0 w-5 h-5 rounded-full bg-rose-500 text-white text-[8px] font-black flex items-center justify-center shadow-lg border border-rose-300 z-30">DC</div>}

                                            <div className="text-[10px] font-bold text-white mt-1 max-w-[70px] truncate text-center">{isMe ? 'You' : p.name}</div>
                                            <div className="stack-capsule text-gold-400 font-black text-[11px]" dir="ltr">{formatShort(p.stack)}</div>

                                            {showCards && !isMe && topSeat && (
                                                <div className="flex gap-0.5 mt-1 z-20" dir="ltr">
                                                    {p.cards.map((c, ci) => <PCard key={ci} card={c} hidden={hidden} size="sm" />)}
                                                </div>
                                            )}
                                            {isMe && showCards && !gs.allInReveal && (myHand || myEquity !== null) && gs.phase !== 'showdown' && (
                                                <div className="flex gap-1 mt-1 z-30">
                                                    {myHand && <span className="bg-slate-950/90 border border-white/15 text-white text-[10px] font-black px-2 py-0.5 rounded-md whitespace-nowrap">{myHand}</span>}
                                                    {myEquity !== null && <span className="bg-emerald-900/90 border border-emerald-500/40 text-emerald-300 text-[10px] font-black px-2 py-0.5 rounded-md" dir="ltr">{myEquity}%</span>}
                                                </div>
                                            )}
                                            {gs.allInReveal && realEq && realEq[p.uid] !== undefined && p.status === 'active' && (
                                                <div className="mt-1 z-30 bg-amber-900/90 border border-amber-500/50 text-amber-300 text-[11px] font-black px-2.5 py-0.5 rounded-md animate-pop-in" dir="ltr">{realEq[p.uid]}%</div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}

                            {/* הימורים על השולחן */}
                            {displayList.map((p, i) => (p.bet || 0) > 0 && (
                                <div key={'bet' + p.uid} className="absolute z-10" style={{ ...betPos(i), transform: 'translate(-50%, -50%)' }}>
                                    <CasinoChipStack amount={p.bet} scale={0.85} />
                                </div>
                            ))}
                        </div>

                        {/* מודל בחירת משחק - Dealer's Choice */}
                        {gs.phase === 'dc_selection' && (
                            gs.dcUid === user.uid ? (
                                <div className="absolute inset-0 z-[100] bg-black/75 backdrop-blur-sm flex items-center justify-center p-4">
                                    <div className="glass-panel rounded-3xl p-6 w-full max-w-sm text-center animate-pop-in border border-rose-500/40">
                                        <i className="fa-solid fa-crown text-4xl text-rose-400 mb-2"></i>
                                        <h3 className="text-xl font-black text-white mb-1">The buttons met!</h3>
                                        <p className="text-slate-400 text-sm font-bold mb-5">You're the dealer - pick the game for the next hand</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            {Object.keys(GAME_CARDS).map(g => (
                                                <button key={g} onClick={() => selectDCGame(g)} className="bg-gradient-to-b from-slate-700 to-slate-900 hover:from-rose-600 hover:to-rose-800 border border-white/10 text-white py-4 rounded-2xl font-black transition-all">
                                                    {g}<div className="text-[10px] text-slate-400 font-bold mt-1">{GAME_CARDS[g]} cards</div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="absolute top-16 left-1/2 -translate-x-1/2 z-[90] bg-rose-900/90 border border-rose-500 text-white px-6 py-2.5 rounded-full font-black text-sm animate-pulse backdrop-blur">
                                    <i className="fa-solid fa-crown ml-2 text-rose-300"></i>{players[gs.dcUid]?.name} is picking the next game...
                                </div>
                            )
                        )}

                        {/* המתנה לPlayers */}
                        {gs.phase === 'waiting' && isSeated && (
                            <div className="absolute top-16 left-1/2 -translate-x-1/2 z-[90] bg-slate-900/90 border border-emerald-500/40 text-emerald-300 px-6 py-2.5 rounded-full font-black text-sm backdrop-blur animate-pulse">
